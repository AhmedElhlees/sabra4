      Utils.el('button', {
        class: 'btn btn--primary',
        style: { flex: 1 },
        onclick: async () => {
          const name = body.querySelector('#listName').value.trim();
          if (!name) { UI.toastError('أدخل اسم القائمة'); return; }

          await DB.add('taskLists', {
            name,
            type: body.querySelector('#list-type').value,
            icon: selectedIcon,
            color: selectedColor,
            preventDelete: body.querySelector('[name="preventDelete"]').checked
          });

          UI.toastSuccess('تمت إضافة القائمة');
          close();
          await loadContent();
        }
      }, 'حفظ')
    ]);

    const close = UI.modal({ title: 'قائمة جديدة', body, footer });
  }

  async function showTaskDetails(id) {
    const task = await DB.get('tasks', id);
    if (!task) return;

    const body = Utils.el('div');
    body.innerHTML = `
      <div class="card">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="list-item__icon" style="background:${task.priority === 'high' ? '#fee2e2' : task.priority === 'medium' ? '#fef3c7' : 'var(--color-bg-alt)'};color:${task.priority === 'high' ? '#dc2626' : task.priority === 'medium' ? '#d97706' : 'var(--color-text)'}">
            ${task.completed ? UI.ICONS.check : UI.ICONS.task}
          </div>
          <div style="flex:1">
            <div style="font-weight:700;font-size:16px">${Utils.escapeHTML(task.title)}</div>
            ${task.description ? `<div style="font-size:13px;color:var(--color-text-secondary);margin-top:4px">${Utils.escapeHTML(task.description)}</div>` : ''}
          </div>
        </div>
      </div>

      <div class="card">
        ${task.dueDate ? `<div class="summary-row"><span>الاستحقاق</span><span>${Utils.formatDate(task.dueDate)}${task.dueTime ? ' ' + task.dueTime : ''}</span></div>` : ''}
        <div class="summary-row"><span>الأولوية</span><span>${task.priority === 'high' ? 'مهمة' : task.priority === 'medium' ? 'عادية' : 'منخفضة'}</span></div>
        <div class="summary-row"><span>التكرار</span><span>${task.repeat === 'daily' ? 'يومي' : task.repeat === 'weekly' ? 'أسبوعي' : task.repeat === 'monthly' ? 'شهري' : 'بدون'}</span></div>
        <div class="summary-row"><span>الحالة</span><span>${task.completed ? 'مكتملة' : 'قيد التنفيذ'}</span></div>
        ${task.notes ? `<div class="summary-row"><span>ملاحظات</span><span>${Utils.escapeHTML(task.notes)}</span></div>` : ''}
      </div>
    `;

    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', {
        class: 'btn btn--danger',
        onclick: async () => {
          if (await UI.confirm({ title: 'حذف المهمة', message: 'حذف هذه المهمة؟', danger: true })) {
            await DB.remove('tasks', id);
            UI.toastSuccess('تم الحذف');
            close();
            await loadContent();
          }
        }
      }, UI.ICONS.trash),
      Utils.el('button', {
        class: 'btn btn--outline',
        onclick: () => { close(); showTaskForm(id); }
      }, UI.ICONS.edit),
      Utils.el('button', {
        class: 'btn btn--success',
        style: { flex: 1 },
        onclick: async () => {
          task.completed = !task.completed;
          await DB.put('tasks', task);
          UI.toastSuccess(task.completed ? 'تم الإكمال' : 'تمت الإعادة');
          close();
          await loadContent();
        }
      }, task.completed ? 'إعادة فتح' : 'إكمال')
    ]);

    const close = UI.modal({ title: 'تفاصيل المهمة', body, footer });
  }

  return { render };
})();


/* ===== js/pages/occasions.js ===== */
/* =========================================================
   OCCASIONS.JS - واجهة المناسبات
   ========================================================= */

window.OccasionsPage = (function () {
  'use strict';

  let activeTab = 'upcoming';

  async function render() {
    const root = document.getElementById('app-root');
    document.getElementById('bottom-nav').classList.remove('hidden');

    const user = await Auth.getCurrentUser();

    root.innerHTML = `
      ${UI.topbar({ userName: user?.name || '', avatarText: Utils.initials(user?.name || '') }).outerHTML}
      <div class="page">
        <div class="page__header" style="display:flex;align-items:center">
          <button class="back-btn" onclick="history.back()">${UI.ICONS.chevronRight}</button>
          <h1 class="page__title">مناسباتي</h1>
        </div>

        <div class="tabs">
          <button class="tab ${activeTab === 'upcoming' ? 'active' : ''}" data-tab="upcoming">القادمة</button>
          <button class="tab ${activeTab === 'today' ? 'active' : ''}" data-tab="today">اليوم</button>
          <button class="tab ${activeTab === 'this_week' ? 'active' : ''}" data-tab="this_week">هذا الأسبوع</button>
        </div>

        <div id="occasions-content"></div>
      </div>
    `;

    const topbarEl = root.querySelector('.topbar');
    topbarEl.replaceWith(UI.topbar({
      userName: user?.name || '',
      avatarText: Utils.initials(user?.name || '')
    }));

    root.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        activeTab = tab.dataset.tab;
        root.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        loadContent();
      });
    });

    await loadContent();
  }

  async function loadContent() {
    const container = document.getElementById('occasions-content');
    const occasions = await DB.getAll('occasions');

    const total = occasions.length;
    const birthdays = occasions.filter(o => o.type === 'birthday').length;

    container.innerHTML = `
      <div class="page__body">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-card__label">إجمالي المناسبات</div>
            <div class="stat-card__value">${total}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">أعياد الميلاد</div>
            <div class="stat-card__value">${birthdays}</div>
          </div>
        </div>

        <div style="display:flex;gap:8px;margin-bottom:16px">
          <button class="btn btn--primary btn--block" id="add-occasion-btn">${UI.ICONS.plus} مناسبة جديدة</button>
          <button class="btn btn--outline" id="add-group-btn">${UI.ICONS.users} مجموعة</button>
        </div>

        <div id="occasions-list"></div>
      </div>
    `;

    container.querySelector('#add-occasion-btn').addEventListener('click', () => showOccasionForm());
    container.querySelector('#add-group-btn').addEventListener('click', () => showGroupForm());

    await renderList();
  }

  async function renderList() {
    const list = document.getElementById('occasions-list');
    const occasions = await DB.getAll('occasions');

    const now = new Date();
    const today = Utils.startOfDay(now);
    const weekEnd = Utils.addDays(today, 7);

    let filtered = occasions.map(o => {
      const next = getNextOccurrence(o);
      return { ...o, nextDate: next };
    });

    if (activeTab === 'today') {
      filtered = filtered.filter(o => o.nextDate && Utils.startOfDay(o.nextDate).getTime() === today.getTime());
    } else if (activeTab === 'this_week') {
      filtered = filtered.filter(o => o.nextDate && o.nextDate >= today && o.nextDate <= weekEnd);
    } else {
      filtered = filtered.sort((a, b) => new Date(a.nextDate) - new Date(b.nextDate));
    }

    if (filtered.length === 0) {
      list.innerHTML = '';
      list.appendChild(UI.emptyState({
        icon: UI.ICONS.occasion,
        title: 'لا توجد مناسبات',
        text: 'أضف عيد ميلاد أو مناسبة لتتبع مواعيدها القادمة',
        actionText: 'إضافة مناسبة',
        onAction: () => showOccasionForm()
      }));
      return;
    }

    list.innerHTML = filtered.map(o => {
      const days = Utils.daysBetween(now, o.nextDate);
      const isToday = days === 0;
      const isPast = days < 0;

      let ageText = '';
      if (o.includeYear && o.date) {
        const birthYear = new Date(o.date).getFullYear();
        const currentAge = now.getFullYear() - birthYear;
        const nextAge = currentAge + 1;
        ageText = `عمره الحالي ${currentAge} سنة، عمره القادم ${nextAge} سنة`;
      }

      return `
        <div class="card" data-id="${o.id}" style="cursor:pointer">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="beneficiary-card__avatar" style="background:${getOccasionColor(o.type)}">
              ${o.image ? `<img src="${o.image}" style="width:100%;height:100%;border-radius:50%;object-fit:cover" />` : Utils.escapeHTML(Utils.initials(o.title))}
            </div>
            <div style="flex:1">
              <div style="font-weight:700">${Utils.escapeHTML(o.title)}</div>
              <div style="font-size:13px;color:var(--color-text-secondary)">
                ${getTypeLabel(o.type)} • ${o.date ? Utils.formatDate(o.date) : ''}
              </div>
              ${ageText ? `<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:2px">${ageText}</div>` : ''}
            </div>
            <div style="text-align:left">
              <div style="font-weight:700;color:${isToday ? 'var(--color-success)' : isPast ? 'var(--color-text-tertiary)' : 'var(--color-primary)'}">
                ${isToday ? 'اليوم!' : isPast ? 'منذ' : 'بعد'}
              </div>
              <div style="font-size:11px;color:var(--color-text-tertiary)">
                ${Math.abs(days)} يوم
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');

    list.querySelectorAll('[data-id]').forEach(card => {
      card.addEventListener('click', () => showOccasionDetails(card.dataset.id));
    });
  }

  function showOccasionForm(occasionId = null) {
    DB.get('occasions', occasionId).then(occ => {
      const body = Utils.el('div');
      body.innerHTML = `
        <div class="form-group">
          <label class="form-label">صورة المناسبة (اختياري)</label>
          <input class="form-input" type="file" id="occasion-image" accept="image/*" />
        </div>

        ${UI.field({ label: 'العنوان', name: 'title', value: occ?.title || '', placeholder: 'مثال: Ahmed Al-Halees', required: true })}

        <div class="form-group">
          <label class="form-label">نوع المناسبة</label>
          <select class="form-select" id="occasion-type">
            <option value="birthday" ${occ?.type === 'birthday' ? 'selected' : ''}>عيد ميلاد</option>
            <option value="anniversary" ${occ?.type === 'anniversary' ? 'selected' : ''}>ذكرى سنوية</option>
            <option value="holiday" ${occ?.type === 'holiday' ? 'selected' : ''}>عطلة</option>
            <option value="graduation" ${occ?.type === 'graduation' ? 'selected' : ''}>تخرج</option>
            <option value="wedding" ${occ?.type === 'wedding' ? 'selected' : ''}>زفاف</option>
            <option value="other" ${occ?.type === 'other' ? 'selected' : ''}>أخرى</option>
          </select>
        </div>

        ${UI.field({ label: 'رقم الهاتف', name: 'phone', type: 'tel', value: occ?.phone || '' })}

        <div class="form-group">
          <label class="form-label">تاريخ المناسبة</label>
          <input class="form-input" type="date" id="occasion-date" value="${occ?.date || ''}" />
        </div>

        ${UI.toggleField({
          label: 'تضمين السنة',
          name: 'includeYear',
          checked: occ?.includeYear !== false,
          hint: 'إن لم تُدخل السنة: لا يظهر العمر أو السنة، ويظهر العد التنازلي فقط'
        })}

        ${UI.field({ label: 'المجموعة', name: 'group', value: occ?.group || '', placeholder: 'مثال: العائلة، الأصدقاء' })}
      `;

      const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
        Utils.el('button', { class: 'btn btn--outline', onclick: () => close() }, 'إلغاء'),
        Utils.el('button', {
          class: 'btn btn--primary',
          style: { flex: 1 },
          onclick: async () => {
            const title = body.querySelector('#title').value.trim();
            if (!title) { UI.toastError('أدخل العنوان'); return; }

            const data = {
              ...(occ || {}),
              title,
              type: body.querySelector('#occasion-type').value,
              phone: body.querySelector('#phone').value.trim(),
              date: body.querySelector('#occasion-date').value,
              includeYear: body.querySelector('[name="includeYear"]').checked,
              group: body.querySelector('#group').value.trim()
            };

            const fileInput = body.querySelector('#occasion-image');
            if (fileInput.files[0]) {
              data.image = await Utils.fileToBase64(fileInput.files[0]);
            }

            if (occasionId) {
              await DB.put('occasions', data);
              UI.toastSuccess('تم التحديث');
            } else {
              await DB.add('occasions', data);
              UI.toastSuccess('تمت الإضافة');
            }

            close();
            await loadContent();
          }
        }, 'حفظ')
      ]);

      const close = UI.modal({ title: occasionId ? 'تعديل مناسبة' : 'مناسبة جديدة', body, footer });
    });
  }

  function showGroupForm() {
    UI.toast('قريباً: إنشاء مجموعات للمناسبات');
  }

  async function showOccasionDetails(id) {
    const occ = await DB.get('occasions', id);
    if (!occ) return;

    const next = getNextOccurrence(occ);
    const days = Utils.daysBetween(new Date(), next);

    const body = Utils.el('div');
    body.innerHTML = `
      ${occ.image ? `<img src="${occ.image}" style="width:100%;max-height:200px;object-fit:cover;border-radius:12px;margin-bottom:16px" />` : ''}
      <div class="card" style="text-align:center">
        <div style="font-size:20px;font-weight:700">${Utils.escapeHTML(occ.title)}</div>
        <div style="color:var(--color-text-secondary);margin-top:4px">${getTypeLabel(occ.type)}</div>
        <div style="margin-top:16px">
          <div style="font-size:32px;font-weight:800;color:var(--color-primary)">${Math.abs(days)}</div>
          <div style="font-size:13px;color:var(--color-text-secondary)">${days >= 0 ? 'يوم متبقي' : 'يوم مضى'}</div>
        </div>
      </div>

      <div class="card">
        ${occ.date ? `<div class="summary-row"><span>التاريخ</span><span>${Utils.formatDate(occ.date)}</span></div>` : ''}
        <div class="summary-row"><span>القادمة</span><span>${Utils.formatDate(next)}</span></div>
        ${occ.phone ? `<div class="summary-row"><span>الهاتف</span><span>${Utils.escapeHTML(occ.phone)}</span></div>` : ''}
        ${occ.group ? `<div class="summary-row"><span>المجموعة</span><span>${Utils.escapeHTML(occ.group)}</span></div>` : ''}
      </div>
    `;

    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', {
        class: 'btn btn--danger',
        onclick: async () => {
          if (await UI.confirm({ title: 'حذف', message: 'حذف هذه المناسبة؟', danger: true })) {
            await DB.remove('occasions', id);
            UI.toastSuccess('تم الحذف');
            close();
            await loadContent();
          }
        }
      }, UI.ICONS.trash),
      Utils.el('button', {
        class: 'btn btn--outline',
        onclick: () => { close(); showOccasionForm(id); }
      }, UI.ICONS.edit),
      Utils.el('button', { class: 'btn', style: { flex: 1 }, onclick: () => close() }, 'إغلاق')
    ]);

    const close = UI.modal({ title: 'تفاصيل المناسبة', body, footer });
  }

  function getNextOccurrence(occ) {
    if (!occ.date) return null;
    const date = new Date(occ.date);
    const now = new Date();
    const thisYear = new Date(now.getFullYear(), date.getMonth(), date.getDate());
    if (thisYear < now) {
      return new Date(now.getFullYear() + 1, date.getMonth(), date.getDate());
    }
    return thisYear;
  }

  function getOccasionColor(type) {
    const map = {
      birthday: '#a855f7',
      anniversary: '#ec4899',
      holiday: '#16a34a',
      graduation: '#2563eb',
      wedding: '#f59e0b',
      other: '#64748b'
    };
    return map[type] || '#64748b';
  }

  function getTypeLabel(type) {
    const map = {
      birthday: 'عيد ميلاد',
      anniversary: 'ذكرى سنوية',
      holiday: 'عطلة',
      graduation: 'تخرج',
      wedding: 'زفاف',
      other: 'مناسبة'
    };
    return map[type] || 'مناسبة';
  }

  return { render };
})();

window.MedicinesPage = (function () {

        ${med.concentration ? `<div class="summary-row"><span>التركيز</span><span>${Utils.escapeHTML(med.concentration)}</span></div>` : ''}

        ${med.endDate ? `<div class="summary-row"><span>تاريخ الانتهاء</span><span>${Utils.formatDate(med.endDate)}</span></div>` : ''}
        <div class="summary-row"><span>عند الحاجة</span><span>${med.asNeeded ? 'نعم' : 'لا'}</span></div>

            <div class="summary-row"><span>${UI.ICONS.clock}</span><span>${t}</span></div>
          `).join('')}
        </div>
      ` : ''}

      ${(med.doctor || med.pharmacy || med.prescriptionNo) ? `
        <div class="card">
          <div class="card__header"><h3 class="card__title">الرعاية والمتابعة</h3></div>
          ${med.doctor ? `<div class="summary-row"><span>الطبيب</span><span>${Utils.escapeHTML(med.doctor)}</span></div>` : ''}
          ${med.pharmacy ? `<div class="summary-row"><span>الصيدلية</span><span>${Utils.escapeHTML(med.pharmacy)}</span></div>` : ''}
          ${med.prescriptionNo ? `<div class="summary-row"><span>رقم الوصفة</span><span>${Utils.escapeHTML(med.prescriptionNo)}</span></div>` : ''}
        </div>
      ` : ''}

      ${med.notes ? `<div class="card"><div class="card__header"><h3 class="card__title">ملاحظات</h3></div><p>${Utils.escapeHTML(med.notes)}</p></div>` : ''}
    `;

    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', {
        class: 'btn btn--danger',
        onclick: async () => {
          if (await UI.confirm({ title: 'حذف', message: 'حذف هذا الدواء؟', danger: true })) {
            await DB.remove('medicines', id);
            UI.toastSuccess('تم الحذف');
            close();
            await loadContent();
          }
        }
      }, UI.ICONS.trash),
      Utils.el('button', {
        class: 'btn btn--outline',
        onclick: () => { close(); showMedicineForm(id); }
      }, UI.ICONS.edit),
      med.trackQuantity ? Utils.el('button', {
        class: 'btn btn--success',
        style: { flex: 1 },
        onclick: async () => {
          med.remainingQuantity = Math.max(0, (med.remainingQuantity || 0) - 1);
          await DB.put('medicines', med);
          UI.toastSuccess('تم تسجيل تناول جرعة');
          close();
          await loadContent();
        }
      }, 'تناول جرعة') : Utils.el('button', { class: 'btn', style: { flex: 1 }, onclick: () => close() }, 'إغلاق')
    ]);

    const close = UI.modal({ title: 'تفاصيل الدواء', body, footer });
  }

  function getNextDose(med) {
    if (!med.times || med.times.length === 0) return null;
    const now = new Date();
    for (const time of med.times) {
      const [h, m] = time.split(':').map(Number);
      const doseTime = new Date();
      doseTime.setHours(h, m, 0, 0);
      if (doseTime > now) return doseTime;
    }
    // غداً
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    tomorrow.setHours(...med.times[0].split(':').map(Number), 0, 0);
    return tomorrow;
  }

  return { render };
})();

  // ضغط صورة الصورة الشخصية باستخدام canvas
  function compressAvatar(dataUrl, maxSize) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height) {
          if (width > maxSize) { height = (height * maxSize) / width; width = maxSize; }
        } else {
          if (height > maxSize) { width = (width * maxSize) / height; height = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.8));
      };
      img.onerror = reject;
      img.src = dataUrl;
    });
  }

  async function showBackupMenu() {
    const action = await UI.actionSheet({
      title: 'النسخ الاحتياطي',
      items: [
        { label: 'تصدير كل البيانات (مشفّر)', value: 'export', icon: UI.ICONS.download },
        { label: 'استيراد من ملف', value: 'import', icon: UI.ICONS.upload }
      ]
    });

    if (action === 'export') {
      // طلب PIN لتشفير النسخة الاحتياطية
      const pin = await UI.promptPIN('أدخل رمز الدخول لتشفير النسخة الاحتياطية');
      if (!pin) return;

      try {
        const data = await DB.exportAll();
        const encrypted = await Crypto.encryptBackup(data, pin);
        const blob = new Blob([JSON.stringify(encrypted, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `malia-backup-${Utils.todayISO()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        UI.toastSuccess('تم التصدير بنجاح' + (encrypted.__secure ? ' (مشفّر)' : ''));
      } catch (err) {
        console.error('Export error:', err);
        UI.toastError('تعذّر التصدير: ' + (err.message || err));
      }
    } else if (action === 'import') {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'application/json';
      input.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const parsed = JSON.parse(text);

          // تحقق من التنسيق
          if (parsed.__format !== 'malia-backup-v1') {
            // ملف قديم غير مشفّر - استيراد مباشر
            if (await UI.confirm({ title: 'استيراد', message: 'ملف غير مشفّر (تنسيق قديم). سيتم استبدال جميع بياناتك الحالية. متابعة؟', danger: true })) {
              await DB.importAll(parsed);
              UI.toastSuccess('تم الاستيراد بنجاح');
              setTimeout(() => window.location.reload(), 1000);
            }
            return;
          }

          // ملف مشفّر - طلب PIN لفك التشفير
          if (parsed.__secure) {
            const pin = await UI.promptPIN('أدخل رمز الدخول لفك تشفير النسخة الاحتياطية');
            if (!pin) return;
            const data = await Crypto.decryptBackup(parsed, pin);
            if (await UI.confirm({ title: 'استيراد', message: 'سيتم استبدال جميع بياناتك الحالية. متابعة؟', danger: true })) {
              await DB.importAll(data);
              UI.toastSuccess('تم الاستيراد بنجاح');
              setTimeout(() => window.location.reload(), 1000);
            }
          } else {
            // تنسيق جديد لكن غير مشفّر
            if (await UI.confirm({ title: 'استيراد', message: 'سيتم استبدال جميع بياناتك الحالية. متابعة؟', danger: true })) {
              await DB.importAll(parsed.data);
              UI.toastSuccess('تم الاستيراد بنجاح');
              setTimeout(() => window.location.reload(), 1000);
            }
          }
        } catch (err) {
          console.error('Import error:', err);
          UI.toastError('ملف غير صالح أو رمز خاطئ');
        }
      });
      input.click();
    }
  }

  // ============ تغيير رمز الدخول (PIN) ============
  function showChangePasswordForm() {
    Auth.getCurrentUser().then(user => {
      const body = Utils.el('div');
      body.innerHTML = `
        <div class="form-group">
          <label class="form-label">الرمز الحالي <span class="required">*</span></label>
          <input class="form-input" id="pwd-old" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder="أدخل الرمز الحالي" />
        </div>
        <div class="form-group">
          <label class="form-label">الرمز الجديد <span class="required">*</span></label>
          <input class="form-input" id="pwd-new" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder="4 أرقام على الأقل" />
        </div>
        <div class="form-group">
          <label class="form-label">تأكيد الرمز الجديد <span class="required">*</span></label>
          <input class="form-input" id="pwd-confirm" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder="أعد إدخال الرمز الجديد" />
        </div>
        ${Crypto.isAvailable() ? `
          <div class="alert alert--info" style="font-size:12px">
            ${UI.ICONS.info}
            <div>عند تغيير الرمز، سيتم إعادة تشفير بياناتك بالمفتاح الجديد تلقائياً عند الحفظ القادم لكل سجل.</div>
          </div>
        ` : ''}
      `;
      const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
        Utils.el('button', { class: 'btn btn--outline', onclick: () => close() }, 'إلغاء'),
        Utils.el('button', {
          class: 'btn btn--primary', style: { flex: 1 },
          onclick: async () => {
            const oldPin = body.querySelector('#pwd-old').value;
            const newPin = body.querySelector('#pwd-new').value;
            const confirmPin = body.querySelector('#pwd-confirm').value;
            if (!oldPin || !newPin) { UI.toastError('أدخل الرمز القديم والجديد'); return; }
            if (newPin.length < 4) { UI.toastError('الرمز الجديد يجب أن يكون 4 أرقام على الأقل'); return; }
            if (newPin !== confirmPin) { UI.toastError('الرمز الجديد وتأكيده غير متطابقين'); return; }
            if (newPin === oldPin) { UI.toastError('الرمز الجديد يجب أن يكون مختلفاً عن الحالي'); return; }
            try {
              const result = await Auth.changePassword(oldPin, newPin);
              if (result.success) {
                if (window.Sounds) Sounds.success();
                UI.toastSuccess('تم تغيير رمز الدخول بنجاح');
                close();
              } else {
                UI.toastError(result.error || 'تعذّر تغيير الرمز');
              }
            } catch (err) {
              console.error('Change password error:', err);
              UI.toastError('تعذّر تغيير الرمز: ' + (err.message || err));
            }
          }
        }, 'تغيير الرمز')
      ]);
      const close = UI.modal({ title: 'تغيير رمز الدخول', body, footer });
    });
  }

  // ============ إعدادات القفل التلقائي ============
  function showAutoLockForm() {
    Auth.getCurrentUser().then(user => {
      const current = user?.autoLockMinutes != null ? user.autoLockMinutes : 2;
      const body = Utils.el('div');
      body.innerHTML = `
        <div class="form-group">
          <label class="form-label">قفل التطبيق بعد مدة خمول:</label>
          <select class="form-select" id="auto-lock-select">
            <option value="0" ${current === 0 ? 'selected' : ''}>معطّل</option>
            <option value="1" ${current === 1 ? 'selected' : ''}>دقيقة واحدة</option>
            <option value="2" ${current === 2 ? 'selected' : ''}>دقيقتان (افتراضي)</option>
            <option value="5" ${current === 5 ? 'selected' : ''}>5 دقائق</option>
            <option value="10" ${current === 10 ? 'selected' : ''}>10 دقائق</option>
            <option value="30" ${current === 30 ? 'selected' : ''}>30 دقيقة</option>
          </select>
          <div class="form-hint">عند انتهاء المدة، سيُطلب منك إعادة إدخال الرمز دون تسجيل خروج كامل.</div>
        </div>
        <div class="alert alert--info" style="font-size:12px">
          ${UI.ICONS.info}
          <div>يُعاد ضبط المؤقت عند كل لمسة أو نقرة. كما يُعاد ضبطه عند العودة للتطبيق.</div>
        </div>
      `;
      const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
        Utils.el('button', { class: 'btn btn--outline', onclick: () => close() }, 'إلغاء'),
        Utils.el('button', {
          class: 'btn btn--primary', style: { flex: 1 },
          onclick: async () => {
            const mins = parseInt(body.querySelector('#auto-lock-select').value, 10);
            try {
              await Auth.updateUser({ autoLockMinutes: mins });
              UI.toastSuccess(mins === 0 ? 'تم إلغاء القفل التلقائي' : `تم ضبط القفل على ${mins} ${mins === 1 ? 'دقيقة' : mins === 2 ? 'دقيقتين' : 'دقائق'}`);
              close();
              await render();
            } catch (err) {
              UI.toastError('تعذّر حفظ الإعداد: ' + (err.message || err));
            }
          }
        }, 'حفظ')
      ]);
      const close = UI.modal({ title: 'القفل التلقائي', body, footer });
    });
  }

  return { render };
})();

window.BudgetsPage = (function () {
  'use strict';

  async function render() {
    const root = document.getElementById('app-root');
    document.getElementById('bottom-nav').classList.remove('hidden');

    const user = await Auth.getCurrentUser();

    root.innerHTML = `
      ${UI.topbar({ userName: user?.name || '', avatarText: Utils.initials(user?.name || '') }).outerHTML}
      <div class="page">
        <div class="page__header" style="display:flex;align-items:center">
          <button class="back-btn" onclick="history.back()">${UI.ICONS.chevronRight}</button>
          <h1 class="page__title">الميزانيات والأهداف</h1>
        </div>
        <div id="budgets-content" class="page__body"></div>
      </div>
    `;

    const topbarEl = root.querySelector('.topbar');
    topbarEl.replaceWith(UI.topbar({
      userName: user?.name || '',
      avatarText: Utils.initials(user?.name || '')
    }));

    await loadContent();
  }

  async function loadContent() {
    const container = document.getElementById('budgets-content');
    const budgets = await DB.getAll('budgets');

    container.innerHTML = `
      <button class="btn btn--primary btn--block mb-4" id="add-budget-btn">
        ${UI.ICONS.plus} ميزانية جديدة
      </button>

      ${budgets.length === 0 ? `
        <div class="empty-state">
          <div class="empty-state__icon">${UI.ICONS.target}</div>
          <div class="empty-state__title">لا توجد ميزانيات</div>
          <div class="empty-state__text">ضع ميزانية لتتبع مصروفاتك وحافظ على التزامك المالي</div>
        </div>
      ` : `
        <div id="budgets-list"></div>
      `}
    `;

    container.querySelector('#add-budget-btn').addEventListener('click', () => showForm());

    if (budgets.length > 0) {
      const list = container.querySelector('#budgets-list');
      list.innerHTML = budgets.map(b => {
        const pct = b.limit > 0 ? Math.min(100, (b.spent / b.limit) * 100) : 0;
        const isOver = b.spent > b.limit;
        return `
          <div class="card" data-id="${b.id}" style="cursor:pointer">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px">
              <div>
                <div style="font-weight:700">${Utils.escapeHTML(b.name)}</div>
                <div style="font-size:12px;color:var(--color-text-secondary)">${b.period === 'monthly' ? 'شهري' : b.period === 'yearly' ? 'سنوي' : 'أسبوعي'}</div>
              </div>
              <div style="text-align:left">
                <div style="font-weight:700">${Utils.formatMoney(b.spent, b.currency)}</div>
                <div style="font-size:11px;color:var(--color-text-tertiary)">من ${Utils.formatMoney(b.limit, b.currency)}</div>
              </div>
            </div>
            <div class="progress">
              <div class="progress__bar" style="width:${pct}%;background:${isOver ? '#dc2626' : pct > 80 ? '#d97706' : '#16a34a'}"></div>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--color-text-tertiary)">
              <span>${Math.round(pct)}%</span>
              ${isOver ? '<span class="text-danger">تجاوز!</span>' : `<span>متبقي ${Utils.formatMoney(b.limit - b.spent, b.currency)}</span>`}
            </div>
          </div>
        `;
      }).join('');

      list.querySelectorAll('[data-id]').forEach(card => {
        card.addEventListener('click', () => showDetails(card.dataset.id));
      });
    }
  }

  function showForm(id = null) {
    DB.get('budgets', id).then(b => {
      const body = Utils.el('div');
      body.innerHTML = `
        ${UI.field({ label: 'اسم الميزانية', name: 'name', value: b?.name || '', placeholder: 'مثال: مصاريف الطعام', required: true })}
        <div class="form-row">
          ${UI.field({ label: 'الحد', name: 'limit', type: 'number', value: b?.limit || '', placeholder: '0.00', required: true })}
          <div class="form-group">
            <label class="form-label">العملة</label>
            <select class="form-select" id="b-currency">
              ${State.CURRENCIES.map(c => `<option value="${c.symbol}" ${b?.currency === c.symbol ? 'selected' : ''}>${c.symbol}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">الفترة</label>
          <select class="form-select" id="b-period">
            <option value="weekly" ${b?.period === 'weekly' ? 'selected' : ''}>أسبوعي</option>
            <option value="monthly" ${!b || b.period === 'monthly' ? 'selected' : ''}>شهري</option>
            <option value="yearly" ${b?.period === 'yearly' ? 'selected' : ''}>سنوي</option>
          </select>
        </div>
        ${UI.field({ label: 'الفئة (اختياري)', name: 'category', value: b?.category || '', type: 'select', options: [{ value: '', label: 'كل الفئات' }, ...Object.entries(State.CATEGORIES).map(([k, v]) => ({ value: k, label: v.label }))] })}
      `;

      const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
        Utils.el('button', { class: 'btn btn--outline', onclick: () => close() }, 'إلغاء'),
        Utils.el('button', {
          class: 'btn btn--primary', style: { flex: 1 },
          onclick: async () => {
            const name = body.querySelector('#name').value.trim();
            const limit = parseFloat(body.querySelector('#limit').value);
            if (!name) { UI.toastError('أدخل الاسم'); return; }
            if (!limit) { UI.toastError('أدخل الحد'); return; }
            const data = {
              ...(b || {}),
              name, limit,
              currency: body.querySelector('#b-currency').value,
              period: body.querySelector('#b-period').value,
              category: body.querySelector('#category').value,
              spent: b?.spent || 0
            };
            if (id) await DB.put('budgets', data);
            else await DB.add('budgets', data);
            UI.toastSuccess('تم الحفظ');
            close();
            await loadContent();
          }
        }, 'حفظ')
      ]);
      const close = UI.modal({ title: id ? 'تعديل' : 'ميزانية جديدة', body, footer });
    });
  }

  async function showDetails(id) {
    const b = await DB.get('budgets', id);
    if (!b) return;
    const body = Utils.el('div');
    body.innerHTML = `<div class="card"><div class="card__title">${Utils.escapeHTML(b.name)}</div></div>`;
    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', { class: 'btn btn--danger', onclick: async () => { await DB.remove('budgets', id); close(); await loadContent(); } }, UI.ICONS.trash),
      Utils.el('button', { class: 'btn btn--outline', onclick: () => { close(); showForm(id); } }, UI.ICONS.edit)
    ]);
    const close = UI.modal({ title: 'تفاصيل الميزانية', body, footer });
  }

  return { render };
})();

window.SocialJournalPage = (function () {
  'use strict';

  async function render() {
    const root = document.getElementById('app-root');
    document.getElementById('bottom-nav').classList.remove('hidden');

    const user = await Auth.getCurrentUser();
    root.innerHTML = `
      ${UI.topbar({ userName: user?.name || '', avatarText: Utils.initials(user?.name || '') }).outerHTML}
      <div class="page">
        <div class="page__header" style="display:flex;align-items:center">
          <button class="back-btn" onclick="history.back()">${UI.ICONS.chevronRight}</button>
          <h1 class="page__title">دفتر المجاملات</h1>
        </div>
        <div id="sj-content" class="page__body"></div>
      </div>
    `;
    root.querySelector('.topbar').replaceWith(UI.topbar({ userName: user?.name || '', avatarText: Utils.initials(user?.name || '') }));
    await loadContent();
  }

  async function loadContent() {
    const container = document.getElementById('sj-content');
    const items = await DB.getAll('socialJournal');
    const sorted = items.sort((a, b) => new Date(b.date) - new Date(a.date));

    const totalGiven = items.filter(i => i.direction === 'given').reduce((s, i) => s + Number(i.amount), 0);
    const totalReceived = items.filter(i => i.direction === 'received').reduce((s, i) => s + Number(i.amount), 0);

    container.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card__label">قدّمت</div>
          <div class="stat-card__value text-danger">${Utils.formatMoney(totalGiven, State.get('currentCurrency'))}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">استلمت</div>
          <div class="stat-card__value text-success">${Utils.formatMoney(totalReceived, State.get('currentCurrency'))}</div>
        </div>
      </div>

      <button class="btn btn--primary btn--block mb-4" id="add-btn">${UI.ICONS.plus} تسجيل مجاملة</button>

      ${sorted.length === 0 ? `
        <div class="empty-state">
          <div class="empty-state__icon">${UI.ICONS.book}</div>
          <div class="empty-state__title">لا توجد مجاملات</div>
          <div class="empty-state__text">سجل المبالغ التي قدمتها أو استلمتها في المناسبات</div>
        </div>
      ` : sorted.map(i => `
        <div class="card" data-id="${i.id}" style="cursor:pointer">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="beneficiary-card__avatar" style="background:${i.direction === 'given' ? '#dc2626' : '#16a34a'}">
              ${Utils.escapeHTML(Utils.initials(i.personName))}
            </div>
            <div style="flex:1">
              <div style="font-weight:700">${Utils.escapeHTML(i.personName)}</div>
              <div style="font-size:13px;color:var(--color-text-secondary)">${Utils.escapeHTML(i.occasion || '')} • ${Utils.formatDate(i.date)}</div>
            </div>
            <div style="text-align:left">
              <div style="font-weight:700;color:${i.direction === 'given' ? 'var(--color-danger)' : 'var(--color-success)'}">
                ${i.direction === 'given' ? '-' : '+'}${Utils.formatMoney(i.amount, i.currency)}
              </div>
            </div>
          </div>
        </div>
      `).join('')}
    `;

    container.querySelector('#add-btn').addEventListener('click', () => showForm());
    container.querySelectorAll('[data-id]').forEach(card => {
      card.addEventListener('click', () => showDetails(card.dataset.id));
    });
  }

  function showForm(id = null) {
    DB.get('socialJournal', id).then(item => {
      const body = Utils.el('div');
      body.innerHTML = `
        <div class="form-group">
          <label class="form-label">النوع</label>
          <div class="segmented">
            <button class="segmented__btn ${!item || item.direction === 'given' ? 'active' : ''}" data-dir="given">قدّمت</button>
            <button class="segmented__btn ${item?.direction === 'received' ? 'active' : ''}" data-dir="received">استلمت</button>
          </div>
        </div>
        ${UI.field({ label: 'اسم الشخص', name: 'personName', value: item?.personName || '', required: true })}
        <div class="form-row">
          ${UI.field({ label: 'المبلغ', name: 'amount', type: 'number', value: item?.amount || '', required: true })}
          <div class="form-group">
            <label class="form-label">العملة</label>
            <select class="form-select" id="sj-currency">
              ${State.CURRENCIES.map(c => `<option value="${c.symbol}" ${item?.currency === c.symbol ? 'selected' : ''}>${c.symbol}</option>`).join('')}
            </select>
          </div>
        </div>
        ${UI.field({ label: 'المناسبة', name: 'occasion', value: item?.occasion || '', placeholder: 'مثال: عرس، تعزية، ميلاد' })}
        ${UI.field({ label: 'التاريخ', name: 'date', type: 'date', value: item?.date || Utils.todayISO() })}
        ${UI.field({ label: 'ملاحظات', name: 'notes', type: 'textarea', value: item?.notes || '' })}
      `;

      let dir = item?.direction || 'given';
      body.querySelectorAll('.segmented__btn').forEach(btn => {
        btn.addEventListener('click', () => {
          body.querySelectorAll('.segmented__btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          dir = btn.dataset.dir;
        });
      });

      const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
        Utils.el('button', { class: 'btn btn--outline', onclick: () => close() }, 'إلغاء'),
        Utils.el('button', {
          class: 'btn btn--primary', style: { flex: 1 },
          onclick: async () => {
            const data = {
              ...(item || {}),
              direction: dir,
              personName: body.querySelector('#personName').value.trim(),
              amount: parseFloat(body.querySelector('#amount').value) || 0,
              currency: body.querySelector('#sj-currency').value,
              occasion: body.querySelector('#occasion').value.trim(),
              date: body.querySelector('#date').value,
              notes: body.querySelector('#notes').value.trim()
            };
            if (!data.personName) { UI.toastError('أدخل اسم الشخص'); return; }
            if (id) await DB.put('socialJournal', data);
            else await DB.add('socialJournal', data);
            UI.toastSuccess('تم الحفظ');
            close();
            await loadContent();
          }
        }, 'حفظ')
      ]);
      const close = UI.modal({ title: id ? 'تعديل' : 'مجاملة جديدة', body, footer });
    });
  }

  async function showDetails(id) {
    const item = await DB.get('socialJournal', id);
    if (!item) return;
    const body = Utils.el('div');
    body.innerHTML = `
      <div class="card"><div class="card__title">${Utils.escapeHTML(item.personName)}</div></div>
      <div class="card">
        <div class="summary-row"><span>النوع</span><span>${item.direction === 'given' ? 'قدّمت' : 'استلمت'}</span></div>
        <div class="summary-row"><span>المبلغ</span><span>${Utils.formatMoney(item.amount, item.currency)}</span></div>
        ${item.occasion ? `<div class="summary-row"><span>المناسبة</span><span>${Utils.escapeHTML(item.occasion)}</span></div>` : ''}
        <div class="summary-row"><span>التاريخ</span><span>${Utils.formatDate(item.date)}</span></div>
        ${item.notes ? `<div class="summary-row"><span>ملاحظات</span><span>${Utils.escapeHTML(item.notes)}</span></div>` : ''}
      </div>
    `;
    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', { class: 'btn btn--danger', onclick: async () => { await DB.remove('socialJournal', id); close(); await loadContent(); } }, UI.ICONS.trash),
      Utils.el('button', { class: 'btn btn--outline', onclick: () => { close(); showForm(id); } }, UI.ICONS.edit)
    ]);
    const close = UI.modal({ title: 'تفاصيل', body, footer });
  }

  return { render };
})();

      const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [

    ]);
    const close = UI.modal({ title: 'تفاصيل الجمعية', body, footer });
  }

  return { render };
})();

/* ===== js/pages/zakat.js ===== */
/* =========================================================
   ZAKAT.JS - حساب الزكاة (نصاب قابل للتعديل)
   =========================================================
   - سعر جرام الذهب والفضة قابل للتعديل (يُحفظ في settings)
   - نصاب الذهب = 85 × سعر الجرام
   - نصاب الفضة = 595 × سعر الجرام
   - يُعتمد الأقل بين القيمتين (الأحوط شرعاً)
   - باقي المنطق (2.5%، طرح الديون) كما هو
   - ملاحظة: القيم تقديرية بناءً على الأسعار التي أدخلها المستخدم
   ========================================================= */

window.ZakatPage = (function () {
  'use strict';

  // قيم افتراضية تقريبية (يُفضّل المستخدم تحديثها)
  const DEFAULT_GOLD_PRICE = 290;   // ₪/جرام (24 قيراط)
  const DEFAULT_SILVER_PRICE = 3.0; // ₪/جرام

  async function render() {
    const root = document.getElementById('app-root');
    document.getElementById('bottom-nav').classList.add('hidden');

    const user = await Auth.getCurrentUser();
    root.innerHTML = `
      ${UI.topbar({ userName: user?.name || '', avatarText: Utils.initials(user?.name || '') }).outerHTML}
      <div class="page">
        <div class="page__header" style="display:flex;align-items:center">
          <button class="back-btn" onclick="history.back()">${UI.ICONS.chevronRight}</button>
          <h1 class="page__title">حساب الزكاة</h1>
        </div>
        <div id="zk-content" class="page__body"></div>
      </div>
    `;
    root.querySelector('.topbar').replaceWith(UI.topbar({ userName: user?.name || '', avatarText: Utils.initials(user?.name || '') }));
    await loadContent();
  }

  async function loadContent() {
    const container = document.getElementById('zk-content');

    // قراءة أسعار الذهب والفضة من الإعدادات
    const goldPrice = Number(await DB.getSetting('gold_gram_price', DEFAULT_GOLD_PRICE)) || DEFAULT_GOLD_PRICE;
    const silverPrice = Number(await DB.getSetting('silver_gram_price', DEFAULT_SILVER_PRICE)) || DEFAULT_SILVER_PRICE;

    // حساب النصابين
    const goldNisab = 85 * goldPrice;     // نصاب الذهب
    const silverNisab = 595 * silverPrice; // نصاب الفضة
    // الأحوط شرعاً: اعتماد الأقل بين القيمتين
    const nisab = Math.min(goldNisab, silverNisab);
    const nisabSource = goldNisab <= silverNisab ? 'ذهب' : 'فضة';

    // جمع الأصول
    const wallets = await DB.getAll('wallets');
    const properties = await DB.getAll('properties');
    const debts = await DB.getAll('debts');
    const history = await DB.getAll('zakat');

    const cashAssets = wallets.filter(w => !w.archived).reduce((s, w) => s + Number(w.balance || 0), 0);
    const goldValue = properties.filter(p => p.type === 'gold').reduce((s, p) => s + Number(p.purchasePrice || 0), 0);
    const silverValue = properties.filter(p => p.type === 'silver').reduce((s, p) => s + Number(p.purchasePrice || 0), 0);
    const debtsOnMe = debts.filter(d => d.type === 'owed_to_them' && !d.archived).reduce((s, d) => {
      const r = (d.remainingAmount != null && d.remainingAmount !== '') ? Number(d.remainingAmount) : Number(d.amount || 0);
      return s + r;
    }, 0);

    const totalAssets = cashAssets + goldValue + silverValue;
    const zakatBase = totalAssets - debtsOnMe;
    const zakatDue = zakatBase >= nisab ? zakatBase * 0.025 : 0;

    container.innerHTML = `
      <!-- بطاقة النتيجة الرئيسية -->
      <div class="card" style="background:linear-gradient(135deg,#0f766e,#134e4a);color:#fff;margin-bottom:16px">
        <div style="font-size:13px;opacity:0.85">الزكاة المستحقة (2.5%)</div>
        <div style="font-size:32px;font-weight:800;margin-top:4px">${Utils.formatMoney(zakatDue, State.get('currentCurrency'))}</div>
        <div style="font-size:12px;opacity:0.7;margin-top:4px">
          القاعدة: ${Utils.formatMoney(zakatBase, State.get('currentCurrency'))} • النصاب المعتمد (${nisabSource}): ${Utils.formatMoney(nisab, State.get('currentCurrency'))}
        </div>
      </div>

      ${zakatBase < nisab ? `
        <div class="alert alert--warning">
          ${UI.ICONS.info}
          <div>المبلغ أقل من النصاب، لا تجب الزكاة. النصاب المعتمد يعادل ${nisabSource === 'ذهب' ? '85 جرام ذهب' : '595 جرام فضة'}.</div>
        </div>
      ` : ''}

      <!-- ملاحظة تقريبية -->
      <div class="alert alert--info" style="background:#e0f2fe;color:#075985;border:1px solid #bae6fd;font-size:12px">
        ${UI.ICONS.info}
        <div><strong>ملاحظة:</strong> القيمة تقديرية بناءً على أسعار الذهب/الفضة التي أدخلتها يدوياً، وليست سعراً حياً من السوق. يُرجى تحديث الأسعار دورياً من البطاقة بالأسفل للحصول على حساب أدق.</div>
      </div>

      <!-- إعدادات نصاب الزكاة -->
      <div class="card">
        <div class="card__header">
          <h3 class="card__title">أسعار الذهب والفضة</h3>
          <button class="btn btn--sm btn--outline" id="edit-prices-btn">${UI.ICONS.edit} تعديل</button>
        </div>
        <div class="balance-row"><span>سعر جرام الذهب (24 قيراط)</span><span>${Utils.formatMoney(goldPrice, State.get('currentCurrency'))}</span></div>
        <div class="balance-row"><span>سعر جرام الفضة</span><span>${Utils.formatMoney(silverPrice, State.get('currentCurrency'))}</span></div>
        <div class="balance-row"><span>نصاب الذهب (85 جم)</span><span>${Utils.formatMoney(goldNisab, State.get('currentCurrency'))}</span></div>
        <div class="balance-row"><span>نصاب الفضة (595 جم)</span><span>${Utils.formatMoney(silverNisab, State.get('currentCurrency'))}</span></div>
        <div class="balance-row balance-row--total" style="background:#f0fdf4">
          <span>النصاب المعتمد (الأحوط)</span>
          <span class="text-success">${Utils.formatMoney(nisab, State.get('currentCurrency'))}</span>
        </div>
        <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:8px">
          يتم اعتماد الأقل بين نصابي الذهب والفضة (وهو الأحوط شرعاً).
        </div>
      </div>

      <!-- تفصيل الأصول -->
      <div class="card">
        <div class="card__header"><h3 class="card__title">تفصيل الأصول</h3></div>
        <div class="balance-row"><span>النقود (المحافظ)</span><span>${Utils.formatMoney(cashAssets, State.get('currentCurrency'))}</span></div>
        <div class="balance-row"><span>الذهب</span><span>${Utils.formatMoney(goldValue, State.get('currentCurrency'))}</span></div>
        <div class="balance-row"><span>الفضة</span><span>${Utils.formatMoney(silverValue, State.get('currentCurrency'))}</span></div>
        <div class="balance-row"><span>إجمالي الأصول</span><span>${Utils.formatMoney(totalAssets, State.get('currentCurrency'))}</span></div>
        <div class="balance-row"><span>ديون عليك (تُطرح)</span><span class="text-danger">-${Utils.formatMoney(debtsOnMe, State.get('currentCurrency'))}</span></div>
        <div class="balance-row balance-row--total">
          <span>قاعدة الزكاة</span>
          <span>${Utils.formatMoney(zakatBase, State.get('currentCurrency'))}</span>
        </div>
      </div>

      <button class="btn btn--primary btn--block mb-4" id="record-zakat-btn">
        ${UI.ICONS.save} تسديد الزكاة
      </button>

      ${history.length > 0 ? `
        <div class="card">
          <div class="card__header"><h3 class="card__title">سجل الزكاة</h3></div>
          ${history.sort((a,b) => new Date(b.date) - new Date(a.date)).map(z => `
            <div class="list-item">
              <div class="list-item__icon" style="background:#dcfce7;color:#16a34a">${UI.ICONS.zakat}</div>
              <div class="list-item__body">
                <div class="list-item__title">${Utils.formatMoney(z.amount, z.currency)}</div>
                <div class="list-item__subtitle">${Utils.formatDate(z.date)} • ${Utils.escapeHTML(z.recipient || 'لمستحق الزكاة')}</div>
              </div>
              <button class="icon-btn" data-action="delete" data-id="${z.id}">${UI.ICONS.trash}</button>
            </div>
          `).join('')}
        </div>
      ` : ''}
    `;

    container.querySelector('#record-zakat-btn').addEventListener('click', () => showPaymentForm(zakatDue));
    container.querySelector('#edit-prices-btn').addEventListener('click', () => showPricesForm(goldPrice, silverPrice));
    container.querySelectorAll('[data-action="delete"]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        await DB.remove('zakat', btn.dataset.id);
        await loadContent();
      });
    });
  }

  // نموذج تعديل أسعار الذهب والفضة
  function showPricesForm(goldPrice, silverPrice) {
    const body = Utils.el('div');
    body.innerHTML = `
      <div class="form-group">
        <label class="form-label">سعر جرام الذهب (24 قيراط) <span class="required">*</span></label>
        <input class="form-input" id="zk-gold-price" type="number" step="0.01" min="0" value="${goldPrice}" />
        <div class="form-hint">أدخل سعر جرام الذهب عيار 24 بالعملة المحلية</div>
      </div>
      <div class="form-group">
        <label class="form-label">سعر جرام الفضة <span class="required">*</span></label>
        <input class="form-input" id="zk-silver-price" type="number" step="0.01" min="0" value="${silverPrice}" />
        <div class="form-hint">أدخل سعر جرام الفضة بالعملة المحلية</div>
      </div>
      <div class="alert alert--info" style="font-size:12px">
        ${UI.ICONS.info}
        <div>سيتم حساب النصاب تلقائياً: ذهب = 85 جم، فضة = 595 جم، واعتماد الأقل بينهما.</div>
      </div>
    `;
    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', { class: 'btn btn--outline', onclick: () => close() }, 'إلغاء'),
      Utils.el('button', {
        class: 'btn btn--primary', style: { flex: 1 },
        onclick: async () => {
          const g = parseFloat(body.querySelector('#zk-gold-price').value);
          const s = parseFloat(body.querySelector('#zk-silver-price').value);
          if (!g || g <= 0) { UI.toastError('أدخل سعر ذهب صحيح'); return; }
          if (!s || s <= 0) { UI.toastError('أدخل سعر فضة صحيح'); return; }
          await DB.setSetting('gold_gram_price', g);
          await DB.setSetting('silver_gram_price', s);
          UI.toastSuccess('تم تحديث الأسعار');
          close();
          await loadContent();
        }
      }, 'حفظ')
    ]);
    const close = UI.modal({ title: 'أسعار الذهب والفضة', body, footer });
  }

  function showPaymentForm(suggestedAmount) {
    const body = Utils.el('div');
    body.innerHTML = `
      ${UI.field({ label: 'المبلغ', name: 'amount', type: 'number', value: suggestedAmount || '', required: true })}
      ${UI.field({ label: 'التاريخ', name: 'date', type: 'date', value: Utils.todayISO() })}
      ${UI.field({ label: 'المستلم', name: 'recipient', placeholder: 'اسم مستحق الزكاة أو الجهة' })}
      <div class="form-group">
        <label class="form-label">النوع</label>
        <select class="form-select" id="zk-type">
          <option value="cash">نقدي</option>
          <option value="bank">تحويل بنكي</option>
          <option value="organization">لجنة خيرية</option>
        </select>
      </div>
      ${UI.field({ label: 'ملاحظات', name: 'notes', type: 'textarea' })}
    `;
    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', { class: 'btn btn--outline', onclick: () => close() }, 'إلغاء'),
      Utils.el('button', {
        class: 'btn btn--primary', style: { flex: 1 },
        onclick: async () => {
          const amount = parseFloat(body.querySelector('#amount').value);
          if (!amount || amount <= 0) { UI.toastError('أدخل مبلغاً صحيحاً'); return; }
          await DB.add('zakat', {
            amount,
            date: body.querySelector('#date').value,
            recipient: body.querySelector('#recipient').value.trim(),
            type: body.querySelector('#zk-type').value,
            currency: State.get('currentCurrency'),
            notes: body.querySelector('#notes').value.trim()
          });
          UI.toastSuccess('تم تسجيل الزكاة');
          close();
          await loadContent();
        }
      }, 'تسجيل')
    ]);
    const close = UI.modal({ title: 'تسديد الزكاة', body, footer });
  }

  return { render };
})();

/* =========================================================
   NOTES.JS - دفتر المذكرة الذكي (يدعم إرفاق صور/ملفات)
   ========================================================= */

window.NotesPage = (function () {
  'use strict';

  async function render() {
    const root = document.getElementById('app-root');
    document.getElementById('bottom-nav').classList.remove('hidden');

    const user = await Auth.getCurrentUser();
    root.innerHTML = `
      ${UI.topbar({ userName: user?.name || '', avatarText: Utils.initials(user?.name || '') }).outerHTML}
      <div class="page">
        <div class="page__header" style="display:flex;align-items:center">
          <button class="back-btn" onclick="history.back()">${UI.ICONS.chevronRight}</button>
          <h1 class="page__title">مذكراتي</h1>
        </div>
        <div id="nt-content" class="page__body"></div>
      </div>
    `;
    root.querySelector('.topbar').replaceWith(UI.topbar({ userName: user?.name || '', avatarText: Utils.initials(user?.name || '') }));
    await loadContent();
  }

  async function loadContent() {
    const container = document.getElementById('nt-content');
    const notes = await DB.getAll('notes');
    const sorted = notes.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || new Date(b.createdAt) - new Date(a.createdAt));

    // جلب عدد المرفقات لكل مذكرة دفعة واحدة
    const allAttachments = await DB.getAll('noteAttachments');
    const attachCount = {};
    allAttachments.forEach(a => {
      attachCount[a.noteId] = (attachCount[a.noteId] || 0) + 1;
    });

    container.innerHTML = `
      <button class="btn btn--primary btn--block mb-4" id="add-btn">${UI.ICONS.plus} مذكرة جديدة</button>
      <div class="search-bar" style="margin:0 0 16px">
        ${UI.ICONS.search}
        <input type="search" id="nt-search" placeholder="ابحث في مذكراتك..." />
      </div>
      ${sorted.length === 0 ? `
        <div class="empty-state">
          <div class="empty-state__icon">${UI.ICONS.notes}</div>
          <div class="empty-state__title">لا توجد مذكرات</div>
          <div class="empty-state__text">دون أفكارك وملاحظاتك في مكان واحد — مع دعم إرفاق الصور والملفات</div>
        </div>
      ` : `<div id="notes-list" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">${sorted.map(n => {
          const count = attachCount[n.id] || 0;
          return `
          <div class="card" data-id="${n.id}" style="cursor:pointer;background:${n.color || '#fffbeb'};border-color:${n.color || '#fde68a'}33">
            ${n.pinned ? '<div style="float:left;color:#f59e0b">📌</div>' : ''}
            <div style="font-weight:700;font-size:14px;margin-bottom:4px">${Utils.escapeHTML(n.title || 'بدون عنوان')}</div>
            <div style="font-size:12px;color:var(--color-text-secondary);overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical">${Utils.escapeHTML(n.content || '')}</div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
              <div style="font-size:10px;color:var(--color-text-tertiary)">${Utils.formatDate(n.createdAt)}</div>
              ${count > 0 ? `<div style="display:inline-flex;align-items:center;gap:3px;background:rgba(0,0,0,0.06);padding:2px 8px;border-radius:10px;font-size:10px;color:#475569;font-weight:600">
                <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                ${count}
              </div>` : ''}
            </div>
          </div>
        `;
      }).join('')}</div>`}
    `;

    container.querySelector('#add-btn').addEventListener('click', () => showForm());
    container.querySelector('#nt-search').addEventListener('input', Utils.debounce(() => {
      const q = container.querySelector('#nt-search').value.trim().toLowerCase();
      container.querySelectorAll('[data-id]').forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = text.includes(q) ? 'block' : 'none';
      });
    }, 200));

    container.querySelectorAll('[data-id]').forEach(card => {
      card.addEventListener('click', () => showDetails(card.dataset.id));
    });
  }

  // ============ نموذج إضافة/تعديل مذكرة مع مرفقات ============
  async function showForm(id = null) {
    const n = id ? await DB.get('notes', id) : null;
    // تحميل المرفقات الحالية (للتعديل)
    const existingAttachments = id ? await DB.getByIndex('noteAttachments', 'noteId', id) : [];

    const body = Utils.el('div');
    body.innerHTML = `
      ${UI.field({ label: 'العنوان', name: 'title', value: n?.title || '', placeholder: 'عنوان المذكرة' })}
      <div class="form-group">
        <label class="form-label">المحتوى</label>
        <textarea class="form-textarea" id="content" style="min-height:150px" placeholder="اكتب مذكرتك هنا...">${Utils.escapeHTML(n?.content || '')}</textarea>
      </div>

      <div class="form-group">
        <label class="form-label">المرفقات (صور / ملفات)</label>
        <div id="attach-drop-zone" style="
          border:2px dashed #cbd5e1;
          border-radius:10px;
          padding:16px;
          text-align:center;
          background:#f8fafc;
          cursor:pointer;
          transition:all 0.15s
        ">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#64748b" stroke-width="2" style="margin:0 auto 6px;display:block">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <div style="font-size:13px;color:#475569;font-weight:600">اضغط لاختيار ملفات أو اسحبها هنا</div>
          <div style="font-size:11px;color:#94a3b8;margin-top:4px">صور (JPG/PNG/GIF) • ملفات (PDF/DOC/XLS...) • حد أقصى 5MB للملف</div>
          <input type="file" id="attach-input" multiple style="display:none" accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx,.txt,.zip" />
        </div>
        <div id="attach-list" style="margin-top:8px"></div>
      </div>

      <div class="form-group">
        <label class="form-label">اللون</label>
        <div class="color-picker" id="nt-colors">
          ${['#fffbeb', '#fee2e2', '#dcfce7', '#dbeafe', '#f3e8ff', '#fce7f3', '#ffffff'].map((c, i) => `
            <div class="color-option ${(n?.color || '#fffbeb') === c ? 'selected' : ''}" data-color="${c}" style="background:${c};border:1px solid #ddd"></div>
          `).join('')}
        </div>
      </div>
      ${UI.toggleField({ label: 'تثبيت', name: 'pinned', checked: n?.pinned || false })}
    `;

    let color = n?.color || '#fffbeb';
    body.querySelectorAll('#nt-colors .color-option').forEach(opt => {
      opt.addEventListener('click', () => {
        body.querySelectorAll('#nt-colors .color-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        color = opt.dataset.color;
      });
    });

    // مصفوفة المرفقات الجديدة (Blob) + معرفات المرفقات المراد حذفها
    const newAttachments = [];
    const toDelete = new Set();

    // عرض المرفقات الموجودة (من قاعدة البيانات)
    function renderAttachList() {
      const list = body.querySelector('#attach-list');
      const items = [];

      existingAttachments.forEach(att => {
        if (toDelete.has(att.id)) return;
        items.push({ id: att.id, name: att.name, size: att.size, type: att.type, isExisting: true });
      });
      newAttachments.forEach((att, idx) => {
        items.push({ idx, name: att.name, size: att.size, type: att.type, isExisting: false });
      });

      if (items.length === 0) {
        list.innerHTML = '';
        return;
      }

      list.innerHTML = items.map(item => {
        const isImage = item.type && item.type.startsWith('image/');
        const icon = isImage
          ? `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`
          : `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
        return `
          <div style="display:flex;align-items:center;gap:8px;padding:8px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:6px">
            <div style="color:#475569;flex-shrink:0">${icon}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${Utils.escapeHTML(item.name)}</div>
              <div style="font-size:10px;color:#94a3b8">${formatSize(item.size)} • ${item.type || 'ملف'}</div>
            </div>
            <button type="button" class="icon-btn" data-remove="${item.isExisting ? item.id : item.idx}" style="color:#dc2626;padding:4px">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        `;
      }).join('');

      list.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          const key = btn.dataset.remove;
          if (existingAttachments.find(a => a.id === key)) {
            toDelete.add(key);
          } else {
            const idx = parseInt(key, 10);
            newAttachments.splice(idx, 1);
          }
          renderAttachList();
        });
      });
    }
    renderAttachList();

    // ربط إدخال الملفات
    const dropZone = body.querySelector('#attach-drop-zone');
    const fileInput = body.querySelector('#attach-input');

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.style.borderColor = '#0d9488';
      dropZone.style.background = '#f0fdfa';
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.style.borderColor = '#cbd5e1';
      dropZone.style.background = '#f8fafc';
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.borderColor = '#cbd5e1';
      dropZone.style.background = '#f8fafc';
      if (e.dataTransfer?.files) handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files) handleFiles(fileInput.files);
      fileInput.value = ''; // إعادة التعيين للسماح بإعادة اختيار نفس الملف
    });

    function handleFiles(files) {
      Array.from(files).forEach(file => {
        if (file.size > 5 * 1024 * 1024) {
          UI.toastError(`الملف "${file.name}" يتجاوز 5 ميجابايت`);
          return;
        }
        newAttachments.push({
          name: file.name,
          size: file.size,
          type: file.type,
          data: file
        });
      });
      renderAttachList();
    }

    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', { class: 'btn btn--outline', onclick: () => close() }, 'إلغاء'),
      Utils.el('button', {
        class: 'btn btn--primary', style: { flex: 1 },
        id: 'nt-save-btn'
      }, 'حفظ')
    ]);

    const close = UI.modal({ title: id ? 'تعديل مذكرة' : 'مذكرة جديدة', body, footer });

    footer.querySelector('#nt-save-btn').addEventListener('click', async () => {
      const saveBtn = footer.querySelector('#nt-save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'جارٍ الحفظ...';
      try {
        const data = {
          ...(n || {}),
          title: body.querySelector('#field_title').value.trim(),
          content: body.querySelector('#content').value,
          color,
          pinned: body.querySelector('[name="pinned"]').checked
        };
        let noteId = id;
        if (id) {
          await DB.put('notes', data);
        } else {
          const saved = await DB.add('notes', data);
          noteId = saved.id;
        }

        // حذف المرفقات المراد حذفها
        for (const attId of toDelete) {
          await DB.remove('noteAttachments', attId);
        }

        // إضافة المرفقات الجديدة
        for (const att of newAttachments) {
          await DB.add('noteAttachments', {
            noteId,
            name: att.name,
            size: att.size,
            type: att.type,
            data: att.data,  // Blob يُخزَّن مباشرة في IndexedDB
            createdAt: Utils.nowISO()
          });
        }

        if (window.Sounds) Sounds.success();
        UI.toastSuccess('تم الحفظ' + (newAttachments.length > 0 ? ` مع ${newAttachments.length} مرفق` : ''));
        close();
        await loadContent();
      } catch (e) {
        console.error(e);
        if (window.Sounds) Sounds.error();
        UI.toastError('حدث خطأ أثناء الحفظ');
        saveBtn.disabled = false;
        saveBtn.textContent = 'حفظ';
      }
    });
  }

  // ============ تفاصيل المذكرة مع عرض المرفقات ============
  async function showDetails(id) {
    const n = await DB.get('notes', id);
    if (!n) return;
    const attachments = await DB.getByIndex('noteAttachments', 'noteId', id);
    attachments.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

    const body = Utils.el('div');
    body.innerHTML = `
      <div class="card" style="background:${n.color || '#fffbeb'}">
        <div style="font-weight:700;font-size:18px">${Utils.escapeHTML(n.title || 'بدون عنوان')}</div>
        <div style="white-space:pre-wrap;margin-top:8px;line-height:1.6">${Utils.escapeHTML(n.content || '')}</div>
      </div>

      ${attachments.length > 0 ? `
        <div style="margin-top:16px">
          <div style="font-size:13px;font-weight:700;color:var(--color-text-secondary);margin-bottom:8px">
            المرفقات (${attachments.length})
          </div>
          <div id="att-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px">
            ${attachments.map(att => {
              const isImage = att.type && att.type.startsWith('image/');
              if (isImage) {
                // صورة: سنعرضها كـ thumbnail عبر ObjectURL (يتم إنشاؤه بعد الإدراج)
                return `
                  <div style="
                    position:relative;
                    aspect-ratio:1;
                    border-radius:8px;
                    overflow:hidden;
                    background:#f1f5f9;
                    cursor:pointer;
                    border:1px solid #e2e8f0
                  " data-att-id="${att.id}" data-att-action="view">
                    <img data-att-img="${att.id}" style="width:100%;height:100%;object-fit:cover" alt="${Utils.escapeHTML(att.name)}" />
                    <div style="position:absolute;bottom:0;right:0;left:0;background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);color:#fff;font-size:9px;padding:6px 4px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${Utils.escapeHTML(att.name)}</div>
                  </div>
                `;
              } else {
                return `
                  <div style="
                    display:flex;flex-direction:column;align-items:center;gap:4px;
                    padding:10px 6px;
                    background:#fff;border:1px solid #e2e8f0;border-radius:8px;
                    cursor:pointer;text-align:center
                  " data-att-id="${att.id}" data-att-action="download">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#475569" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <div style="font-size:9px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;font-weight:600">${Utils.escapeHTML(att.name)}</div>
                    <div style="font-size:8px;color:#94a3b8">${formatSize(att.size)}</div>
                  </div>
                `;
              }
            }).join('')}
          </div>
        </div>
      ` : ''}
    `;

    // إنشاء ObjectURL للصور
    const objectUrls = [];
    setTimeout(() => {
      attachments.forEach(att => {
        if (att.type && att.type.startsWith('image') && att.data) {
          const img = body.querySelector(`[data-att-img="${att.id}"]`);
          if (img) {
            const url = URL.createObjectURL(att.data);
            objectUrls.push(url);
            img.src = url;
          }
        }
      });
    }, 50);

    // ربط النقر على المرفقات
    body.querySelectorAll('[data-att-action]').forEach(el => {
      el.addEventListener('click', async () => {
        const attId = el.dataset.attId;
        const action = el.dataset.attAction;
        const att = attachments.find(a => a.id === attId);
        if (!att) return;

        if (action === 'view') {
          // عرض الصورة بحجم كامل في نافذة جديدة
          const url = URL.createObjectURL(att.data);
          objectUrls.push(url);
          const w = window.open(url, '_blank');
          if (!w) {
            // إذا تعطل فتح نافذة، اعرضها داخل modal
            UI.toast('يرجى السماح بالنوافذ المنبثقة لعرض الصورة');
          }
          setTimeout(() => URL.revokeObjectURL(url), 60000);
        } else if (action === 'download') {
          // تنزيل الملف
          const url = URL.createObjectURL(att.data);
          objectUrls.push(url);
          const a = document.createElement('a');
          a.href = url;
          a.download = att.name;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(url), 10000);
        }
      });
    });

    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', {
        class: 'btn btn--danger',
        onclick: async () => {
          // حذف المرفقات أيضاً
          for (const att of attachments) {
            await DB.remove('noteAttachments', att.id);
          }
          await DB.remove('notes', id);
          UI.toastSuccess('تم حذف المذكرة');
          close();
          await loadContent();
        }
      }, UI.ICONS.trash),
      Utils.el('button', { class: 'btn btn--outline', onclick: () => { close(); showForm(id); } }, UI.ICONS.edit),
      Utils.el('button', {
        class: 'btn',
        onclick: () => {
          n.pinned = !n.pinned;
          DB.put('notes', n).then(() => { close(); loadContent(); });
        }
      }, n.pinned ? 'إلغاء التثبيت' : 'تثبيت')
    ]);

    const close = UI.modal({ title: 'المذكرة', body, footer, size: 'lg' });
  }

  function formatSize(bytes) {
    if (!bytes) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB'];
    let i = 0;
    let size = bytes;
    while (size >= 1024 && i < units.length - 1) {
      size /= 1024;
      i++;
    }
    return `${size.toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
  }

  return { render };
})();

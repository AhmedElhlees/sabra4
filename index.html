/* ===== css/theme.css ===== */
/* =========================================================
   THEME.CSS - متغيرات الثيم والألوان والخطوط
   ========================================================= */

:root {
  /* الألوان الأساسية - ثيم مالي احترافي */
  --color-primary: #0f766e;        /* أخضر مالي عميق */
  --color-primary-light: #14b8a6;
  --color-primary-dark: #134e4a;
  --color-primary-50: #f0fdfa;
  --color-primary-100: #ccfbf1;

  --color-accent: #f59e0b;          /* ذهبي للتمييز */
  --color-accent-light: #fbbf24;

  --color-success: #16a34a;
  --color-success-bg: #dcfce7;
  --color-danger: #dc2626;
  --color-danger-bg: #fee2e2;
  --color-warning: #d97706;
  --color-warning-bg: #fef3c7;
  --color-info: #2563eb;
  --color-info-bg: #dbeafe;

  /* الألوان المحايدة */
  --color-bg: #f8fafc;
  --color-bg-alt: #f1f5f9;
  --color-surface: #ffffff;
  --color-surface-2: #fafbfc;
  --color-border: #e2e8f0;
  --color-border-strong: #cbd5e1;
  --color-divider: #f1f5f9;

  --color-text: #0f172a;
  --color-text-secondary: #475569;
  --color-text-tertiary: #94a3b8;
  --color-text-inverse: #ffffff;
  --color-text-on-primary: #ffffff;

  /* ألوان الفئات */
  --cat-food: #f97316;
  --cat-transport: #3b82f6;
  --cat-shopping: #ec4899;
  --cat-bills: #ef4444;
  --cat-health: #10b981;
  --cat-education: #8b5cf6;
  --cat-entertainment: #f59e0b;
  --cat-other: #64748b;

  /* الخطوط */
  --font-family: 'Tajawal', 'Cairo', 'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-size-xs: 11px;
  --font-size-sm: 13px;
  --font-size-base: 15px;
  --font-size-md: 16px;
  --font-size-lg: 18px;
  --font-size-xl: 22px;
  --font-size-2xl: 28px;
  --font-size-3xl: 36px;

  --fw-normal: 400;
  --fw-medium: 500;
  --fw-semibold: 600;
  --fw-bold: 700;
  --fw-extrabold: 800;

  /* المسافات */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* الزوايا */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-pill: 999px;
  --radius-full: 50%;

  /* الظلال */
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-sm: 0 2px 4px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04);
  --shadow-md: 0 4px 12px rgba(15,23,42,0.08), 0 2px 4px rgba(15,23,42,0.04);
  --shadow-lg: 0 10px 30px rgba(15,23,42,0.10), 0 4px 12px rgba(15,23,42,0.06);
  --shadow-xl: 0 20px 60px rgba(15,23,42,0.15);

  /* الحجم */
  --max-width: 480px;       /* تطبيق موبايل - عرض ثابت على الديسكتوب */
  --bottom-nav-height: 64px;
  --top-bar-height: 56px;

  /* الانتقالات */
  --transition-fast: 150ms ease;
  --transition-base: 250ms ease;
  --transition-slow: 400ms ease;
}

/* ثيم داكن - يُفعّل بإضافة data-theme="dark" على html */
[data-theme="dark"] {
  --color-bg: #0f172a;
  --color-bg-alt: #1e293b;
  --color-surface: #1e293b;
  --color-surface-2: #334155;
  --color-border: #334155;
  --color-border-strong: #475569;
  --color-divider: #334155;

  --color-text: #f1f5f9;
  --color-text-secondary: #cbd5e1;
  --color-text-tertiary: #94a3b8;

  --color-primary-50: #134e4a;
  --color-primary-100: #115e59;

  --shadow-sm: 0 2px 4px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 10px 30px rgba(0,0,0,0.5);
}

/* الخطوط - نحمّلها من Google Fonts عند توفّر الإنترنت، وإلا تستخدم الخط الاحتياطي */
@font-face {
  font-family: 'Tajawal';
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: local('Tajawal'), local('Cairo'), local('Segoe UI');
}

/* إعادة الضبط العامة */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html {
  font-size: var(--font-size-base);
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-family);
  background: var(--color-bg);
  color: var(--color-text);
  line-height: 1.5;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  /* دعم آمن للهواتف ذات النوتش */
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

button, input, select, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

a {
  color: var(--color-primary);
  text-decoration: none;
}

img {
  max-width: 100%;
  display: block;
}

/* أدوات مساعدة عامة */
.hidden { display: none !important; }
.invisible { visibility: hidden; }
.text-center { text-align: center; }
.text-right { text-align: right; }
.text-left { text-align: left; }

.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.items-start { align-items: flex-start; }
.items-end { align-items: flex-end; }
.justify-center { justify-content: center; }
.justify-between { justify-content: space-between; }
.justify-end { justify-content: flex-end; }
.flex-1 { flex: 1; }
.flex-wrap { flex-wrap: wrap; }
.gap-1 { gap: var(--space-1); }
.gap-2 { gap: var(--space-2); }
.gap-3 { gap: var(--space-3); }
.gap-4 { gap: var(--space-4); }
.gap-6 { gap: var(--space-6); }

.w-full { width: 100%; }
.w-auto { width: auto; }

.mt-2 { margin-top: var(--space-2); }
.mt-4 { margin-top: var(--space-4); }
.mt-6 { margin-top: var(--space-6); }
.mb-2 { margin-bottom: var(--space-2); }
.mb-4 { margin-bottom: var(--space-4); }
.mb-6 { margin-bottom: var(--space-6); }
.p-0 { padding: 0; }
.px-4 { padding-left: var(--space-4); padding-right: var(--space-4); }
.py-4 { padding-top: var(--space-4); padding-bottom: var(--space-4); }
.p-4 { padding: var(--space-4); }

.text-xs { font-size: var(--font-size-xs); }
.text-sm { font-size: var(--font-size-sm); }
.text-base { font-size: var(--font-size-base); }
.text-lg { font-size: var(--font-size-lg); }
.text-xl { font-size: var(--font-size-xl); }
.text-2xl { font-size: var(--font-size-2xl); }
.text-3xl { font-size: var(--font-size-3xl); }

.font-medium { font-weight: var(--fw-medium); }
.font-semibold { font-weight: var(--fw-semibold); }
.font-bold { font-weight: var(--fw-bold); }

.text-secondary { color: var(--color-text-secondary); }
.text-tertiary { color: var(--color-text-tertiary); }
.text-primary { color: var(--color-primary); }
.text-danger { color: var(--color-danger); }
.text-success { color: var(--color-success); }
.text-warning { color: var(--color-warning); }
.text-white { color: #fff; }

[dir="rtl"] .ltr { direction: ltr; unicode-bidi: embed; }


/* ===== css/styles.css ===== */
/* =========================================================
   STYLES.CSS - الأنماط الرئيسية والتخطيط
   ========================================================= */

/* حاوية التطبيق - عرض محدود في الديسكتوب ليبدو كتطبيق موبايل */
#app-root {
  width: 100%;
  max-width: var(--max-width);
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--color-bg);
  position: relative;
  padding-bottom: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom) + 8px);
}

/* صفحة عامة */
.page {
  min-height: 100vh;
  min-height: 100dvh;
  animation: pageEnter 280ms ease;
}

@keyframes pageEnter {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.page__header {
  background: var(--color-surface);
  padding: var(--space-4);
  border-bottom: 1px solid var(--color-border);
  position: sticky;
  top: 0;
  z-index: 10;
}

.page__title {
  font-size: var(--font-size-xl);
  font-weight: var(--fw-bold);
  margin: 0;
}

.page__subtitle {
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  margin-top: var(--space-1);
}

.page__body {
  padding: var(--space-4);
}

/* ============ الشريط العلوي ============ */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-4);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--top-bar-height);
}

.topbar__user {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.topbar__avatar {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-full);
  background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: var(--fw-bold);
  font-size: var(--font-size-sm);
}

.topbar__name {
  font-size: var(--font-size-sm);
  font-weight: var(--fw-semibold);
}

.topbar__actions {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.icon-btn {
  width: 38px;
  height: 38px;
  border-radius: var(--radius-full);
  border: none;
  background: transparent;
  color: var(--color-text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  transition: background var(--transition-fast);
}

.icon-btn:hover, .icon-btn:active {
  background: var(--color-bg-alt);
}

.icon-btn--badge::after {
  content: '';
  position: absolute;
  top: 8px;
  left: 8px;
  width: 8px;
  height: 8px;
  background: var(--color-danger);
  border: 2px solid var(--color-surface);
  border-radius: var(--radius-full);
}

/* ============ شاشة البداية ============ */
.splash {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--space-4);
  background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
  color: #fff;
}

.splash__logo {
  width: 96px;
  height: 96px;
  background: rgba(255,255,255,0.15);
  border-radius: var(--radius-xl);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  backdrop-filter: blur(10px);
}

.splash__title {
  font-size: var(--font-size-3xl);
  font-weight: var(--fw-extrabold);
  letter-spacing: -0.5px;
}

.splash__spinner {
  width: 32px;
  height: 32px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: var(--radius-full);
  animation: spin 800ms linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ============ الشريط السفلي ============ */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: var(--max-width);
  height: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom));
  padding-bottom: env(safe-area-inset-bottom);
  background: var(--color-surface);
  border-top: 1px solid var(--color-border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 1000;
  box-shadow: 0 -2px 12px rgba(15,23,42,0.06);
}

.bottom-nav__item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  color: var(--color-text-tertiary);
  font-size: var(--font-size-xs);
  font-weight: var(--fw-medium);
  padding: var(--space-2) 0;
  text-decoration: none;
  transition: color var(--transition-fast);
  cursor: pointer;
  background: none;
  border: none;
}

.bottom-nav__item.active {
  color: var(--color-primary);
}

.bottom-nav__item svg {
  width: 22px;
  height: 22px;
}

.bottom-nav__fab {
  width: 52px;
  height: 52px;
  border-radius: var(--radius-full);
  background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
  color: #fff;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(15,118,110,0.4);
  transition: transform var(--transition-fast);
  margin-top: -20px;
}

.bottom-nav__fab:active {
  transform: scale(0.92);
}

/* ============ شريط تصفية الفترة ============ */
.period-filter {
  display: flex;
  gap: var(--space-2);
  overflow-x: auto;
  padding: var(--space-3) var(--space-4);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  scrollbar-width: none;
}

.period-filter::-webkit-scrollbar { display: none; }

.period-filter__chip {
  flex-shrink: 0;
  padding: var(--space-2) var(--space-4);
  background: var(--color-bg-alt);
  border: 1px solid transparent;
  border-radius: var(--radius-pill);
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
  white-space: nowrap;
}

.period-filter__chip.active {
  background: var(--color-primary);
  color: #fff;
  border-color: var(--color-primary);
}

/* ============ البطاقات الإحصائية ============ */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-3);
  padding: var(--space-4);
}

.stat-card {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--color-border);
  position: relative;
  overflow: hidden;
}

.stat-card--full {
  grid-column: 1 / -1;
}

.stat-card--primary {
  background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
  color: #fff;
}

.stat-card--primary .stat-card__label,
.stat-card--primary .stat-card__sub {
  color: rgba(255,255,255,0.85);
}

.stat-card__label {
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  font-weight: var(--fw-medium);
  margin-bottom: var(--space-2);
}

.stat-card__value {
  font-size: var(--font-size-xl);
  font-weight: var(--fw-bold);
  letter-spacing: -0.5px;
  word-break: break-word;
}

.stat-card__sub {
  font-size: var(--font-size-xs);
  color: var(--color-text-tertiary);
  margin-top: var(--space-1);
}

.stat-card__icon {
  position: absolute;
  top: var(--space-3);
  left: var(--space-3);
  width: 28px;
  height: 28px;
  opacity: 0.7;
}

/* ============ البطاقات العامة ============ */
.card {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--color-border);
  margin-bottom: var(--space-3);
}

.card__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-3);
}

.card__title {
  font-size: var(--font-size-md);
  font-weight: var(--fw-bold);
  margin: 0;
}

.card__subtitle {
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  margin-top: var(--space-1);
}

.card__action {
  color: var(--color-primary);
  font-size: var(--font-size-sm);
  font-weight: var(--fw-medium);
  cursor: pointer;
  background: none;
  border: none;
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-sm);
}

/* ============ القوائم ============ */
.list-item {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) 0;
  border-bottom: 1px solid var(--color-divider);
  cursor: pointer;
  transition: background var(--transition-fast);
}

.list-item:last-child {
  border-bottom: none;
}

.list-item__icon {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);
  background: var(--color-primary-50);
  color: var(--color-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.list-item__body {
  flex: 1;
  min-width: 0;
}

.list-item__title {
  font-size: var(--font-size-base);
  font-weight: var(--fw-semibold);
  margin: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.list-item__subtitle {
  font-size: var(--font-size-xs);
  color: var(--color-text-secondary);
  margin-top: 2px;
}

.list-item__meta {
  text-align: left;
  flex-shrink: 0;
}

.list-item__amount {
  font-size: var(--font-size-base);
  font-weight: var(--fw-bold);
}

.list-item__amount--positive { color: var(--color-success); }
.list-item__amount--negative { color: var(--color-danger); }

/* ============ الحالات الفارغة ============ */
.empty-state {
  text-align: center;
  padding: var(--space-12) var(--space-6);
  color: var(--color-text-secondary);
}

.empty-state__icon {
  width: 72px;
  height: 72px;
  margin: 0 auto var(--space-4);
  background: var(--color-bg-alt);
  border-radius: var(--radius-full);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-text-tertiary);
}

.empty-state__title {
  font-size: var(--font-size-md);
  font-weight: var(--fw-semibold);
  color: var(--color-text);
  margin-bottom: var(--space-2);
}

.empty-state__text {
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  max-width: 280px;
  margin: 0 auto;
}

/* ============ الأزرار ============ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  padding: var(--space-3) var(--space-5);
  border-radius: var(--radius-md);
  border: none;
  font-size: var(--font-size-base);
  font-weight: var(--fw-semibold);
  cursor: pointer;
  transition: all var(--transition-fast);
  text-decoration: none;
  min-height: 44px;
  background: var(--color-bg-alt);
  color: var(--color-text);
}

.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn--primary {
  background: var(--color-primary);
  color: #fff;
}

.btn--primary:hover { background: var(--color-primary-dark); }

.btn--danger {
  background: var(--color-danger);
  color: #fff;
}

.btn--success {
  background: var(--color-success);
  color: #fff;
}

.btn--outline {
  background: transparent;
  border: 1.5px solid var(--color-border-strong);
  color: var(--color-text);
}

.btn--ghost {
  background: transparent;
  color: var(--color-primary);
}

.btn--block {
  width: 100%;
}

.btn--lg {
  padding: var(--space-4) var(--space-6);
  font-size: var(--font-size-md);
  min-height: 52px;
}

.btn--sm {
  padding: var(--space-2) var(--space-3);
  font-size: var(--font-size-sm);
  min-height: 36px;
}

.btn--pill {
  border-radius: var(--radius-pill);
}

/* ============ النماذج ============ */
.form-group {
  margin-bottom: var(--space-4);
}

.form-label {
  display: block;
  font-size: var(--font-size-sm);
  font-weight: var(--fw-medium);
  margin-bottom: var(--space-2);
  color: var(--color-text);
}

.form-label .required {
  color: var(--color-danger);
  margin-right: 2px;
}

.form-input,
.form-select,
.form-textarea {
  width: 100%;
  padding: var(--space-3) var(--space-4);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-md);
  background: var(--color-surface);
  color: var(--color-text);
  font-size: var(--font-size-base);
  transition: border-color var(--transition-fast);
  min-height: 44px;
}

.form-input:focus,
.form-select:focus,
.form-textarea:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(15,118,110,0.1);
}

.form-textarea {
  min-height: 80px;
  resize: vertical;
}

.form-hint {
  font-size: var(--font-size-xs);
  color: var(--color-text-tertiary);
  margin-top: var(--space-1);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-3);
}

/* ============ المفاتيح (Toggle) ============ */
.toggle {
  position: relative;
  display: inline-block;
  width: 44px;
  height: 26px;
}

.toggle__input {
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle__slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: var(--color-border-strong);
  border-radius: var(--radius-pill);
  transition: background var(--transition-fast);
}

.toggle__slider::before {
  content: '';
  position: absolute;
  height: 20px;
  width: 20px;
  right: 3px;
  top: 3px;
  background: #fff;
  border-radius: var(--radius-full);
  transition: transform var(--transition-fast);
  box-shadow: var(--shadow-sm);
}

.toggle__input:checked + .toggle__slider {
  background: var(--color-primary);
}

.toggle__input:checked + .toggle__slider::before {
  transform: translateX(-18px);
}

/* ============ التبويبات ============ */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--color-border);
  background: var(--color-surface);
  overflow-x: auto;
  scrollbar-width: none;
}

.tabs::-webkit-scrollbar { display: none; }

.tab {
  flex-shrink: 0;
  padding: var(--space-3) var(--space-4);
  font-size: var(--font-size-sm);
  font-weight: var(--fw-medium);
  color: var(--color-text-secondary);
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  transition: all var(--transition-fast);
  white-space: nowrap;
}

.tab.active {
  color: var(--color-primary);
  border-bottom-color: var(--color-primary);
}

/* ============ الشارات ============ */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px var(--space-2);
  background: var(--color-bg-alt);
  color: var(--color-text-secondary);
  border-radius: var(--radius-pill);
  font-size: var(--font-size-xs);
  font-weight: var(--fw-medium);
}

.badge--primary { background: var(--color-primary-50); color: var(--color-primary); }
.badge--success { background: var(--color-success-bg); color: var(--color-success); }
.badge--danger { background: var(--color-danger-bg); color: var(--color-danger); }
.badge--warning { background: var(--color-warning-bg); color: var(--color-warning); }
.badge--info { background: var(--color-info-bg); color: var(--color-info); }

/* ============ شريط البحث ============ */
.search-bar {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  background: var(--color-bg-alt);
  border-radius: var(--radius-md);
  margin: var(--space-3) var(--space-4);
}

.search-bar input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: var(--font-size-sm);
  color: var(--color-text);
}

.search-bar input:focus { outline: none; }

/* ============ الفاب العائم (FAB) ============ */
.fab {
  position: fixed;
  bottom: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom) + 16px);
  left: 50%;
  transform: translateX(calc(var(--max-width)/2 - 36px));
  width: 56px;
  height: 56px;
  border-radius: var(--radius-full);
  background: var(--color-primary);
  color: #fff;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: var(--shadow-lg);
  z-index: 50;
}

/* ============ حاوية الإشعارات (Toast) ============ */
.toast-root {
  position: fixed;
  bottom: calc(var(--bottom-nav-height) + 32px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  pointer-events: none;
  width: 100%;
  max-width: var(--max-width);
  padding: 0 var(--space-4);
}

.toast {
  background: var(--color-text);
  color: #fff;
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-md);
  font-size: var(--font-size-sm);
  box-shadow: var(--shadow-lg);
  pointer-events: auto;
  animation: toastIn 250ms ease;
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.toast--success { background: var(--color-success); }
.toast--danger { background: var(--color-danger); }
.toast--warning { background: var(--color-warning); }

@keyframes toastIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============ النوافذ المنبثقة (Modal) ============ */
.modal-root {
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,0.5);
  backdrop-filter: blur(4px);
  animation: fadeIn 200ms ease;
  pointer-events: auto;
}

.modal {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: var(--max-width);
  max-height: 90vh;
  background: var(--color-surface);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  box-shadow: var(--shadow-xl);
  animation: modalUp 280ms ease;
  pointer-events: auto;
  display: flex;
  flex-direction: column;
}

@keyframes modalUp {
  from { transform: translate(-50%, 100%); }
  to { transform: translate(-50%, 0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal__handle {
  width: 40px;
  height: 4px;
  background: var(--color-border-strong);
  border-radius: var(--radius-pill);
  margin: var(--space-3) auto var(--space-2);
}

.modal__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-2) var(--space-4) var(--space-3);
  border-bottom: 1px solid var(--color-divider);
}

.modal__title {
  font-size: var(--font-size-lg);
  font-weight: var(--fw-bold);
}

.modal__body {
  padding: var(--space-4);
  overflow-y: auto;
  flex: 1;
}

.modal__footer {
  padding: var(--space-3) var(--space-4);
  border-top: 1px solid var(--color-divider);
  display: flex;
  gap: var(--space-2);
}

.modal__close {
  background: none;
  border: none;
  color: var(--color-text-tertiary);
  font-size: var(--font-size-lg);
  cursor: pointer;
  width: 32px;
  height: 32px;
  border-radius: var(--radius-full);
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal__close:hover { background: var(--color-bg-alt); }

/* ============ الصفحة الرئيسية - الرسم البياني ============ */
.chart-container {
  padding: var(--space-4);
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--color-border);
}

.chart-canvas {
  width: 100%;
  height: 200px;
  display: block;
}

/* ============ شريط التقدّم ============ */
.progress {
  width: 100%;
  height: 8px;
  background: var(--color-bg-alt);
  border-radius: var(--radius-pill);
  overflow: hidden;
}

.progress__bar {
  height: 100%;
  background: var(--color-primary);
  border-radius: var(--radius-pill);
  transition: width 400ms ease;
}

/* ============ شبكة الإجراءات السريعة ============ */
.quick-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-3);
  padding: var(--space-4);
}

.quick-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-3);
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  cursor: pointer;
  transition: all var(--transition-fast);
  text-align: center;
}

.quick-item:active { transform: scale(0.96); }

.quick-item__icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--color-primary-50);
  color: var(--color-primary);
}

.quick-item__label {
  font-size: var(--font-size-xs);
  color: var(--color-text-secondary);
  font-weight: var(--fw-medium);
}

/* ============ لوحة المعلومات (التحليلات) ============ */
.analytics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-2);
  padding: var(--space-3) 0;
}

.analytics-item {
  padding: var(--space-3);
  background: var(--color-bg-alt);
  border-radius: var(--radius-md);
}

.analytics-item__label {
  font-size: var(--font-size-xs);
  color: var(--color-text-secondary);
  margin-bottom: var(--space-1);
}

.analytics-item__value {
  font-size: var(--font-size-md);
  font-weight: var(--fw-bold);
}

/* ============ شريط التمرير للتبويبات الأفقية ============ */
.h-scroll {
  display: flex;
  gap: var(--space-3);
  overflow-x: auto;
  padding: var(--space-3) var(--space-4);
  scrollbar-width: none;
}

.h-scroll::-webkit-scrollbar { display: none; }

.h-scroll__item {
  flex-shrink: 0;
  width: 140px;
}

/* ============ صندوق الإدخال مع رمز ============ */
.input-group {
  display: flex;
  align-items: stretch;
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-md);
  overflow: hidden;
  background: var(--color-surface);
}

.input-group__addon {
  padding: 0 var(--space-3);
  background: var(--color-bg-alt);
  display: flex;
  align-items: center;
  color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
  border-left: 1px solid var(--color-border);
}

[dir="rtl"] .input-group__addon {
  border-left: 1px solid var(--color-border);
  border-right: none;
}

.input-group__input {
  flex: 1;
  border: none;
  padding: var(--space-3);
  background: transparent;
  font-size: var(--font-size-base);
}

.input-group__input:focus { outline: none; }

/* ============ الفاصل ============ */
.divider {
  height: 1px;
  background: var(--color-divider);
  margin: var(--space-4) 0;
}

.divider--text {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  color: var(--color-text-tertiary);
  font-size: var(--font-size-sm);
  background: transparent;
  height: auto;
}

.divider--text::before,
.divider--text::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--color-divider);
}

/* ============ سهم الرجوع ============ */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  background: none;
  border: none;
  color: var(--color-text);
  font-size: var(--font-size-base);
  font-weight: var(--fw-medium);
  cursor: pointer;
  padding: var(--space-2);
  border-radius: var(--radius-md);
  margin-right: calc(var(--space-2) * -1);
}

.back-btn:hover { background: var(--color-bg-alt); }

/* ============ اختيار العملة ============ */
.currency-display {
  display: inline-flex;
  align-items: baseline;
  gap: 2px;
}

.currency-display__amount {
  font-weight: var(--fw-bold);
}

.currency-display__symbol {
  font-size: 0.75em;
  color: var(--color-text-tertiary);
}

/* ============ صف الإدخال المتعدد ============ */
.segmented {
  display: flex;
  background: var(--color-bg-alt);
  border-radius: var(--radius-md);
  padding: 3px;
  gap: 2px;
}

.segmented__btn {
  flex: 1;
  padding: var(--space-2);
  border: none;
  background: transparent;
  color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
  font-weight: var(--fw-medium);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.segmented__btn.active {
  background: var(--color-surface);
  color: var(--color-text);
  box-shadow: var(--shadow-xs);
}

/* ============ الصفحة تسجيل الدخول ============ */
.login-page {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(180deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #fff;
  padding: var(--space-6);
}

.login-page__logo {
  margin: var(--space-12) auto var(--space-6);
  text-align: center;
}

.login-page__logo-icon {
  width: 88px;
  height: 88px;
  background: rgba(255,255,255,0.15);
  border-radius: var(--radius-xl);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto var(--space-4);
  backdrop-filter: blur(10px);
}

.login-page__title {
  font-size: var(--font-size-3xl);
  font-weight: var(--fw-extrabold);
  letter-spacing: -0.5px;
  text-align: center;
}

.login-page__subtitle {
  font-size: var(--font-size-sm);
  opacity: 0.85;
  text-align: center;
  margin-top: var(--space-2);
}

.login-page__form {
  background: #fff;
  color: var(--color-text);
  border-radius: var(--radius-xl);
  padding: var(--space-6);
  margin-top: auto;
  box-shadow: var(--shadow-xl);
}

/* ============ التذييل ============ */
.app-footer {
  text-align: center;
  padding: var(--space-4);
  color: var(--color-text-tertiary);
  font-size: var(--font-size-xs);
}

/* ============ المؤشرات الصغيرة ============ */
.dot {
  width: 8px;
  height: 8px;
  border-radius: var(--radius-full);
  display: inline-block;
}

.dot--success { background: var(--color-success); }
.dot--danger { background: var(--color-danger); }
.dot--warning { background: var(--color-warning); }
.dot--muted { background: var(--color-text-tertiary); }

/* ============ تنبيه ============ */
.alert {
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-md);
  font-size: var(--font-size-sm);
  display: flex;
  align-items: flex-start;
  gap: var(--space-2);
  margin-bottom: var(--space-3);
}

.alert--info { background: var(--color-info-bg); color: var(--color-info); }
.alert--warning { background: var(--color-warning-bg); color: var(--color-warning); }
.alert--danger { background: var(--color-danger-bg); color: var(--color-danger); }
.alert--success { background: var(--color-success-bg); color: var(--color-success); }

/* ============ العدّاد ============ */
.counter {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  background: var(--color-primary-50);
  color: var(--color-primary);
  padding: 2px var(--space-2);
  border-radius: var(--radius-pill);
  font-size: var(--font-size-xs);
  font-weight: var(--fw-bold);
}

/* ============ استجابة الشاشة ============ */
@media (min-width: 768px) {
  body {
    background: var(--color-bg-alt);
  }
  #app-root {
    box-shadow: var(--shadow-lg);
  }
}

/* منع التكبير على iOS */
input, select, textarea {
  font-size: var(--font-size-base);
}


/* ===== css/components.css ===== */
/* =========================================================
   COMPONENTS.CSS - مكونات إضافية متقدمة
   ========================================================= */

/* ============ خيارات التصنيف بألوان ============ */
.category-pill {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: 4px var(--space-2);
  border-radius: var(--radius-pill);
  font-size: var(--font-size-xs);
  font-weight: var(--fw-medium);
}

.category-pill__dot {
  width: 8px;
  height: 8px;
  border-radius: var(--radius-full);
}

/* ============ شجرة المجموعات ============ */
.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-2) 0;
  font-size: var(--font-size-sm);
}

.summary-row__label {
  color: var(--color-text-secondary);
}

.summary-row__value {
  font-weight: var(--fw-semibold);
}

.summary-row--total {
  border-top: 2px solid var(--color-divider);
  margin-top: var(--space-2);
  padding-top: var(--space-3);
  font-size: var(--font-size-md);
}

.summary-row--total .summary-row__label,
.summary-row--total .summary-row__value {
  font-weight: var(--fw-bold);
}

/* ============ بطاقة المحفظة ============ */
.wallet-card {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--color-border);
  margin-bottom: var(--space-3);
  cursor: pointer;
  transition: all var(--transition-fast);
  position: relative;
  overflow: hidden;
}

.wallet-card:active { transform: scale(0.99); }

.wallet-card--gradient {
  background: linear-gradient(135deg, var(--gradient-from, var(--color-primary)), var(--gradient-to, var(--color-primary-dark)));
  color: #fff;
  border: none;
}

.wallet-card__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-3);
}

.wallet-card__name {
  font-size: var(--font-size-md);
  font-weight: var(--fw-bold);
}

.wallet-card__balance {
  font-size: var(--font-size-2xl);
  font-weight: var(--fw-extrabold);
  letter-spacing: -1px;
}

.wallet-card__currency {
  font-size: var(--font-size-sm);
  opacity: 0.8;
}

.wallet-card__footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: var(--space-3);
  font-size: var(--font-size-xs);
  opacity: 0.8;
}

/* ============ جدول بسيط ============ */
.table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--font-size-sm);
}

.table th, .table td {
  padding: var(--space-3);
  text-align: right;
  border-bottom: 1px solid var(--color-divider);
}

.table th {
  font-weight: var(--fw-semibold);
  color: var(--color-text-secondary);
  background: var(--color-bg-alt);
}

/* ============ زر إضافة عائم صغير ============ */
.add-btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  background: var(--color-primary-50);
  color: var(--color-primary);
  border: 1px dashed var(--color-primary);
  border-radius: var(--radius-md);
  cursor: pointer;
  font-size: var(--font-size-sm);
  font-weight: var(--fw-medium);
  transition: all var(--transition-fast);
}

.add-btn:hover {
  background: var(--color-primary);
  color: #fff;
}

/* ============ قائمة اختيار سريعة ============ */
.choice-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--space-3);
  padding: var(--space-4) 0;
}

.choice-item {
  padding: var(--space-4);
  background: var(--color-surface);
  border: 2px solid var(--color-border);
  border-radius: var(--radius-md);
  cursor: pointer;
  text-align: center;
  transition: all var(--transition-fast);
}

.choice-item:hover {
  border-color: var(--color-primary);
  background: var(--color-primary-50);
}

.choice-item__icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-md);
  background: var(--color-primary-50);
  color: var(--color-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto var(--space-2);
}

.choice-item__title {
  font-size: var(--font-size-sm);
  font-weight: var(--fw-semibold);
}

.choice-item__desc {
  font-size: var(--font-size-xs);
  color: var(--color-text-secondary);
  margin-top: 2px;
}

/* ============ صفحة فارغة مع زر ============ */
.empty-action {
  margin-top: var(--space-4);
}

/* ============ مؤشر التحميل داخل الأزرار ============ */
.spinner-sm {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: var(--radius-full);
  animation: spin 600ms linear infinite;
}

/* ============ شريط شارة النسبة ============ */
.ratio-bar {
  display: flex;
  height: 24px;
  border-radius: var(--radius-pill);
  overflow: hidden;
  background: var(--color-bg-alt);
}

.ratio-bar__segment {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--font-size-xs);
  color: #fff;
  font-weight: var(--fw-semibold);
  transition: width 400ms ease;
}

/* ============ شارة حالة ============ */
.status-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px var(--space-2);
  border-radius: var(--radius-pill);
  font-size: var(--font-size-xs);
  font-weight: var(--fw-semibold);
}

.status-chip--active { background: var(--color-success-bg); color: var(--color-success); }
.status-chip--archived { background: var(--color-bg-alt); color: var(--color-text-tertiary); }
.status-chip--overdue { background: var(--color-danger-bg); color: var(--color-danger); }
.status-chip--paid { background: var(--color-info-bg); color: var(--color-info); }

/* ============ خيارات الراديو ============ */
.radio-row {
  display: flex;
  gap: var(--space-3);
  flex-wrap: wrap;
}

.radio-card {
  flex: 1;
  min-width: 140px;
  padding: var(--space-3) var(--space-4);
  border: 2px solid var(--color-border);
  border-radius: var(--radius-md);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: var(--space-2);
  transition: all var(--transition-fast);
}

.radio-card input {
  accent-color: var(--color-primary);
}

.radio-card:has(input:checked) {
  border-color: var(--color-primary);
  background: var(--color-primary-50);
}

.radio-card__label {
  font-size: var(--font-size-sm);
  font-weight: var(--fw-medium);
  cursor: pointer;
}

/* ============ ترقيم الصفحات في النماذج ============ */
.step-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  padding: var(--space-3);
}

.step-dot {
  width: 8px;
  height: 8px;
  border-radius: var(--radius-full);
  background: var(--color-border-strong);
  transition: all var(--transition-fast);
}

.step-dot.active {
  background: var(--color-primary);
  width: 24px;
}

/* ============ بطاقة المستفيد ============ */
.beneficiary-card {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3);
  background: var(--color-bg-alt);
  border-radius: var(--radius-md);
  margin-bottom: var(--space-3);
}

.beneficiary-card__avatar {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-full);
  background: var(--color-primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: var(--fw-bold);
  flex-shrink: 0;
}

/* ============ أيقونات SVG عامة ============ */
.icon {
  width: 24px;
  height: 24px;
  flex-shrink: 0;
}

.icon-sm { width: 18px; height: 18px; }
.icon-lg { width: 32px; height: 32px; }
.icon-xl { width: 48px; height: 48px; }

/* ============ لوحة الميز ============ */
.balance-row {
  display: flex;
  justify-content: space-between;
  padding: var(--space-3) 0;
  border-bottom: 1px solid var(--color-divider);
}

.balance-row:last-child {
  border-bottom: none;
}

.balance-row--total {
  border-top: 2px solid var(--color-text);
  border-bottom: none;
  padding-top: var(--space-4);
  margin-top: var(--space-2);
  font-weight: var(--fw-bold);
  font-size: var(--font-size-lg);
}

/* ============ قسم العنوان ============ */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-4) var(--space-2);
}

.section-header__title {
  font-size: var(--font-size-md);
  font-weight: var(--fw-bold);
}

.section-header__action {
  font-size: var(--font-size-sm);
  color: var(--color-primary);
  font-weight: var(--fw-medium);
  cursor: pointer;
  background: none;
  border: none;
}

/* ============ قائمة الخدمات الجاهزة ============ */
.service-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-3);
}

.service-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-3);
  background: var(--color-surface);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--transition-fast);
  text-align: center;
}

.service-card:active { transform: scale(0.96); }

.service-card__icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--color-primary-50);
  color: var(--color-primary);
}

.service-card__label {
  font-size: var(--font-size-xs);
  font-weight: var(--fw-medium);
  color: var(--color-text-secondary);
}

/* ============ قائمة أيقونات قابلة للاختيار ============ */
.icon-picker {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: var(--space-2);
}

.icon-option {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--color-bg-alt);
  border: 2px solid transparent;
  border-radius: var(--radius-md);
  cursor: pointer;
  color: var(--color-text-secondary);
}

.icon-option.selected {
  border-color: var(--color-primary);
  background: var(--color-primary-50);
  color: var(--color-primary);
}

/* ============ لوحة الألوان ============ */
.color-picker {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
}

.color-option {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-full);
  cursor: pointer;
  border: 3px solid transparent;
  transition: all var(--transition-fast);
}

.color-option.selected {
  border-color: var(--color-text);
  transform: scale(1.1);
}

/* ============ Sheet (شريط سفلي منزلق) ============ */
.sheet-root {
  position: fixed;
  inset: 0;
  z-index: 9000;
}

.sheet {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: var(--max-width);
  max-height: 80vh;
  background: var(--color-surface);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  box-shadow: var(--shadow-xl);
  animation: modalUp 280ms ease;
  display: flex;
  flex-direction: column;
}

.sheet__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4);
  border-bottom: 1px solid var(--color-divider);
}

.sheet__body {
  padding: var(--space-4);
  overflow-y: auto;
  flex: 1;
}

/* ============ عناصر القائمة المنبثقة ============ */
.action-sheet-item {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-4);
  background: none;
  border: none;
  width: 100%;
  cursor: pointer;
  font-size: var(--font-size-base);
  color: var(--color-text);
  border-bottom: 1px solid var(--color-divider);
  text-align: right;
}

.action-sheet-item:last-child { border-bottom: none; }
.action-sheet-item:active { background: var(--color-bg-alt); }

.action-sheet-item--danger { color: var(--color-danger); }

/* ============ صف مع رمز يسار ============ */
.icon-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  cursor: pointer;
  transition: background var(--transition-fast);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-divider);
}

.icon-row:last-child { border-bottom: none; }
.icon-row:active { background: var(--color-bg-alt); }

.icon-row__icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-md);
  background: var(--color-primary-50);
  color: var(--color-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.icon-row__body {
  flex: 1;
}

.icon-row__title {
  font-size: var(--font-size-base);
  font-weight: var(--fw-medium);
}

.icon-row__subtitle {
  font-size: var(--font-size-xs);
  color: var(--color-text-secondary);
  margin-top: 2px;
}

.icon-row__chevron {
  color: var(--color-text-tertiary);
}

/* ============ تنسيقات الطباعة ============ */
@media print {
  .bottom-nav, .fab, .topbar { display: none !important; }
  body { background: #fff; }
}

/* ============ تمرير سلس ============ */
.scrollable {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ============ حاوية بإطار ============ */
.bordered {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
}

/* ============ تأثير ضغط على الأزرار ============ */
.pressable {
  cursor: pointer;
  transition: transform var(--transition-fast);
}

.pressable:active {
  transform: scale(0.97);
}

/* ============ خلفية مزخرفة للرأس ============ */
.gradient-header {
  background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
  color: #fff;
  padding: var(--space-6) var(--space-4);
  border-radius: 0 0 var(--radius-xl) var(--radius-xl);
  margin-bottom: var(--space-4);
}

/* ============ مؤشر تاريخ ============ */
.date-pill {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: 4px var(--space-2);
  background: var(--color-bg-alt);
  border-radius: var(--radius-pill);
  font-size: var(--font-size-xs);
  color: var(--color-text-secondary);
}

/* ============ رقم كبير ============ */
.big-number {
  font-size: var(--font-size-3xl);
  font-weight: var(--fw-extrabold);
  letter-spacing: -1.5px;
  line-height: 1;
}

/* ============ تنبيه منخفض الكثافة ============ */
.notice {
  padding: var(--space-2) var(--space-3);
  background: var(--color-warning-bg);
  color: var(--color-warning);
  border-radius: var(--radius-sm);
  font-size: var(--font-size-xs);
  display: flex;
  align-items: center;
  gap: var(--space-1);
}

/* =========================================================
   ============ شاشة تسجيل الدخول - لوحة PIN ============
   ========================================================= */

.login-page--pin {
  /* توسيط المحتوى عمودياً مع الحفاظ على الشعار في الأعلى */
  justify-content: space-between;
  padding: var(--space-8) var(--space-6) var(--space-6);
}

/* عرض نقاط PIN */
.pin-display {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: var(--space-4);
  margin: var(--space-6) auto var(--space-2);
  direction: ltr;
}

.pin-dot {
  width: 18px;
  height: 18px;
  border-radius: var(--radius-full);
  border: 2px solid rgba(255, 255, 255, 0.55);
  background: transparent;
  transition: all var(--transition-fast);
}

.pin-dot.filled {
  background: #fff;
  border-color: #fff;
  transform: scale(1.08);
  box-shadow: 0 0 12px rgba(255, 255, 255, 0.45);
}

/* اهتزاز عند الخطأ */
@keyframes pin-shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

.pin-display.shake {
  animation: pin-shake 0.45s ease-in-out;
}

/* تلميح أسفل النقاط */
.pin-hint {
  text-align: center;
  font-size: var(--font-size-sm);
  color: rgba(255, 255, 255, 0.85);
  margin-bottom: var(--space-6);
  min-height: 20px;
  transition: color var(--transition-fast);
}

.pin-hint.error {
  color: #fecaca;
  font-weight: var(--fw-semibold);
}

.pin-hint.success {
  color: #bbf7d0;
  font-weight: var(--fw-semibold);
}

/* لوحة الأرقام - مصممة بتباعد سخٍي بين الأزرار لمنع التداخل البصري */
.pin-pad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  /* تباعد أفقي ورأسي سخٍي - مساحة كافية بين كل زرين */
  gap: clamp(12px, 4vw, 18px);
  width: 100%;
  max-width: 290px;
  margin: 0 auto;
  padding: 0;
}

.pin-pad__key {
  /* دائرة حقيقية: نستخدم aspect-ratio فقط (بلا max-height يكسرها) */
  aspect-ratio: 1 / 1;
  width: 100%;
  height: auto;
  border: none;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.14);
  color: #fff;
  font-size: clamp(15px, 4.2vw, 19px);
  font-weight: var(--fw-semibold);
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background var(--transition-fast), transform 80ms ease;
  backdrop-filter: blur(8px);
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  overflow: hidden;
  line-height: 1;
  /* حد أقصى للحجم على الشاشات الكبيرة لمنع تضخم الأزرار */
  max-width: 62px;
  justify-self: center;
}

.pin-pad__key:hover {
  background: rgba(255, 255, 255, 0.22);
}

.pin-pad__key:active {
  background: rgba(255, 255, 255, 0.35);
  transform: scale(0.94);
}

.pin-pad__key--action {
  background: rgba(0, 0, 0, 0.18);
  font-size: 18px;
}

.pin-pad__key--action:hover {
  background: rgba(0, 0, 0, 0.28);
}

.pin-pad__key--action:active {
  background: rgba(0, 0, 0, 0.38);
  transform: scale(0.94);
}

/* تذييل صفحة الدخول - معلومات المصمم */
.login-page__footer {
  margin-top: var(--space-6);
  text-align: center;
}

.login-page__designer {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  margin-bottom: var(--space-3);
  padding: var(--space-3);
  background: rgba(255, 255, 255, 0.08);
  border-radius: var(--radius-md);
  backdrop-filter: blur(6px);
}

.login-page__designer-label {
  font-size: var(--font-size-xs);
  color: rgba(255, 255, 255, 0.7);

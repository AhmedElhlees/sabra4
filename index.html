/* ===== js/pages/investments.js ===== */
/* =========================================================
   INVESTMENTS.JS - نظام الاستثمارات المتكامل
   =========================================================
   تابع لقسم الالتزامات. يدعم:
   - 8 أنواع استثمار (أسهم/سندات/عقارات/ذهب/عملات رقمية/مشروع/ودائع/أخرى)
   - 4 مستويات مخاطرة (منخفض/متوسط/عالي/عالٍ جداً)
   - 3 حالات (نشط/منجز/خسارة)
   - ربط الاستثمار بمحفظة (خصم تلقائي للمبلغ المستثمر)
   - معاملات الإيداع/السحب/الأرباح لكل استثمار
   - سجل تحديثات القيمة + رسم بياني للقيمة عبر الزمن
   - تاريخ استحقاق + تذكير تلقائي
   - تقرير شامل بالأرباح والخسائر
   - حذف مؤمّن بكلمة السر
   ========================================================= */

window.InvestmentsPage = (function () {
  'use strict';

  let activeFilter = 'all';     // all | active | completed | lost
  let activeTypeFilter = 'all'; // all | stocks | bonds | ...
  let searchQuery = '';

  const TYPE_LABELS = {
    stocks:      'أسهم',
    bonds:       'سندات',
    real_estate: 'عقارات',
    gold:        'ذهب ومعادن',
    crypto:      'عملات رقمية',
    business:    'مشروع تجاري',
    savings:     'ودائع/ادخار',
    other:       'أخرى'
  };

  const TYPE_COLORS = {
    stocks:      '#2563eb',
    bonds:       '#7c3aed',
    real_estate: '#0d9488',
    gold:        '#d97706',
    crypto:      '#db2777',
    business:    '#16a34a',
    savings:     '#0891b2',
    other:       '#64748b'
  };

  const RISK_LABELS = {
    low:      { label: 'منخفض',  color: '#16a34a', bg: '#f0fdf4' },
    medium:   { label: 'متوسط',  color: '#d97706', bg: '#fffbeb' },
    high:     { label: 'عالٍ',    color: '#dc2626', bg: '#fef2f2' },
    very_high:{ label: 'عالٍ جداً', color: '#7c2d12', bg: '#fef2f2' }
  };

  const STATUS_LABELS = {
    active:    { label: 'نشط',   color: '#0891b2', bg: '#ecfeff' },
    completed: { label: 'منجز',  color: '#16a34a', bg: '#f0fdf4' },
    lost:      { label: 'خسارة', color: '#dc2626', bg: '#fef2f2' }
  };

  const TX_LABELS = {
    deposit:    { label: 'إيداع رأس مال', icon: '↓', color: '#2563eb' },
    withdrawal: { label: 'سحب',           icon: '↑', color: '#dc2626' },
    profit:     { label: 'أرباح/توزيعات', icon: '+', color: '#16a34a' },
    fee:        { label: 'رسوم/ضرائب',   icon: '−', color: '#d97706' },
    adjustment: { label: 'تسوية قيمة',    icon: '=', color: '#7c3aed' }
  };

  async function render() {
    const root = document.getElementById('app-root');
    document.getElementById('bottom-nav').classList.remove('hidden');

    const user = await Auth.getCurrentUser();

    root.innerHTML = `
      ${UI.topbar({ userName: user?.name || '', avatarText: Utils.initials(user?.name || '') }).outerHTML}
      <div class="page">
        <div class="page__header" style="display:flex;align-items:center;gap:8px">
          <button class="back-btn" onclick="history.back()">${UI.ICONS.chevronRight}</button>
          <div style="flex:1">
            <h1 class="page__title">الاستثمارات</h1>
            <p class="page__subtitle" style="margin:0">سجّل استثماراتك، تتبّع معاملاتها وأرباحها، واربطها بمحافظك</p>
          </div>
        </div>

        <div id="inv-summary"></div>

        <div class="segmented" style="margin:0 16px 8px">
          <button class="segmented__btn ${activeFilter === 'all' ? 'active' : ''}" data-filter="all">الكل</button>
          <button class="segmented__btn ${activeFilter === 'active' ? 'active' : ''}" data-filter="active">نشطة</button>
          <button class="segmented__btn ${activeFilter === 'completed' ? 'active' : ''}" data-filter="completed">منجزة</button>
          <button class="segmented__btn ${activeFilter === 'lost' ? 'active' : ''}" data-filter="lost">خسائر</button>
        </div>

        <div class="page__body" id="investments-body"></div>
      </div>
    `;

    const topbarEl = root.querySelector('.topbar');
    topbarEl.replaceWith(UI.topbar({
      userName: user?.name || '',
      avatarText: Utils.initials(user?.name || '')
    }));

    root.querySelectorAll('.segmented__btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeFilter = btn.dataset.filter;
        root.querySelectorAll('.segmented__btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderList();
      });
    });

    await renderSummary();
    await renderList();
  }

  async function renderSummary() {
    const container = document.getElementById('inv-summary');
    const investments = await DB.getAll('investments');
    const currency = State.get('currentCurrency');

    // حساب الإجماليات
    const totalInvested = investments.reduce((s, i) => s + Number(i.amountInvested || 0), 0);
    const totalCurrent  = investments.reduce((s, i) => s + Number(i.currentValue  || 0), 0);
    const totalProfit   = totalCurrent - totalInvested;
    const profitPct     = totalInvested > 0 ? (totalProfit / totalInvested) * 100 : 0;

    const active    = investments.filter(i => (i.status || 'active') === 'active').length;
    const completed = investments.filter(i => i.status === 'completed').length;
    const lost      = investments.filter(i => i.status === 'lost').length;

    // توزيع الأنواع
    const typeBreakdown = {};
    investments.forEach(i => {
      const t = i.type || 'other';
      if (!typeBreakdown[t]) typeBreakdown[t] = { count: 0, value: 0 };
      typeBreakdown[t].count++;
      typeBreakdown[t].value += Number(i.currentValue || 0);
    });
    const typeList = Object.entries(typeBreakdown)
      .sort((a, b) => b[1].value - a[1].value)
      .slice(0, 4);

    container.innerHTML = `
      <div class="card" style="margin:0 16px 12px">
        <div class="summary-row">
          <span>إجمالي المستثمر</span>
          <span class="font-bold">${Utils.formatMoney(totalInvested, currency)}</span>
        </div>
        <div class="summary-row">
          <span>القيمة الحالية</span>
          <span class="font-bold">${Utils.formatMoney(totalCurrent, currency)}</span>
        </div>
        <div class="summary-row">
          <span>الربح / الخسارة</span>
          <span class="font-bold" style="color:${totalProfit >= 0 ? 'var(--color-success)' : 'var(--color-danger)'}">
            ${totalProfit >= 0 ? '+' : ''}${Utils.formatMoney(totalProfit, currency)}
            (${profitPct >= 0 ? '+' : ''}${profitPct.toFixed(1)}%)
          </span>
        </div>
        <div class="summary-row">
          <span>العدد</span>
          <span>${investments.length} (نشطة ${active} • منجزة ${completed} • خسارة ${lost})</span>
        </div>
      </div>

      ${typeList.length > 0 ? `
        <div class="card" style="margin:0 16px 16px">
          <div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:8px">توزيع حسب النوع</div>
          ${typeList.map(([type, data]) => {
            const pct = totalCurrent > 0 ? (data.value / totalCurrent * 100) : 0;
            return `
              <div style="margin-bottom:8px">
                <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
                  <span>${TYPE_LABELS[type] || 'أخرى'} (${data.count})</span>
                  <span style="color:var(--color-text-secondary)">${Utils.formatMoney(data.value, currency)}</span>
                </div>
                <div style="height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden">
                  <div style="height:100%;width:${pct}%;background:${TYPE_COLORS[type] || '#64748b'};border-radius:3px"></div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      ` : ''}
    `;
  }

  async function renderList() {
    const container = document.getElementById('investments-body');
    container.innerHTML = '<div style="text-align:center;padding:20px"><div class="spinner-sm" style="margin:0 auto"></div></div>';

    let investments = await DB.getAll('investments');
    investments.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    if (activeFilter !== 'all') {
      investments = investments.filter(i => (i.status || 'active') === activeFilter);
    }

    // فلتر النوع
    const types = ['all', ...Object.keys(TYPE_LABELS)];

    container.innerHTML = `
      <button class="btn btn--primary btn--block mb-4" id="add-inv-btn">
        ${UI.ICONS.plus} تسجيل استثمار جديد
      </button>

      <div class="search-bar" style="margin:0 0 12px">
        ${UI.ICONS.search}
        <input type="search" id="inv-search" placeholder="ابحث باسم الاستثمار أو الوسيط أو النوع..." value="${Utils.escapeHTML(searchQuery)}" />
      </div>

      <div style="display:flex;gap:6px;overflow-x:auto;padding:0 0 12px;-webkit-overflow-scrolling:touch">
        ${types.map(t => `
          <button class="chip ${activeTypeFilter === t ? 'chip--active' : ''}" data-type="${t}" style="
            white-space:nowrap;
            padding:6px 14px;
            border-radius:20px;
            border:1px solid ${activeTypeFilter === t ? (TYPE_COLORS[t] || '#0d9488') : '#e2e8f0'};
            background:${activeTypeFilter === t ? (TYPE_COLORS[t] || '#0d9488') : '#fff'};
            color:${activeTypeFilter === t ? '#fff' : '#475569'};
            font-size:12px;
            cursor:pointer;
            font-family:inherit;
          ">${t === 'all' ? 'كل الأنواع' : TYPE_LABELS[t]}</button>
        `).join('')}
      </div>

      <div id="inv-items"></div>
    `;

    container.querySelector('#add-inv-btn').addEventListener('click', () => showInvestmentForm());

    container.querySelectorAll('[data-type]').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTypeFilter = btn.dataset.type;
        renderList();
      });
    });

    const searchInput = container.querySelector('#inv-search');
    searchInput.addEventListener('input', Utils.debounce(() => {
      searchQuery = searchInput.value;
      renderItems(container.querySelector('#inv-items'), investments);
    }, 200));

    renderItems(container.querySelector('#inv-items'), investments);
  }

  function renderItems(container, investments) {
    let filtered = investments;

    if (activeTypeFilter !== 'all') {
      filtered = filtered.filter(i => i.type === activeTypeFilter);
    }

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(i =>
        (i.name || '').toLowerCase().includes(q) ||
        (TYPE_LABELS[i.type] || '').toLowerCase().includes(q) ||
        (i.notes || '').toLowerCase().includes(q) ||
        (i.broker || '').toLowerCase().includes(q)
      );
    }

    if (filtered.length === 0) {
      container.innerHTML = '';
      container.appendChild(UI.emptyState({
        icon: UI.ICONS.investment,
        title: 'لا توجد استثمارات',
        text: 'سجّل استثمارك الأول وابدأ بتتبع أدائه ومعاملاته وأرباحه',
        actionText: 'تسجيل استثمار',
        onAction: () => showInvestmentForm()
      }));
      return;
    }

    const currency = State.get('currentCurrency');

    container.innerHTML = filtered.map(inv => {
      const invested  = Number(inv.amountInvested || 0);
      const current   = Number(inv.currentValue  || 0);
      const profit    = current - invested;
      const profitPct = invested > 0 ? (profit / invested) * 100 : 0;
      const status    = STATUS_LABELS[inv.status || 'active'] || STATUS_LABELS.active;
      const risk      = RISK_LABELS[inv.riskLevel] || RISK_LABELS.medium;
      const typeColor = TYPE_COLORS[inv.type] || '#64748b';
      const isMatured = inv.maturityDate && new Date(inv.maturityDate) <= new Date() && (inv.status || 'active') === 'active';

      return `
        <div class="card" data-id="${inv.id}" style="cursor:pointer">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="
              width:44px;height:44px;border-radius:12px;
              background:${typeColor}20;color:${typeColor};
              display:flex;align-items:center;justify-content:center;
              flex-shrink:0
            ">${UI.ICONS.investment}</div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
                <div style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${Utils.escapeHTML(inv.name || 'استثمار')}</div>
                <span style="background:${status.bg};color:${status.color};font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600">${status.label}</span>
              </div>
              <div style="font-size:12px;color:var(--color-text-secondary);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                <span style="background:${typeColor}15;color:${typeColor};padding:1px 6px;border-radius:6px">${TYPE_LABELS[inv.type] || 'أخرى'}</span>
                <span style="background:${risk.bg};color:${risk.color};padding:1px 6px;border-radius:6px">مخاطرة ${risk.label}</span>
              </div>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--color-divider)">
            <div>
              <div style="font-size:11px;color:var(--color-text-tertiary)">المستثمر</div>
              <div style="font-weight:700">${Utils.formatMoney(invested, inv.currency || currency)}</div>
            </div>
            <div>
              <div style="font-size:11px;color:var(--color-text-tertiary)">القيمة الحالية</div>
              <div style="font-weight:700">${Utils.formatMoney(current, inv.currency || currency)}</div>
            </div>
          </div>

          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--color-divider);gap:8px">
            <div>
              <div style="font-size:11px;color:var(--color-text-tertiary)">الربح/الخسارة</div>
              <div style="font-weight:700;color:${profit >= 0 ? 'var(--color-success)' : 'var(--color-danger)'}">
                ${profit >= 0 ? '+' : ''}${Utils.formatMoney(profit, inv.currency || currency)}
                (${profitPct >= 0 ? '+' : ''}${profitPct.toFixed(1)}%)
              </div>
            </div>
            <div style="display:flex;gap:6px;align-items:center">
              ${isMatured ? `<span style="background:#fef3c7;color:#92400e;font-size:11px;padding:4px 8px;border-radius:8px;font-weight:600">استحق</span>` : ''}
              <button class="icon-btn" data-action="tx" data-id="${inv.id}" aria-label="معاملة" title="إضافة معاملة"
                style="background:#dbeafe;color:#1e40af">${UI.ICONS.plus}</button>
              <button class="icon-btn" data-action="edit" data-id="${inv.id}" aria-label="تعديل">${UI.ICONS.edit}</button>
              <button class="icon-btn" data-action="delete" data-id="${inv.id}" aria-label="حذف" style="color:var(--color-danger)">${UI.ICONS.trash}</button>
            </div>
          </div>
        </div>
      `;
    }).join('');

    container.querySelectorAll('[data-id]').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('[data-action]')) return;
        showInvestmentDetails(card.dataset.id);
      });
    });

    container.querySelectorAll('[data-action="edit"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        showInvestmentForm(btn.dataset.id);
      });
    });

    container.querySelectorAll('[data-action="tx"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        showTransactionForm(btn.dataset.id);
      });
    });

    container.querySelectorAll('[data-action="delete"]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        await confirmDelete(btn.dataset.id);
      });
    });
  }

  // ============ نموذج استثمار جديد - 3 خطوات ============
  function showInvestmentForm(investmentId = null) {
    let currentStep = 1;
    let formData = {
      name: '',
      type: 'stocks',
      status: 'active',
      riskLevel: 'medium',
      broker: '',
      accountNumber: '',
      amountInvested: 0,
      currentValue: 0,
      currency: State.get('currentCurrency'),
      walletId: '',
      deductFromWallet: true,
      startDate: Utils.todayISO(),
      maturityDate: '',
      expectedReturn: '',
      expectedReturnType: 'annual_pct',
      duration: '',
      notes: '',
      attachments: [],
      archived: false
    };

    const body = Utils.el('div');
    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', { class: 'btn btn--outline', id: 'inv-cancel-btn' }, 'إلغاء'),
      Utils.el('button', { class: 'btn btn--outline', id: 'inv-prev-btn', style: { display: 'none' } }, 'السابق'),
      Utils.el('button', { class: 'btn btn--primary', id: 'inv-next-btn' }, 'التالي'),
      Utils.el('button', { class: 'btn btn--primary', id: 'inv-save-btn', style: { display: 'none' } }, investmentId ? 'حفظ التعديلات' : 'حفظ الاستثمار')
    ]);

    const close = UI.modal({
      title: investmentId ? 'تعديل الاستثمار' : 'استثمار جديد',
      body,
      footer,
      size: 'lg'
    });

    footer.querySelector('#inv-cancel-btn').addEventListener('click', () => close());

    footer.querySelector('#inv-prev-btn').addEventListener('click', () => {
      if (currentStep > 1) {
        currentStep--;
        renderStep();
      }
    });

    footer.querySelector('#inv-next-btn').addEventListener('click', () => {
      if (currentStep < 3) {
        if (currentStep === 1 && (!formData.name || !formData.name.trim())) {
          UI.toastError('يرجى إدخال اسم الاستثمار');
          return;
        }
        currentStep++;
        renderStep();
      }
    });

    footer.querySelector('#inv-save-btn').addEventListener('click', saveInvestment);

    async function saveInvestment() {
      if (!formData.name || !formData.name.trim()) {
        UI.toastError('يرجى إدخال اسم الاستثمار');
        return;
      }
      if (!formData.amountInvested || Number(formData.amountInvested) <= 0) {
        UI.toastError('يرجى إدخال مبلغ مستثمر صحيح');
        return;
      }

      // مزامنة القيمة الحالية مع المبلغ المستثمر إذا كانت القيمة الحالية فارغة
      if (!formData.currentValue) formData.currentValue = formData.amountInvested;

      const btn = footer.querySelector('#inv-save-btn');
      btn.disabled = true;
      btn.textContent = 'جارٍ الحفظ...';

      try {
        // خصم المبلغ من المحفظة المرتبطة (فقط عند الإنشاء)
        if (!investmentId && formData.deductFromWallet && formData.walletId) {
          const wallet = await DB.get('wallets', formData.walletId);
          if (wallet) {
            wallet.balance = Number(wallet.balance) - Number(formData.amountInvested);
            await DB.put('wallets', wallet);
          }
        }

        if (investmentId) {
          await DB.put('investments', { ...formData, id: investmentId });
          UI.toastSuccess('تم تحديث الاستثمار');
        } else {
          const newInv = await DB.add('investments', formData);
          // إضافة معاملة إيداع أولية تلقائية
          await DB.add('investmentTransactions', {
            investmentId: newInv.id,
            type: 'deposit',
            amount: Number(formData.amountInvested),
            currency: formData.currency,
            date: formData.startDate,
            note: 'إيداع رأس المال الأولي',
            walletId: formData.deductFromWallet ? formData.walletId : ''
          });
          // إضافة أول قياس للقيمة
          await DB.add('investmentValuations', {
            investmentId: newInv.id,
            value: Number(formData.currentValue),
            date: Utils.todayISO(),
            note: 'القيمة الابتدائية'
          });
          UI.toastSuccess('تم تسجيل الاستثمار بنجاح');
        }

        if (window.Sounds) Sounds.success();
        close();
        await renderSummary();
        await renderList();
      } catch (e) {
        console.error(e);
        if (window.Sounds) Sounds.error();
        UI.toastError('حدث خطأ أثناء الحفظ');
        btn.disabled = false;
        btn.textContent = investmentId ? 'حفظ التعديلات' : 'حفظ الاستثمار';
      }
    }

    async function renderStep() {
      body.innerHTML = '';
      // تحديث الأزرار حسب الخطوة
      footer.querySelector('#inv-prev-btn').style.display = currentStep > 1 ? '' : 'none';
      footer.querySelector('#inv-next-btn').style.display = currentStep < 3 ? '' : 'none';
      footer.querySelector('#inv-save-btn').style.display = currentStep === 3 ? '' : 'none';

      const stepIndicator = `
        <div class="step-indicator" style="margin-bottom:16px">
          <div class="step-dot ${currentStep >= 1 ? 'active' : ''}"></div>
          <div class="step-dot ${currentStep >= 2 ? 'active' : ''}"></div>
          <div class="step-dot ${currentStep >= 3 ? 'active' : ''}"></div>
        </div>
      `;

      if (currentStep === 1) {
        // ===== الخطوة 1: المعلومات الأساسية =====
        body.innerHTML = `
          ${stepIndicator}
          <p style="text-align:center;color:var(--color-text-secondary);margin-bottom:16px;font-size:13px">
            الخطوة 1 من 3 — المعلومات الأساسية
          </p>

          ${UI.field({ label: 'اسم الاستثمار', name: 'name', value: formData.name, placeholder: 'مثال: أسهم أبل، شقة رام الله، ذهب 100غ', required: true })}

          <div class="form-group">
            <label class="form-label">النوع</label>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
              ${Object.entries(TYPE_LABELS).map(([k, v]) => `
                <label style="
                  display:flex;align-items:center;gap:8px;padding:10px;border:1px solid ${formData.type === k ? TYPE_COLORS[k] : '#e2e8f0'};
                  border-radius:8px;cursor:pointer;background:${formData.type === k ? TYPE_COLORS[k] + '10' : '#fff'}
                ">
                  <input type="radio" name="type" value="${k}" ${formData.type === k ? 'checked' : ''} style="margin:0" />
                  <span style="font-size:13px">${v}</span>
                </label>
              `).join('')}
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">مستوى المخاطرة</label>
            <select class="input" name="riskLevel">
              ${Object.entries(RISK_LABELS).map(([k, v]) =>
                `<option value="${k}" ${formData.riskLevel === k ? 'selected' : ''}>${v.label}</option>`
              ).join('')}
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">الحالة</label>
            <select class="input" name="status">
              ${Object.entries(STATUS_LABELS).map(([k, v]) =>
                `<option value="${k}" ${formData.status === k ? 'selected' : ''}>${v.label}</option>`
              ).join('')}
            </select>
          </div>

          ${UI.field({ label: 'الجهة / الوسيط', name: 'broker', value: formData.broker, placeholder: 'مثال: بنك فلسطين / وسطاء معتمدين' })}
          ${UI.field({ label: 'رقم الحساب / المرجع', name: 'accountNumber', value: formData.accountNumber, placeholder: 'رقم الحساب لدى الوسيط (اختياري)' })}
        `;

        attachFieldListeners();
      }

      else if (currentStep === 2) {
        // ===== الخطوة 2: التفاصيل المالية =====
        const wallets = (await DB.getAll('wallets')).filter(w => !w.archived);

        body.innerHTML = `
          ${stepIndicator}
          <p style="text-align:center;color:var(--color-text-secondary);margin-bottom:16px;font-size:13px">
            الخطوة 2 من 3 — التفاصيل المالية
          </p>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            ${UI.field({ label: 'المبلغ المستثمر', name: 'amountInvested', type: 'number', value: formData.amountInvested || '', placeholder: '0', required: true })}
            ${UI.field({ label: 'القيمة الحالية', name: 'currentValue', type: 'number', value: formData.currentValue || '', placeholder: '0', hint: 'اتركها فارغة = المبلغ المستثمر' })}
          </div>

          ${UI.field({ label: 'العملة', name: 'currency', type: 'select', value: formData.currency, options: State.CURRENCIES.map(c => ({ value: c.symbol, label: `${c.label} (${c.symbol})` })) })}

          ${!investmentId && wallets.length > 0 ? `
            <div class="form-group">
              <label class="form-label">المحفظة المرتبطة</label>
              <select class="input" name="walletId">
                <option value="">— بدون ربط —</option>
                ${wallets.map(w => `<option value="${w.id}" ${formData.walletId === w.id ? 'selected' : ''}>${Utils.escapeHTML(w.name)} (${Utils.formatMoney(w.balance, w.currency)})</option>`).join('')}
              </select>
            </div>
            <div id="wallet-link-wrap" style="display:${formData.walletId ? '' : 'none'}">
              ${UI.toggleField({ label: 'خصم المبلغ المستثمر من المحفظة تلقائياً', name: 'deductFromWallet', checked: formData.deductFromWallet, hint: 'سيتم خصم المبلغ من رصيد المحفظة عند حفظ الاستثمار' })}
            </div>
          ` : ''}

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            ${UI.field({ label: 'العائد المتوقع (%)', name: 'expectedReturn', type: 'number', value: formData.expectedReturn || '', placeholder: 'مثال: 8.5' })}
            <div class="form-group">
              <label class="form-label">نوع العائد</label>
              <select class="input" name="expectedReturnType">
                <option value="annual_pct" ${formData.expectedReturnType === 'annual_pct' ? 'selected' : ''}>سنوي %</option>
                <option value="total_pct"   ${formData.expectedReturnType === 'total_pct'   ? 'selected' : ''}>إجمالي %</option>
                <option value="fixed_amount" ${formData.expectedReturnType === 'fixed_amount' ? 'selected' : ''}>مبلغ ثابت</option>
              </select>
            </div>
          </div>

          ${UI.field({ label: 'مدة الاستثمار (شهور)', name: 'duration', type: 'number', value: formData.duration || '', placeholder: 'مثال: 12' })}

          <div style="background:#f0f9ff;border:1px solid #bae6fd;color:#075985;padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.6;margin-top:8px">
            💡 سيتم إنشاء معاملة "إيداع رأس مال" تلقائياً عند الحفظ، ويمكنك إضافة معاملات لاحقة (سحب/أرباح/رسوم) من بطاقة الاستثمار.
          </div>
        `;

        attachFieldListeners();

        // ربط تغيير المحفظة بإظهار/إخفاء خيار الخصم
        const walletSel = body.querySelector('[name="walletId"]');
        if (walletSel) {
          walletSel.addEventListener('change', () => {
            const wrap = body.querySelector('#wallet-link-wrap');
            if (wrap) wrap.style.display = walletSel.value ? '' : 'none';
            formData.walletId = walletSel.value;
          });
        }

        // حساب الربح المتوقع لحظياً
        const updateLiveProfit = () => {
          const invested = Number(formData.amountInvested || 0);
          const current  = Number(formData.currentValue  || 0);
          if (invested > 0) {
            const profit = current - invested;
            const pct = (profit / invested * 100).toFixed(1);
            let hint = body.querySelector('#live-profit-hint');
            if (!hint) {
              hint = document.createElement('div');
              hint.id = 'live-profit-hint';
              hint.style.cssText = 'font-size:12px;padding:8px 12px;margin-top:-4px;border-radius:8px;font-weight:600';
              const cur = body.querySelector('[name="currentValue"]')?.closest('.form-group');
              if (cur) cur.appendChild(hint);
            }
            hint.textContent = `الربح/الخسارة: ${profit >= 0 ? '+' : ''}${profit.toFixed(0)} (${pct >= 0 ? '+' : ''}${pct}%)`;
            hint.style.background = profit >= 0 ? '#f0fdf4' : '#fef2f2';
            hint.style.color = profit >= 0 ? 'var(--color-success)' : 'var(--color-danger)';
          }
        };
        updateLiveProfit();
        body.querySelector('[name="amountInvested"]')?.addEventListener('input', updateLiveProfit);
        body.querySelector('[name="currentValue"]')?.addEventListener('input', updateLiveProfit);
      }

      else if (currentStep === 3) {
        // ===== الخطوة 3: التواريخ والملاحظات =====
        body.innerHTML = `
          ${stepIndicator}
          <p style="text-align:center;color:var(--color-text-secondary);margin-bottom:16px;font-size:13px">
            الخطوة 3 من 3 — التواريخ والملاحظات
          </p>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            ${UI.field({ label: 'تاريخ البدء', name: 'startDate', type: 'date', value: formData.startDate, required: true })}
            ${UI.field({ label: 'تاريخ الاستحقاق (اختياري)', name: 'maturityDate', type: 'date', value: formData.maturityDate || '', hint: 'يستخدم للتذكير بقرب انتهاء الاستثمار' })}
          </div>

          ${UI.field({ label: 'ملاحظات', name: 'notes', type: 'textarea', value: formData.notes, placeholder: 'تفاصيل إضافية: شروط الاستثمار، نصيحة المستشار، أرقام وثائقية...' })}

          <div class="card" style="background:#f8fafc;margin-top:12px">
            <div style="font-weight:700;margin-bottom:8px">ملخص الإدخال</div>
            <div class="summary-row">
              <span>الاسم</span>
              <span>${Utils.escapeHTML(formData.name || '—')}</span>
            </div>
            <div class="summary-row">
              <span>النوع</span>
              <span>${TYPE_LABELS[formData.type] || '—'}</span>
            </div>
            <div class="summary-row">
              <span>المبلغ المستثمر</span>
              <span class="font-bold">${Utils.formatMoney(Number(formData.amountInvested || 0), formData.currency)}</span>
            </div>
            <div class="summary-row">
              <span>القيمة الحالية</span>
              <span class="font-bold">${Utils.formatMoney(Number(formData.currentValue || formData.amountInvested || 0), formData.currency)}</span>
            </div>
            <div class="summary-row">
              <span>المخاطرة</span>
              <span>${(RISK_LABELS[formData.riskLevel] || RISK_LABELS.medium).label}</span>
            </div>
            ${formData.maturityDate ? `
              <div class="summary-row">
                <span>الاستحقاق</span>
                <span>${Utils.formatDate(formData.maturityDate)}</span>
              </div>` : ''}
          </div>
        `;

        attachFieldListeners();
      }
    }

    function attachFieldListeners() {
      body.querySelectorAll('[name]').forEach(el => {
        const ev = (el.tagName === 'SELECT' || el.type === 'date' || el.type === 'radio') ? 'change' : 'input';
        el.addEventListener(ev, () => {
          if (el.type === 'radio') {
            formData[el.name] = el.value;
          } else if (el.type === 'checkbox') {
            formData[el.name] = el.checked;
          } else if (el.type === 'number') {
            formData[el.name] = el.value === '' ? 0 : Number(el.value);
          } else {
            formData[el.name] = el.value;
          }
        });
      });
    }

    // === العرض الأولي للنموذج ===
    if (investmentId) {
      DB.get('investments', investmentId).then(inv => {
        if (inv) {
          formData = { ...formData, ...inv };
          // عند التعديل لا نخصم من المحفظة مرة أخرى
          formData.deductFromWallet = false;
          renderStep();
        }
      });
    } else {
      renderStep();
    }
  }

  // ============ معاملة استثمار (إيداع/سحب/أرباح/رسوم) ============
  async function showTransactionForm(investmentId) {
    const inv = await DB.get('investments', investmentId);
    if (!inv) return;

    let formData = {
      type: 'deposit',
      amount: 0,
      currency: inv.currency || State.get('currentCurrency'),
      date: Utils.todayISO(),
      note: '',
      walletId: ''
    };

    const body = Utils.el('div');
    body.innerHTML = `
      <div style="background:#f0f9ff;border:1px solid #bae6fd;color:#075985;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:16px">
        <strong>${Utils.escapeHTML(inv.name)}</strong><br/>
        القيمة الحالية: ${Utils.formatMoney(inv.currentValue, inv.currency)}
      </div>

      <div class="form-group">
        <label class="form-label">نوع المعاملة</label>
        <select class="input" name="type">
          ${Object.entries(TX_LABELS).map(([k, v]) =>
            `<option value="${k}" ${formData.type === k ? 'selected' : ''}>${v.icon} ${v.label}</option>`
          ).join('')}
        </select>
      </div>

      ${UI.field({ label: 'المبلغ', name: 'amount', type: 'number', value: '', placeholder: '0', required: true })}
      ${UI.field({ label: 'التاريخ', name: 'date', type: 'date', value: formData.date, required: true })}

      <div class="form-group">
        <label class="form-label">محفظة التأثير (اختياري)</label>
        <select class="input" name="walletId">
          <option value="">— لا تأثير على المحفظة —</option>
          ${(await DB.getAll('wallets')).filter(w => !w.archived).map(w => `<option value="${w.id}">${Utils.escapeHTML(w.name)} (${Utils.formatMoney(w.balance, w.currency)})</option>`).join('')}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">ملاحظة</label>
        <textarea class="input" name="note" rows="2" placeholder="مثال: توزيعات أرباح الربع الأول"></textarea>
      </div>

      <div id="tx-effect-hint" style="font-size:12px;padding:10px;border-radius:8px;background:#f8fafc;color:var(--color-text-secondary);line-height:1.6"></div>
    `;

    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', { class: 'btn btn--outline btn--block', onclick: () => close() }, 'إلغاء'),
      Utils.el('button', { class: 'btn btn--primary btn--block', id: 'tx-save-btn' }, 'حفظ المعاملة')
    ]);

    const close = UI.modal({
      title: 'معاملة استثمارية',
      body,
      footer
    });

    function updateEffectHint() {
      const hint = body.querySelector('#tx-effect-hint');
      const t = formData.type;
      const amt = Number(formData.amount || 0);
      const tx = TX_LABELS[t];
      const newCurrentValue = computeNewValue(inv, t, amt);
      const delta = newCurrentValue - Number(inv.currentValue || 0);
      hint.style.background = (tx.color) + '15';
      hint.style.color = tx.color;
      hint.innerHTML = `
        <strong>${tx.label}</strong><br/>
        ${t === 'deposit' ? 'زيادة القيمة الحالية بمبلغ المعاملة' :
          t === 'withdrawal' ? 'تخفيض القيمة الحالية بمبلغ المعاملة' :
          t === 'profit' ? 'إضافة الأرباح للقيمة الحالية' :
          t === 'fee' ? 'خصم الرسوم من القيمة الحالية' :
          'تسوية القيمة الحالية لتساوي المبلغ المدخل'}
        <br/>
        القيمة الحالية: <strong>${Utils.formatMoney(Number(inv.currentValue || 0), inv.currency)}</strong> → <strong>${Utils.formatMoney(newCurrentValue, inv.currency)}</strong>
        (${delta >= 0 ? '+' : ''}${Utils.formatMoney(delta, inv.currency)})
      `;
    }

    body.querySelectorAll('[name]').forEach(el => {
      const ev = (el.tagName === 'SELECT' || el.type === 'date') ? 'change' : 'input';
      el.addEventListener(ev, () => {
        if (el.type === 'number') {
          formData[el.name] = el.value === '' ? 0 : Number(el.value);
        } else {
          formData[el.name] = el.value;
        }
        updateEffectHint();
      });
    });
    updateEffectHint();

    footer.querySelector('#tx-save-btn').addEventListener('click', async () => {
      if (!formData.amount || Number(formData.amount) <= 0) {
        UI.toastError('يرجى إدخال مبلغ صحيح');
        return;
      }
      const btn = footer.querySelector('#tx-save-btn');
      btn.disabled = true;
      btn.textContent = 'جارٍ الحفظ...';
      try {
        // حفظ المعاملة
        await DB.add('investmentTransactions', { ...formData, investmentId });

        // تحديث القيمة الحالية للاستثمار
        const newCurrentValue = computeNewValue(inv, formData.type, Number(formData.amount));
        inv.currentValue = newCurrentValue;
        await DB.put('investments', inv);

        // إضافة قياس قيمة جديد (ما عدا للرسوم والإيداع والسحب التي تُحدّث القيمة مباشرة)
        if (formData.type === 'profit' || formData.type === 'adjustment') {
          await DB.add('investmentValuations', {
            investmentId,
            value: newCurrentValue,
            date: formData.date,
            note: formData.note || TX_LABELS[formData.type].label
          });
        }

        // تأثير المحفظة
        if (formData.walletId) {
          const wallet = await DB.get('wallets', formData.walletId);
          if (wallet) {
            const delta = computeWalletDelta(formData.type, Number(formData.amount));
            wallet.balance = Number(wallet.balance) + delta;
            await DB.put('wallets', wallet);
          }
        }

        if (window.Sounds) Sounds.success();
        UI.toastSuccess('تم تسجيل المعاملة وتحديث القيمة');
        close();
        await renderSummary();
        await renderList();
      } catch (e) {
        console.error(e);
        if (window.Sounds) Sounds.error();
        UI.toastError('حدث خطأ');
        btn.disabled = false;
        btn.textContent = 'حفظ المعاملة';
      }
    });
  }

  function computeNewValue(inv, txType, amount) {
    const cur = Number(inv.currentValue || 0);
    switch (txType) {
      case 'deposit':    return cur + amount;
      case 'withdrawal': return Math.max(0, cur - amount);
      case 'profit':     return cur + amount;
      case 'fee':        return Math.max(0, cur - amount);
      case 'adjustment': return amount;
      default:           return cur;
    }
  }

  function computeWalletDelta(txType, amount) {
    // كم يتغير رصيد المحفظة عند هذه المعاملة؟
    switch (txType) {
      case 'deposit':    return -amount;  // أخرجت نقوداً من المحفظة لتستثمرها
      case 'withdrawal': return +amount;  // سحبت من الاستثمار للمحفظة
      case 'profit':     return +amount;  // وصلت الأرباح للمحفظة
      case 'fee':        return -amount;  // دفعت رسوماً من المحفظة
      case 'adjustment': return 0;
      default:           return 0;
    }
  }

  // ============ تفاصيل الاستثمار الكاملة ============
  async function showInvestmentDetails(id) {
    const inv = await DB.get('investments', id);
    if (!inv) return;

    const [transactions, valuations] = await Promise.all([
      DB.getByIndex('investmentTransactions', 'investmentId', id),
      DB.getByIndex('investmentValuations', 'investmentId', id)
    ]);
    transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
    valuations.sort((a, b) => new Date(a.date) - new Date(b.date));

    const invested  = Number(inv.amountInvested || 0);
    const current   = Number(inv.currentValue  || 0);
    const profit    = current - invested;
    const profitPct = invested > 0 ? (profit / invested) * 100 : 0;
    const status    = STATUS_LABELS[inv.status || 'active'] || STATUS_LABELS.active;
    const risk      = RISK_LABELS[inv.riskLevel] || RISK_LABELS.medium;
    const typeColor = TYPE_COLORS[inv.type] || '#64748b';
    const currency  = inv.currency || State.get('currentCurrency');

    // إحصائيات المعاملات
    const totalDeposits    = transactions.filter(t => t.type === 'deposit').reduce((s, t) => s + Number(t.amount || 0), 0);
    const totalWithdrawals = transactions.filter(t => t.type === 'withdrawal').reduce((s, t) => s + Number(t.amount || 0), 0);
    const totalProfits     = transactions.filter(t => t.type === 'profit').reduce((s, t) => s + Number(t.amount || 0), 0);
    const totalFees        = transactions.filter(t => t.type === 'fee').reduce((s, t) => s + Number(t.amount || 0), 0);

    // مدة الاستثمار
    const startDate = inv.startDate ? new Date(inv.startDate) : null;
    const daysHeld  = startDate ? Math.floor((new Date() - startDate) / (1000 * 60 * 60 * 24)) : 0;

    const body = Utils.el('div');
    body.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <div style="
          width:52px;height:52px;border-radius:14px;
          background:${typeColor}20;color:${typeColor};
          display:flex;align-items:center;justify-content:center
        ">${UI.ICONS.investment}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:18px">${Utils.escapeHTML(inv.name || '')}</div>
          <div style="font-size:13px;color:var(--color-text-secondary);display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
            <span style="background:${typeColor}15;color:${typeColor};padding:2px 8px;border-radius:6px">${TYPE_LABELS[inv.type] || 'أخرى'}</span>
            <span style="background:${risk.bg};color:${risk.color};padding:2px 8px;border-radius:6px">مخاطرة ${risk.label}</span>
            <span style="background:${status.bg};color:${status.color};padding:2px 8px;border-radius:6px">${status.label}</span>
          </div>
        </div>
      </div>

      <!-- الأرقام الرئيسية -->
      <div class="card" style="margin:0 0 12px;background:#f8fafc">
        <div class="summary-row">
          <span>المبلغ المستثمر</span>
          <span class="font-bold">${Utils.formatMoney(invested, currency)}</span>
        </div>
        <div class="summary-row">
          <span>القيمة الحالية</span>
          <span class="font-bold">${Utils.formatMoney(current, currency)}</span>
        </div>
        <div class="summary-row">
          <span>الربح / الخسارة</span>
          <span class="font-bold" style="color:${profit >= 0 ? 'var(--color-success)' : 'var(--color-danger)'}">
            ${profit >= 0 ? '+' : ''}${Utils.formatMoney(profit, currency)} (${profitPct >= 0 ? '+' : ''}${profitPct.toFixed(1)}%)
          </span>
        </div>
        ${daysHeld > 0 ? `
          <div class="summary-row">
            <span>مدة الاستثمار</span>
            <span>${daysHeld} يوم</span>
          </div>` : ''}
        ${inv.expectedReturn ? `
          <div class="summary-row">
            <span>العائد المتوقع</span>
            <span>${inv.expectedReturn}${inv.expectedReturnType === 'annual_pct' ? '% سنوي' : inv.expectedReturnType === 'total_pct' ? '% إجمالي' : ' ₪ ثابت'}</span>
          </div>` : ''}
      </div>

      <!-- تفاصيل إضافية -->
      <div class="card" style="margin:0 0 12px;background:#f8fafc">
        ${inv.broker ? `<div class="summary-row"><span>الوسيط</span><span>${Utils.escapeHTML(inv.broker)}</span></div>` : ''}
        ${inv.accountNumber ? `<div class="summary-row"><span>رقم الحساب</span><span dir="ltr">${Utils.escapeHTML(inv.accountNumber)}</span></div>` : ''}
        <div class="summary-row">
          <span>تاريخ البدء</span>
          <span>${Utils.formatDate(inv.startDate) || '—'}</span>
        </div>
        ${inv.maturityDate ? `
          <div class="summary-row">
            <span>الاستحقاق</span>
            <span style="color:${new Date(inv.maturityDate) <= new Date() ? 'var(--color-danger)' : 'inherit'};font-weight:600">
              ${Utils.formatDate(inv.maturityDate)}
              ${new Date(inv.maturityDate) <= new Date() ? ' (مستحق)' : ''}
            </span>
          </div>` : ''}
        ${inv.duration ? `<div class="summary-row"><span>المدة</span><span>${inv.duration} شهر</span></div>` : ''}
      </div>

      <!-- ملخص المعاملات -->
      <div class="card" style="margin:0 0 12px;background:#f8fafc">
        <div style="font-weight:700;margin-bottom:8px">ملخص المعاملات</div>
        <div class="summary-row"><span>إيداعات</span><span style="color:#2563eb">+${Utils.formatMoney(totalDeposits, currency)}</span></div>
        <div class="summary-row"><span>سحوبات</span><span style="color:#dc2626">−${Utils.formatMoney(totalWithdrawals, currency)}</span></div>
        <div class="summary-row"><span>أرباح</span><span style="color:#16a34a">+${Utils.formatMoney(totalProfits, currency)}</span></div>
        <div class="summary-row"><span>رسوم/ضرائب</span><span style="color:#d97706">−${Utils.formatMoney(totalFees, currency)}</span></div>
      </div>

      <!-- الرسم البياني للقيمة عبر الزمن -->
      ${valuations.length > 1 ? `
        <div class="card" style="margin:0 0 12px;background:#f8fafc">
          <div style="font-weight:700;margin-bottom:8px">تطوّر القيمة عبر الزمن</div>
          <canvas id="inv-chart" style="width:100%;height:180px"></canvas>
        </div>
      ` : ''}

      <!-- آخر المعاملات -->
      <div class="card" style="margin:0 0 12px;background:#f8fafc">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-weight:700">آخر المعاملات (${transactions.length})</span>
          <button class="btn btn--sm btn--primary" id="details-add-tx">${UI.ICONS.plus} معاملة</button>
        </div>
        ${transactions.length === 0 ? `
          <div style="text-align:center;padding:16px;color:var(--color-text-tertiary);font-size:13px">لا توجد معاملات مسجّلة</div>
        ` : transactions.slice(0, 5).map(t => {
          const tx = TX_LABELS[t.type] || TX_LABELS.deposit;
          return `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #e2e8f0">
              <div style="
                width:30px;height:30px;border-radius:50%;
                background:${tx.color}15;color:${tx.color};
                display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px
              ">${tx.icon}</div>
              <div style="flex:1">
                <div style="font-size:13px;font-weight:600">${tx.label}</div>
                <div style="font-size:11px;color:var(--color-text-tertiary)">${Utils.formatDate(t.date)}${t.note ? ' • ' + Utils.escapeHTML(t.note) : ''}</div>
              </div>
              <div style="font-weight:700;color:${tx.color}">${Utils.formatMoney(t.amount, t.currency || currency)}</div>
            </div>
          `;
        }).join('')}
      </div>

      ${inv.notes ? `
        <div class="card" style="margin:0 0 12px;background:#f8fafc">
          <div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:4px">ملاحظات</div>
          <div style="line-height:1.6;white-space:pre-wrap">${Utils.escapeHTML(inv.notes)}</div>
        </div>` : ''}
    `;

    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', { class: 'btn btn--outline', id: 'details-edit-btn' }, UI.ICONS.edit + ' تعديل'),
      Utils.el('button', { class: 'btn btn--danger', id: 'details-delete-btn' }, UI.ICONS.trash + ' حذف')
    ]);

    const close = UI.modal({
      title: 'تفاصيل الاستثمار',
      body,
      footer,
      size: 'lg'
    });

    // رسم بياني للقيمة عبر الزمن
    setTimeout(() => {
      const canvas = document.getElementById('inv-chart');
      if (canvas && valuations.length > 1 && window.Charts) {
        const data = valuations.map(v => ({
          label: Utils.formatDateShort(v.date),
          value: Number(v.value || 0)
        }));
        Charts.lineChart(canvas, data, { color: typeColor });
      }
    }, 100);

    body.querySelector('#details-add-tx')?.addEventListener('click', () => {
      close();
      showTransactionForm(id);
    });

    footer.querySelector('#details-edit-btn').addEventListener('click', () => {
      close();
      showInvestmentForm(id);
    });

    footer.querySelector('#details-delete-btn').addEventListener('click', async () => {
      close();
      await confirmDelete(id);
    });
  }

  // ============ تأكيد الحذف بكلمة السر ============
  async function confirmDelete(id) {
    const inv = await DB.get('investments', id);
    if (!inv) return;

    const ok = await UI.confirmWithPassword({
      title: 'حذف الاستثمار',
      message: `سيتم حذف الاستثمار "${inv.name}" وكل معاملاته نهائياً. لا يمكن التراجع عن هذا الإجراء. أدخل كلمة السر للتأكيد.`,
      confirmText: 'حذف نهائي',
      danger: true
    });

    if (!ok) {
      UI.toast('تم إلغاء الحذف');
      return;
    }

    try {
      // حذف المعاملات والقياسات المرتبطة
      const [txs, vals] = await Promise.all([
        DB.getByIndex('investmentTransactions', 'investmentId', id),
        DB.getByIndex('investmentValuations', 'investmentId', id)
      ]);
      for (const t of txs) await DB.remove('investmentTransactions', t.id);
      for (const v of vals) await DB.remove('investmentValuations', v.id);

      await DB.remove('investments', id);
      if (window.Sounds) Sounds.success();
      UI.toastSuccess('تم حذف الاستثمار');
      await renderSummary();
      await renderList();
    } catch (e) {
      console.error(e);
      if (window.Sounds) Sounds.error();
      UI.toastError('تعذّر الحذف');
    }
  }

  return { render };
})();

/* =========================================================
   SUBSCRIPTIONS.JS - الاشتراكات والفواتير
   ========================================================= */

window.SubscriptionsPage = (function () {
  'use strict';

  async function render() {
    const root = document.getElementById('app-root');
    document.getElementById('bottom-nav').classList.remove('hidden');

    const user = await Auth.getCurrentUser();

    root.innerHTML = `
      ${UI.topbar({ userName: user?.name || '', avatarText: Utils.initials(user?.name || '') }).outerHTML}
      <div class="page">
        <div class="page__header" style="display:flex;align-items:center">
          <button class="back-btn" onclick="history.back()">${UI.ICONS.chevronRight}</button>
          <h1 class="page__title">الاشتراكات والفواتير</h1>
        </div>
        <div id="subs-content"></div>
      </div>
    `;

    const topbarEl = root.querySelector('.topbar');
    topbarEl.replaceWith(UI.topbar({
      userName: user?.name || '',
      avatarText: Utils.initials(user?.name || '')
    }));

    await loadContent();
  }

  async function loadContent() {
    const container = document.getElementById('subs-content');
    const subs = await DB.getAll('subscriptions');
    const active = subs.filter(s => !s.archived).sort((a, b) => new Date(a.nextDueDate) - new Date(b.nextDueDate));

    const totalMonthly = active.reduce((sum, s) => {
      const monthly = s.frequency === 'monthly' ? s.amount :
                      s.frequency === 'yearly' ? s.amount / 12 :
                      s.frequency === 'weekly' ? s.amount * 4.33 :
                      s.amount;
      return sum + monthly;
    }, 0);

    container.innerHTML = `
      <div class="page__body">
        <div class="card" style="background:linear-gradient(135deg,#0891b2,#0e7490);color:#fff">
          <div style="font-size:13px;opacity:0.85">إجمالي الاشتراكات الشهرية</div>
          <div style="font-size:28px;font-weight:700;margin-top:4px">
            ${Utils.formatMoney(totalMonthly, State.get('currentCurrency'))}
          </div>
          <div style="font-size:12px;opacity:0.7;margin-top:4px">${active.length} اشتراك نشط</div>
        </div>

        <button class="btn btn--primary btn--block mb-4" id="add-sub-btn">
          ${UI.ICONS.plus} إضافة اشتراك/فاتورة
        </button>

        ${active.length === 0 ? `
          <div class="empty-state">
            <div class="empty-state__icon">${UI.ICONS.subscription}</div>
            <div class="empty-state__title">لا توجد فواتير</div>
            <div class="empty-state__text">أضف اشتراكاً أو فاتورة متكررة لتتبع الالتزامات القادمة</div>
          </div>
        ` : `
          <div id="subs-list"></div>
        `}
      </div>
    `;

    container.querySelector('#add-sub-btn').addEventListener('click', () => showSubForm());

    if (active.length > 0) {
      const list = container.querySelector('#subs-list');
      list.innerHTML = active.map(s => {
        const daysUntil = Utils.daysBetween(new Date(), new Date(s.nextDueDate));
        const isOverdue = daysUntil < 0;
        return `
          <div class="card" data-id="${s.id}" style="cursor:pointer">
            <div style="display:flex;align-items:center;gap:12px">
              <div class="list-item__icon" style="background:${getServiceColor(s.type, s.name)}20;color:${getServiceColor(s.type, s.name)}">
                ${getServiceIcon(s.name)}
              </div>
              <div style="flex:1">
                <div style="font-weight:700">${Utils.escapeHTML(s.name)}</div>
                <div style="font-size:13px;color:var(--color-text-secondary)">
                  <span class="badge badge--${s.type === 'bill' ? 'danger' : s.type === 'subscription' ? 'info' : 'muted'}">
                    ${s.type === 'bill' ? 'فاتورة' : s.type === 'subscription' ? 'اشتراك' : 'مخصص'}
                  </span>
                  ${getFrequencyLabel(s.frequency)}
                </div>
              </div>
              <div style="text-align:left">
                <div style="font-weight:700">${Utils.formatMoney(s.amount, s.currency)}</div>
                <div style="font-size:11px;color:${isOverdue ? 'var(--color-danger)' : 'var(--color-text-tertiary)'}">
                  ${isOverdue ? `متأخرة ${Math.abs(daysUntil)} يوم` : `بعد ${daysUntil} يوم`}
                </div>
              </div>
            </div>
            ${s.autoCreate ? '<div class="notice" style="margin-top:8px"><span>أتمتة: سيُنشأ عملية تلقائياً عند الاستحقاق</span></div>' : ''}
          </div>
        `;
      }).join('');

      list.querySelectorAll('[data-id]').forEach(card => {
        card.addEventListener('click', () => showSubDetails(card.dataset.id));
      });
    }
  }

  function showSubForm(subId = null) {
    DB.get('subscriptions', subId).then(sub => {
      const body = Utils.el('div');

      const presetServices = [
        { name: 'كهرباء', type: 'bill', icon: '⚡' },
        { name: 'ماء', type: 'bill', icon: '💧' },
        { name: 'إنترنت', type: 'bill', icon: '🌐' },
        { name: 'إيجار', type: 'bill', icon: '🏠' },
        { name: 'Netflix', type: 'subscription', icon: '🎬' },
        { name: 'Shahid', type: 'subscription', icon: '📺' },
        { name: 'WATCH IT', type: 'subscription', icon: '🎥' },
        { name: 'مخصص', type: 'custom', icon: '⚙️' }
      ];

      body.innerHTML = `
        <div class="form-group">
          <label class="form-label">اختر نوع الخدمة</label>
          <div class="service-grid">
            ${presetServices.map(s => `
              <div class="service-card" data-preset="${s.name}" data-type="${s.type}">
                <div class="service-card__icon" style="font-size:20px">${s.icon}</div>
                <div class="service-card__label">${s.name}</div>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="divider"></div>

        <div class="form-group">
          <label class="form-label">التصنيف</label>
          <div class="segmented">
            <button class="segmented__btn ${(!sub || sub.type === 'bill') ? 'active' : ''}" data-type="bill">فاتورة</button>
            <button class="segmented__btn ${sub?.type === 'subscription' ? 'active' : ''}" data-type="subscription">اشتراك</button>
            <button class="segmented__btn ${sub?.type === 'custom' ? 'active' : ''}" data-type="custom">مخصص</button>
          </div>
        </div>

        ${UI.field({ label: 'الاسم', name: 'name', value: sub?.name || '', placeholder: 'مثال: فاتورة الكهرباء', required: true })}
        <div class="form-row">
          ${UI.field({ label: 'المبلغ', name: 'amount', type: 'number', value: sub?.amount || '', placeholder: '0.00', required: true })}
          <div class="form-group">
            <label class="form-label">العملة</label>
            <select class="form-select" id="sub-currency">
              ${State.CURRENCIES.map(c => `<option value="${c.symbol}" ${sub?.currency === c.symbol ? 'selected' : ''}>${c.label}</option>`).join('')}
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">التكرار</label>
            <select class="form-select" id="sub-frequency">
              <option value="daily" ${sub?.frequency === 'daily' ? 'selected' : ''}>يومي</option>
              <option value="weekly" ${sub?.frequency === 'weekly' ? 'selected' : ''}>أسبوعي</option>
              <option value="monthly" ${sub?.frequency === 'monthly' ? 'selected' : ''}>شهري</option>
              <option value="quarterly" ${sub?.frequency === 'quarterly' ? 'selected' : ''}>ربع سنوي</option>
              <option value="yearly" ${sub?.frequency === 'yearly' ? 'selected' : ''}>سنوي</option>
            </select>
          </div>
          ${UI.field({ label: 'تاريخ الاستحقاق القادم', name: 'nextDueDate', type: 'date', value: sub?.nextDueDate || Utils.todayISO(), required: true })}
        </div>

        <div class="form-group">
          <label class="form-label">المحفظة (للأتمتة)</label>
          <select class="form-select" id="sub-wallet">
            <option value="">بدون محفظة</option>
          </select>
        </div>

        ${UI.toggleField({
          label: 'إنشاء عملية تلقائياً',
          name: 'autoCreate',
          checked: sub?.autoCreate || false,
          hint: 'عند التفعيل يُنشأ عملية مصروف عادية داخل المحفظة المحددة عند حلول تاريخ الاستحقاق'
        })}

        ${UI.toggleField({
          label: 'تذكيرات الاستحقاق',
          name: 'reminders',
          checked: sub?.reminders !== false,
          hint: 'تذكير قبل 3 أيام + قبل يوم من الاستحقاق'
        })}

        ${UI.field({ label: 'ملاحظات', name: 'notes', type: 'textarea', value: sub?.notes || '' })}
        ${UI.field({ label: 'مرفق', name: 'attachment', type: 'file' })}
      `;

      // تحميل المحافظ
      DB.getAll('wallets').then(wallets => {
        const sel = body.querySelector('#sub-wallet');
        wallets.filter(w => !w.archived).forEach(w => {
          sel.innerHTML += `<option value="${w.id}" ${sub?.walletId === w.id ? 'selected' : ''}>${Utils.escapeHTML(w.name)}</option>`;
        });
      });

      // اختيار الخدمة الجاهزة
      let selectedType = sub?.type || 'bill';
      body.querySelectorAll('.service-card').forEach(card => {
        card.addEventListener('click', () => {
          body.querySelector('#name').value = card.dataset.preset === 'مخصص' ? '' : card.dataset.preset;
          selectedType = card.dataset.type;
          body.querySelectorAll('.segmented__btn').forEach(b => {
            b.classList.toggle('active', b.dataset.type === selectedType);
          });
        });
      });

      body.querySelectorAll('.segmented__btn').forEach(btn => {
        btn.addEventListener('click', () => {
          body.querySelectorAll('.segmented__btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          selectedType = btn.dataset.type;
        });
      });

      const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
        Utils.el('button', { class: 'btn btn--outline', onclick: () => close() }, 'إلغاء'),
        Utils.el('button', {
          class: 'btn btn--primary',
          style: { flex: 1 },
          onclick: async () => {
            const name = body.querySelector('#name').value.trim();
            const amount = parseFloat(body.querySelector('#amount').value);
            if (!name) { UI.toastError('أدخل الاسم'); return; }
            if (!amount || amount <= 0) { UI.toastError('أدخل مبلغاً صحيحاً'); return; }

            const data = {
              ...(sub || {}),
              name,
              type: selectedType,
              amount,
              currency: body.querySelector('#sub-currency').value,
              frequency: body.querySelector('#sub-frequency').value,
              nextDueDate: body.querySelector('#nextDueDate').value,
              walletId: body.querySelector('#sub-wallet').value,
              autoCreate: body.querySelector('[name="autoCreate"]').checked,
              reminders: body.querySelector('[name="reminders"]').checked,
              notes: body.querySelector('#notes').value.trim(),
              archived: false
            };

            // مرفق
            const fileInput = body.querySelector('input[type="file"]');
            if (fileInput.files[0]) {
              data.attachment = {
                name: fileInput.files[0].name,
                data: await Utils.fileToBase64(fileInput.files[0])
              };
            }

            if (subId) {
              await DB.put('subscriptions', data);
              UI.toastSuccess('تم التحديث');
            } else {
              await DB.add('subscriptions', data);
              UI.toastSuccess('تمت الإضافة');
            }

            close();
            await loadContent();
          }
        }, 'حفظ')
      ]);

      const close = UI.modal({ title: subId ? 'تعديل اشتراك' : 'اشتراك جديد', body, footer });
    });
  }

  async function showSubDetails(id) {
    const sub = await DB.get('subscriptions', id);
    if (!sub) return;

    const body = Utils.el('div');
    body.innerHTML = `
      <div class="card" style="text-align:center">
        <div style="font-size:13px;color:var(--color-text-secondary)">${Utils.escapeHTML(sub.name)}</div>
        <div style="font-size:28px;font-weight:700;margin-top:4px">${Utils.formatMoney(sub.amount, sub.currency)}</div>
        <div style="font-size:13px;color:var(--color-text-tertiary);margin-top:4px">${getFrequencyLabel(sub.frequency)}</div>
      </div>

      <div class="card">
        <div class="summary-row"><span>النوع</span><span>${sub.type === 'bill' ? 'فاتورة' : sub.type === 'subscription' ? 'اشتراك' : 'مخصص'}</span></div>
        <div class="summary-row"><span>الاستحقاق القادم</span><span>${Utils.formatDate(sub.nextDueDate)}</span></div>
        <div class="summary-row"><span>الأتمتة</span><span>${sub.autoCreate ? 'مفعّلة' : 'معطّلة'}</span></div>
        <div class="summary-row"><span>التذكيرات</span><span>${sub.reminders !== false ? 'مفعّلة' : 'معطّلة'}</span></div>
        ${sub.notes ? `<div class="summary-row"><span>ملاحظات</span><span>${Utils.escapeHTML(sub.notes)}</span></div>` : ''}
      </div>
    `;

    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', {
        class: 'btn btn--danger',
        onclick: async () => {
          if (await UI.confirm({ title: 'حذف', message: 'حذف هذا الاشتراك؟', danger: true })) {
            await DB.remove('subscriptions', id);
            UI.toastSuccess('تم الحذف');
            close();
            await loadContent();
          }
        }
      }, UI.ICONS.trash),
      Utils.el('button', {
        class: 'btn btn--outline',
        onclick: () => { close(); showSubForm(id); }
      }, UI.ICONS.edit),
      Utils.el('button', {
        class: 'btn btn--success',
        style: { flex: 1 },
        onclick: async () => {
          // تسجيل عملية دفع الآن
          if (sub.walletId) {
            const wallet = await DB.get('wallets', sub.walletId);
            if (wallet) {
              wallet.balance = Number(wallet.balance) - Number(sub.amount);
              await DB.put('wallets', wallet);
              await DB.add('transactions', {
                type: 'expense',
                amount: sub.amount,
                walletId: sub.walletId,
                category: 'bills',
                note: `دفع ${sub.name}`,
                currency: sub.currency,
                date: Utils.nowISO()
              });
            }
          }
          // تحديث تاريخ الاستحقاق القادم
          sub.nextDueDate = getNextDueDate(sub.nextDueDate, sub.frequency);
          await DB.put('subscriptions', sub);
          UI.toastSuccess('تم تسجيل الدفع');
          close();
          await loadContent();
        }
      }, 'تسديد الآن')
    ]);

    const close = UI.modal({ title: 'تفاصيل الاشتراك', body, footer });
  }

  function getServiceColor(type, name) {
    if (name?.includes('Netflix')) return '#dc2626';
    if (name?.includes('Shahid')) return '#f59e0b';
    if (name?.includes('WATCH')) return '#0891b2';
    if (name?.includes('كهرباء')) return '#facc15';
    if (name?.includes('ماء')) return '#3b82f6';
    if (name?.includes('إنترنت')) return '#8b5cf6';
    if (name?.includes('إيجار')) return '#16a34a';
    return '#64748b';
  }

  function getServiceIcon(name) {
    if (name?.includes('Netflix')) return UI.ICONS.entertainment;
    if (name?.includes('إيجار')) return UI.ICONS.realEstate;
    return UI.ICONS.bills;
  }

  function getFrequencyLabel(freq) {
    const map = { daily: 'يومي', weekly: 'أسبوعي', monthly: 'شهري', quarterly: 'ربع سنوي', yearly: 'سنوي' };
    return map[freq] || freq;
  }

  function getNextDueDate(currentDate, frequency) {
    const d = new Date(currentDate);
    switch (frequency) {
      case 'daily': d.setDate(d.getDate() + 1); break;
      case 'weekly': d.setDate(d.getDate() + 7); break;
      case 'monthly': d.setMonth(d.getMonth() + 1); break;
      case 'quarterly': d.setMonth(d.getMonth() + 3); break;
      case 'yearly': d.setFullYear(d.getFullYear() + 1); break;
    }
    return d.toISOString().slice(0, 10);
  }

  return { render };
})();

/* =========================================================
   TASKS.JS - واجهة المهام
   ========================================================= */

window.TasksPage = (function () {
  'use strict';

  async function render() {
    const root = document.getElementById('app-root');
    document.getElementById('bottom-nav').classList.remove('hidden');

    const user = await Auth.getCurrentUser();

    root.innerHTML = `
      ${UI.topbar({ userName: user?.name || '', avatarText: Utils.initials(user?.name || '') }).outerHTML}
      <div class="page">
        <div class="page__header" style="display:flex;align-items:center">
          <button class="back-btn" onclick="history.back()">${UI.ICONS.chevronRight}</button>
          <h1 class="page__title">مهامي</h1>
        </div>
        <div id="tasks-content"></div>
      </div>
    `;

    const topbarEl = root.querySelector('.topbar');
    topbarEl.replaceWith(UI.topbar({
      userName: user?.name || '',
      avatarText: Utils.initials(user?.name || '')
    }));

    await loadContent();
  }

  async function loadContent() {
    const container = document.getElementById('tasks-content');
    const tasks = await DB.getAll('tasks');
    const lists = await DB.getAll('taskLists');

    const completed = tasks.filter(t => t.completed).length;
    const todayTasks = tasks.filter(t => {
      if (!t.dueDate) return false;
      const d = new Date(t.dueDate);
      const today = new Date();
      return d.toDateString() === today.toDateString();
    }).length;
    const important = tasks.filter(t => t.priority === 'high').length;
    const planned = tasks.filter(t => t.dueDate).length;

    container.innerHTML = `
      <div class="page__body">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-card__label">المكتملة</div>
            <div class="stat-card__value text-success">${completed}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">مهام اليوم</div>
            <div class="stat-card__value">${todayTasks}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">المهمة</div>
            <div class="stat-card__value text-danger">${important}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">المخططة</div>
            <div class="stat-card__value">${planned}</div>
          </div>
        </div>

        <div style="display:flex;gap:8px;margin-bottom:16px">
          <button class="btn btn--primary btn--block" id="add-task-btn">${UI.ICONS.plus} مهمة جديدة</button>
          <button class="btn btn--outline" id="add-list-btn">${UI.ICONS.list} قائمة</button>
        </div>

        <div class="search-bar" style="margin:0 0 16px">
          ${UI.ICONS.search}
          <input type="search" id="task-search" placeholder="ابحث عن مهمة..." />
        </div>

        <div id="lists-container"></div>
      </div>
    `;

    container.querySelector('#add-task-btn').addEventListener('click', () => showTaskForm());
    container.querySelector('#add-list-btn').addEventListener('click', () => showListForm());

    container.querySelector('#task-search').addEventListener('input', Utils.debounce(() => {
      renderTasksList(container.querySelector('#lists-container'), lists, tasks, container.querySelector('#task-search').value);
    }, 200));

    renderTasksList(container.querySelector('#lists-container'), lists, tasks, '');
  }

  function renderTasksList(container, lists, tasks, search) {
    let filtered = tasks;
    if (search) {
      const q = search.toLowerCase();
      filtered = tasks.filter(t =>
        (t.title || '').toLowerCase().includes(q) ||
        (t.description || '').toLowerCase().includes(q)
      );
    }

    // تجميع حسب القائمة
    const byList = {};
    filtered.forEach(t => {
      const listId = t.listId || 'default';
      if (!byList[listId]) byList[listId] = [];
      byList[listId].push(t);
    });

    if (filtered.length === 0) {
      container.innerHTML = '';
      container.appendChild(UI.emptyState({
        icon: UI.ICONS.task,
        title: 'لا توجد مهام',
        text: 'ابدأ بإضافة مهمة جديدة لتنظيم يومك',
        actionText: 'إضافة مهمة',
        onAction: () => showTaskForm()
      }));
      return;
    }

    container.innerHTML = `
      ${lists.length > 0 ? lists.map(list => {
        const listTasks = byList[list.id] || [];
        if (listTasks.length === 0 && search) return '';
        return renderListSection(list, listTasks);
      }).join('') : ''}

      ${(byList['default'] || []).length > 0 ? renderListSection({ id: 'default', name: 'مهام عامة', color: '#64748b' }, byList['default']) : ''}
    `;

    // أحداث إكمال المهمة
    container.querySelectorAll('[data-action="toggle"]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const task = await DB.get('tasks', id);
        if (task) {
          task.completed = !task.completed;
          await DB.put('tasks', task);
          await loadContent();
        }
      });
    });

    container.querySelectorAll('[data-id]').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('[data-action]')) return;
        showTaskDetails(card.dataset.id);
      });
    });
  }

  function renderListSection(list, tasks) {
    const completed = tasks.filter(t => t.completed).length;
    return `
      <div class="card" style="margin-bottom:16px">
        <div class="card__header" style="border-bottom:1px solid var(--color-divider);padding-bottom:12px">
          <div style="display:flex;align-items:center;gap:8px">
            ${list.color ? `<span class="dot" style="background:${list.color}"></span>` : ''}
            <h3 class="card__title">${Utils.escapeHTML(list.name)}</h3>
            <span class="badge">${completed}/${tasks.length}</span>
          </div>
        </div>
        ${tasks.map(t => `
          <div class="list-item" data-id="${t.id}">
            <button class="icon-btn" data-action="toggle" data-id="${t.id}" style="width:28px;height:28px;border:2px solid ${t.completed ? 'var(--color-success)' : 'var(--color-border-strong)'};background:${t.completed ? 'var(--color-success)' : 'transparent'};color:#fff;border-radius:50%">
              ${t.completed ? UI.ICONS.check : ''}
            </button>
            <div class="list-item__body">
              <div class="list-item__title ${t.completed ? 'text-tertiary' : ''}" style="${t.completed ? 'text-decoration:line-through' : ''}">${Utils.escapeHTML(t.title)}</div>
              <div class="list-item__subtitle">
                ${t.priority === 'high' ? '<span class="badge badge--danger">مهمة</span>' : ''}
                ${t.priority === 'medium' ? '<span class="badge badge--warning">متوسطة</span>' : ''}
                ${t.dueDate ? `<span class="date-pill">${Utils.formatDateShort(t.dueDate)}</span>` : ''}
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function showTaskForm(taskId = null) {
    DB.get('tasks', taskId).then(async task => {
      const lists = await DB.getAll('taskLists');

      const body = Utils.el('div');
      body.innerHTML = `

        ${UI.field({ label: 'الوصف', name: 'description', type: 'textarea', value: task?.description || '' })}
        <div class="form-row">
          ${UI.field({ label: 'تاريخ الاستحقاق', name: 'dueDate', type: 'date', value: task?.dueDate || '' })}

        </div>
        <div class="form-group">
          <label class="form-label">التكرار</label>
          <select class="form-select" id="task-repeat">

        <div class="form-group">

            <option value="medium" ${task?.priority === 'medium' || !task?.priority ? 'selected' : ''}>عادية</option>
            <option value="high" ${task?.priority === 'high' ? 'selected' : ''}>مهمة</option>

        <div class="form-group">
          <label class="form-label">القائمة</label>
          <select class="form-select" id="task-list">

          </select>
        </div>
        ${UI.field({ label: 'ملاحظات', name: 'notes', type: 'textarea', value: task?.notes || '' })}
      `;

      const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
        Utils.el('button', { class: 'btn btn--outline', onclick: () => close() }, 'إلغاء'),

          class: 'btn btn--primary',
          style: { flex: 1 },
          onclick: async () => {

            if (taskId) {
              await DB.put('tasks', data);
              UI.toastSuccess('تم التحديث');
            } else {
              await DB.add('tasks', data);
              UI.toastSuccess('تمت الإضافة');
            }

            close();
            await loadContent();
          }
        }, 'حفظ')
      ]);

      const close = UI.modal({ title: taskId ? 'تعديل مهمة' : 'مهمة جديدة', body, footer });
    });
  }

  function showListForm() {
    const body = Utils.el('div');

        <label class="form-label">نوع القائمة</label>

          <option value="work">عمل</option>
          <option value="personal">شخصية</option>
          <option value="shopping">تسوق</option>
          <option value="study">دراسة</option>
        </select>

      <div class="form-group">

        <div class="icon-picker" id="list-icon-picker">
          ${['📝', '💼', '🏠', '🛒', '📚', '🎯', '⭐', '🔥', '✅', '📌', '💡', '🎨'].map((icon, i) => `
            <div class="icon-option ${i === 0 ? 'selected' : ''}" data-icon="${icon}">${icon}</div>
          `).join('')}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">اللون</label>
        <div class="color-picker" id="list-color-picker">

            <div class="color-option ${i === 0 ? 'selected' : ''}" data-color="${c}" style="background:${c}"></div>
          `).join('')}
        </div>

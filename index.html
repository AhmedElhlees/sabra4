/* =========================================================
   STATE.JS - إدارة الحالة العامة للتطبيق
   ========================================================= */

window.State = (function () {
  'use strict';

  // الحالة العامة
  const state = {
    currentUser: null,
    currentCurrency: '₪',
    activePeriod: 'this_month',
    activeTab: 'overview',
    notifications: [],
    listeners: new Map()
  };

  // الاشتراك في تغييرات مفتاح معين
  function subscribe(key, callback) {
    if (!state.listeners.has(key)) {
      state.listeners.set(key, new Set());
    }
    state.listeners.get(key).add(callback);
    return () => state.listeners.get(key)?.delete(callback);
  }

  // إطلاق تغيير
  function emit(key, value) {
    state.listeners.get(key)?.forEach(cb => {
      try { cb(value); } catch (e) { console.error(e); }
    });
  }

  // تحديث قيمة
  function set(key, value) {
    state[key] = value;
    emit(key, value);
  }

  function get(key) {
    return state[key];
  }

  // تحميل البيانات الأولية
  async function init() {
    state.currentUser = await Auth.getCurrentUser();
    if (state.currentUser) {
      state.currentCurrency = state.currentUser.currency || '₪';
    }

    // تحميل الإعدادات
    const theme = await DB.getSetting('theme', 'light');
    applyTheme(theme);

    const lang = await DB.getSetting('language', 'ar');
    state.language = lang;
  }

  // تطبيق الثيم
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    document.querySelector('meta[name="theme-color"]')?.setAttribute('content', theme === 'dark' ? '#0f172a' : '#0f766e');
  }

  // تبديل الثيم
  async function toggleTheme() {
    const current = await DB.getSetting('theme', 'light');
    const next = current === 'light' ? 'dark' : 'light';
    await DB.setSetting('theme', next);
    applyTheme(next);
    emit('theme', next);
    return next;
  }

  // ============ حساب الإحصائيات ============
  async function getStats(period = 'this_month') {
    const { startDate, endDate, label } = getPeriodRange(period);

    const wallets = (await DB.getAll('wallets')).filter(w => !w.archived);
    const allTx = await DB.getAll('transactions');

    // إجمالي الرصيد
    const totalBalance = wallets.reduce((sum, w) => sum + (Number(w.balance) || 0), 0);

    // دخل ومصروفات الفترة
    const periodTx = allTx.filter(tx => {
      const txDate = new Date(tx.date);
      return txDate >= startDate && txDate <= endDate;
    });

    const income = periodTx.filter(t => t.type === 'income').reduce((s, t) => s + Number(t.amount), 0);
    const expenses = periodTx.filter(t => t.type === 'expense').reduce((s, t) => s + Number(t.amount), 0);
    const net = income - expenses;

    // ديون
    const debts = await DB.getAll('debts');
    const debtsOwedToMe = debts.filter(d => d.type === 'owed_to_me' && !d.archived).reduce((s, d) => s + Number(d.remainingAmount || d.amount || 0), 0);
    const debtsOwedToOthers = debts.filter(d => d.type === 'owed_to_them' && !d.archived).reduce((s, d) => s + Number(d.remainingAmount || d.amount || 0), 0);

    // ممتلكات
    const properties = await DB.getAll('properties');
    const propertiesValue = properties.reduce((s, p) => s + Number(p.purchasePrice || 0), 0);
    const goldWeight = properties.filter(p => p.type === 'gold').reduce((s, p) => s + Number(p.weight || 0), 0);
    const silverWeight = properties.filter(p => p.type === 'silver').reduce((s, p) => s + Number(p.weight || 0), 0);

    // عدد العمليات
    const txCount = periodTx.length;

    // معدل الادخار
    const savingsRate = income > 0 ? Math.round((net / income) * 100) : 0;
    const expenseRate = income > 0 ? Math.round((expenses / income) * 100) : 0;

    return {
      totalBalance,
      income,
      expenses,
      net,
      debtsOwedToMe,
      debtsOwedToOthers,
      propertiesValue,
      goldWeight,
      silverWeight,
      txCount,
      savingsRate,
      expenseRate,
      walletsCount: wallets.length,
      periodLabel: label,
      periodTx
    };
  }

  // الحصول على نطاق الفترة
  function getPeriodRange(period) {
    const now = new Date();
    let startDate, endDate, label;

    switch (period) {
      case 'today':
        startDate = Utils.startOfDay(now);
        endDate = Utils.endOfDay(now);
        label = 'اليوم';
        break;
      case 'yesterday':
        startDate = Utils.startOfDay(Utils.addDays(now, -1));
        endDate = Utils.endOfDay(Utils.addDays(now, -1));
        label = 'أمس';
        break;
      case 'last_week':
        startDate = Utils.startOfWeek(Utils.addDays(now, -7));
        endDate = Utils.endOfDay(now);
        label = 'آخر أسبوع';
        break;
      case 'this_month':
        startDate = Utils.startOfMonth(now);
        endDate = Utils.endOfMonth(now);
        label = Utils.formatMonthYear(now);
        break;
      case 'last_month':
        const lastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
        startDate = Utils.startOfMonth(lastMonth);
        endDate = Utils.endOfMonth(lastMonth);
        label = Utils.formatMonthYear(lastMonth);
        break;
      case 'this_year':
        startDate = Utils.startOfYear(now);
        endDate = new Date(now.getFullYear(), 11, 31, 23, 59, 59);
        label = `${now.getFullYear()}`;
        break;
      case 'all':
      default:
        startDate = new Date(2000, 0, 1);
        endDate = new Date(2100, 0, 1);
        label = 'كل الأيام';
        break;
    }

    return { startDate, endDate, label };
  }

  // ============ الفئات ============
  const CATEGORIES = {
    food: { label: 'طعام ومشروبات', color: '#f97316', icon: 'food' },
    transport: { label: 'مواصلات', color: '#3b82f6', icon: 'transport' },
    shopping: { label: 'تسوق', color: '#ec4899', icon: 'shopping' },
    bills: { label: 'فواتير', color: '#ef4444', icon: 'bills' },
    health: { label: 'صحة', color: '#10b981', icon: 'health' },
    education: { label: 'تعليم', color: '#8b5cf6', icon: 'education' },
    entertainment: { label: 'ترفيه', color: '#f59e0b', icon: 'entertainment' },
    salary: { label: 'راتب', color: '#16a34a', icon: 'money' },
    investment: { label: 'استثمار', color: '#0ea5e9', icon: 'chart' },
    gift: { label: 'هدية', color: '#a855f7', icon: 'occasion' },
    other: { label: 'أخرى', color: '#64748b', icon: 'list' }
  };

  // العملات المدعومة
  const CURRENCIES = [
    { code: 'ILS', symbol: '₪', label: 'شيكل إسرائيلي' },
    { code: 'USD', symbol: '$', label: 'دولار أمريكي' },
    { code: 'EUR', symbol: '€', label: 'يورو' },
    { code: 'JOD', symbol: 'JD', label: 'دينار أردني' },
    { code: 'EGP', symbol: 'ج', label: 'جنيه مصري' },
    { code: 'SAR', symbol: 'ر.س', label: 'ريال سعودي' },
    { code: 'AED', symbol: 'د.إ', label: 'درهم إماراتي' },
    { code: 'TRY', symbol: '₺', label: 'ليرة تركية' }
  ];

  return {
    state,
    subscribe,
    set,
    get,
    init,
    applyTheme,
    toggleTheme,
    getStats,
    getPeriodRange,
    CATEGORIES,
    CURRENCIES
  };
})();


/* ===== js/lib/sounds.js ===== */
/* =========================================================
   SOUNDS.JS - المؤثرات الصوتية (Web Audio API - بدون ملفات خارجية)
   =========================================================
   تستخدم Web Audio API لتوليد الأصوات برمجياً، فلا تحتاج
   لملفات صوتية خارجية وتعمل بدون إنترنت تماماً.
   ========================================================= */

window.Sounds = (function () {
  'use strict';

  let audioCtx = null;
  let enabled = true; // يمكن للمستخدم إيقافها من الإعدادات

  // الحصول على سياق الصوت
  function ctx() {
    if (!audioCtx) {
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        audioCtx = new AC();
      } catch (e) {
        return null;
      }
    }
    // استئناف السياق إن كان معلّقاً (سياسة المتصفح)
    if (audioCtx.state === 'suspended') {
      audioCtx.resume().catch(() => {});
    }
    return audioCtx;
  }

  // تشغيل نغمة واحدة
  function tone(freq, duration, type, volume, when) {
    if (!enabled) return;
    const c = ctx();
    if (!c) return;

    const osc = c.createOscillator();
    const gain = c.createGain();

    osc.type = type || 'sine';
    osc.frequency.value = freq;

    const t0 = c.currentTime + (when || 0);
    // رفع مستوى الصوت الافتراضي والحد الأقصى
    const v = volume == null ? 0.35 : volume;

    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(v, t0 + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);

    osc.connect(gain);
    gain.connect(c.destination);
    osc.start(t0);
    osc.stop(t0 + duration + 0.02);
  }

  // تشغيل عدة نغمات متسلسلة
  function sequence(notes) {
    if (!enabled) return;
    let t = 0;
    for (const n of notes) {
      tone(n.freq, n.dur, n.type, n.vol, t);
      t += n.gap != null ? n.gap : n.dur;
    }
  }

  // ============ الأصوان الجاهزة ============

  // 1. نقرة خفيفة (عند الضغط على أي زر)
  function tap() {
    tone(880, 0.05, 'sine', 0.22);
  }

  // 2. نقرة لوحة الأرقام
  function keypad() {
    tone(1200, 0.04, 'sine', 0.28);
    tone(1600, 0.03, 'sine', 0.18, 0.005);
  }

  // 3. نجاح (دخول ناجح، حفظ عملية)
  function success() {
    sequence([
      { freq: 523.25, dur: 0.10, type: 'sine', vol: 0.32 },           // C5
      { freq: 659.25, dur: 0.10, type: 'sine', vol: 0.32, gap: 0.09 }, // E5
      { freq: 783.99, dur: 0.18, type: 'sine', vol: 0.36, gap: 0.09 }  // G5
    ]);
  }

  // 4. خطأ (رمز خاطئ، فشل)
  function error() {
    sequence([
      { freq: 311.13, dur: 0.15, type: 'square', vol: 0.24 },          // Eb4
      { freq: 233.08, dur: 0.25, type: 'square', vol: 0.24, gap: 0.13 } // Bb3
    ]);
  }

  // 5. حذف (مع تأكيد)
  function deleteSound() {
    sequence([
      { freq: 440, dur: 0.08, type: 'triangle', vol: 0.28 },
      { freq: 330, dur: 0.08, type: 'triangle', vol: 0.28, gap: 0.07 },
      { freq: 220, dur: 0.15, type: 'triangle', vol: 0.32, gap: 0.07 }
    ]);
  }

  // 6. إشعار / تذكير
  function notify() {
    sequence([
      { freq: 987.77, dur: 0.12, type: 'sine', vol: 0.26 },
      { freq: 1318.51, dur: 0.18, type: 'sine', vol: 0.28, gap: 0.10 }
    ]);
  }

  // 7. فتح / إغلاق نموذج
  function whoosh() {
    if (!enabled) return;
    const c = ctx();
    if (!c) return;
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = 'sine';
    const t0 = c.currentTime;
    osc.frequency.setValueAtTime(400, t0);
    osc.frequency.exponentialRampToValueAtTime(900, t0 + 0.15);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(0.18, t0 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.20);
    osc.connect(gain);
    gain.connect(c.destination);
    osc.start(t0);
    osc.stop(t0 + 0.22);
  }

  // 8. تأكيد (نعم / حفظ)
  function confirm() {
    sequence([
      { freq: 659.25, dur: 0.09, type: 'sine', vol: 0.28 },
      { freq: 987.77, dur: 0.16, type: 'sine', vol: 0.32, gap: 0.07 }
    ]);
  }

  // ============ التحكم بالتفعيل ============
  function setEnabled(v) {
    enabled = !!v;
    try {
      localStorage.setItem('sounds_enabled', enabled ? '1' : '0');
    } catch {}
  }

  function isEnabled() {
    return enabled;
  }

  // تحميل التفضيل من localStorage
  function loadPref() {
    try {
      const v = localStorage.getItem('sounds_enabled');
      if (v !== null) enabled = v === '1';
    } catch {}
  }

  // تهيئة عند أول تفاعل من المستخدم (سياسة المتصفح)
  function initOnUserGesture() {
    const handler = () => {
      // محاولة استئناف السياق
      const c = ctx();
      if (c && c.state === 'suspended') c.resume().catch(() => {});
      // تشغيل صوت خافت جداً للتحقق
      tone(1, 0.001, 'sine', 0.0001);
      // إزالة المستمع بعد أول تفاعل
      ['click', 'touchstart', 'keydown'].forEach(ev =>
        document.removeEventListener(ev, handler, true)
      );
    };
    ['click', 'touchstart', 'keydown'].forEach(ev =>
      document.addEventListener(ev, handler, true)
    );
  }

  // تشغيل تلقائي
  loadPref();
  if (typeof document !== 'undefined') {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initOnUserGesture);
    } else {
      initOnUserGesture();
    }
  }

  return {
    tap, keypad, success, error, deleteSound, notify, whoosh, confirm,
    setEnabled, isEnabled, loadPref
  };
})();

        <div class="pin-pad" id="ob-pin-pad" role="group" aria-label="لوحة الأرقام">
          ${[1,2,3,4,5,6,7,8,9].map(n => `
            <button type="button" class="pin-pad__key" data-digit="${n}" aria-label="رقم ${n}">${n}</button>
          `).join('')}
          <button type="button" class="pin-pad__key pin-pad__key--action" data-action="clear" aria-label="مسح الكل">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
              <path d="M5 6l1 14a2 2 0 002 2h8a2 2 0 002-2l1-14"/>
            </svg>
          </button>
          <button type="button" class="pin-pad__key" data-digit="0" aria-label="رقم 0">0</button>
          <button type="button" class="pin-pad__key pin-pad__key--action" data-action="backspace" aria-label="حذف رقم">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/>
              <line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
            </svg>
          </button>
        </div>

        <button class="btn btn--outline btn--block" id="ob-back" style="margin-top:16px">رجوع</button>
        ${cryptoWarning()}
      `;

      bindPinPad(container, 'ob-pin-pad', 'ob-pin-display', 'ob-pin-hint', (pin) => {
        formData.pin = pin;
        currentStep = 3;
        renderStep();
      });

      container.querySelector('#ob-back').addEventListener('click', () => {
        currentStep = 1;
        renderStep();
      });
    }

    else if (currentStep === 3) {
      container.innerHTML = `
        ${stepsIndicator}
        <div style="text-align:center;margin-bottom:20px">
          <h2 style="font-size:22px;font-weight:700;color:var(--color-text)">تأكيد الرمز</h2>
          <p style="font-size:14px;color:var(--color-text-secondary);margin-top:6px">
            أعد إدخال نفس الرمز للتأكيد.
          </p>
        </div>

        <div class="pin-display" id="ob-pin-display" aria-label="حقل التأكيد">
          ${Array.from({length: PIN_LENGTH}).map((_, i) => `<span class="pin-dot" data-index="${i}"></span>`).join('')}
        </div>

        <div class="pin-hint" id="ob-pin-hint">أعد إدخال الرمز</div>

        <div class="pin-pad" id="ob-pin-pad" role="group" aria-label="لوحة الأرقام">
          ${[1,2,3,4,5,6,7,8,9].map(n => `
            <button type="button" class="pin-pad__key" data-digit="${n}" aria-label="رقم ${n}">${n}</button>
          `).join('')}
          <button type="button" class="pin-pad__key pin-pad__key--action" data-action="clear" aria-label="مسح الكل">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
              <path d="M5 6l1 14a2 2 0 002 2h8a2 2 0 002-2l1-14"/>
            </svg>
          </button>
          <button type="button" class="pin-pad__key" data-digit="0" aria-label="رقم 0">0</button>
          <button type="button" class="pin-pad__key pin-pad__key--action" data-action="backspace" aria-label="حذف رقم">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/>
              <line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
            </svg>
          </button>
        </div>

        <button class="btn btn--outline btn--block" id="ob-back" style="margin-top:16px">رجوع</button>
        ${cryptoWarning()}
      `;

      bindPinPad(container, 'ob-pin-pad', 'ob-pin-display', 'ob-pin-hint', async (pin) => {
        if (pin !== formData.pin) {
          const hint = container.querySelector('#ob-pin-hint');
          if (hint) {
            hint.textContent = 'الرمز غير مطابق، حاول مرة أخرى';
            hint.classList.add('error');
          }
          const disp = container.querySelector('#ob-pin-display');
          if (disp) {
            disp.classList.add('shake');
            setTimeout(() => disp.classList.remove('shake'), 500);
          }
          if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
          // إعادة العودة لخطوة إدخال PIN
          setTimeout(() => {
            formData.pin = '';
            currentStep = 2;
            renderStep();
          }, 800);
          return;
        }
        formData.pinConfirm = pin;
        await completeOnboarding();
      });

      container.querySelector('#ob-back').addEventListener('click', () => {
        formData.pin = '';
        currentStep = 2;
        renderStep();
      });
    }
  }

  // لوحة الأرقام - دالة مشتركة بين خطوتي PIN والتأكيد
  function bindPinPad(container, padId, displayId, hintId, onComplete) {
    const pad = container.querySelector('#' + padId);
    const display = container.querySelector('#' + displayId);
    const hint = container.querySelector('#' + hintId);
    let entered = '';

    function update() {
      const dots = display.querySelectorAll('.pin-dot');
      dots.forEach((dot, i) => {
        dot.classList.toggle('filled', i < entered.length);
      });
      if (hint) {
        hint.classList.remove('error');
        if (entered.length === 0) hint.textContent = 'أدخل الرمز المكوّن من 4 أرقام';
        else if (entered.length < PIN_LENGTH) hint.textContent = `بقيت ${PIN_LENGTH - entered.length} ${PIN_LENGTH - entered.length === 1 ? 'رقم' : 'أرقام'}`;
      }
    }

    pad.addEventListener('click', async (e) => {
      const btn = e.target.closest('.pin-pad__key');
      if (!btn) return;
      const digit = btn.dataset.digit;
      const action = btn.dataset.action;

      if (action === 'clear') { entered = ''; update(); if (window.Sounds) Sounds.tap(); return; }
      if (action === 'backspace') { entered = entered.slice(0, -1); update(); if (window.Sounds) Sounds.tap(); return; }
      if (digit == null) return;
      if (entered.length >= PIN_LENGTH) return;

      entered += digit;
      update();
      if (window.Sounds) Sounds.keypad();
      if (navigator.vibrate) navigator.vibrate(10);

      if (entered.length === PIN_LENGTH) {
        pad.style.pointerEvents = 'none';
        await new Promise(r => setTimeout(r, 150));
        try {
          await onComplete(entered);
        } catch (e) {
          console.error('[Onboarding] onComplete error:', e);
          UI.toastError('حدث خطأ: ' + (e.message || e));
        }
      }
    });

    update();
  }

  function cryptoWarning() {
    if (Crypto.isAvailable()) {
      return `
        <div class="alert alert--success" style="margin-top:16px;font-size:12px;padding:10px">
          ${UI.ICONS.check}
          <div>التشفير مُفعّل (AES-256-GCM + PBKDF2). بياناتك ستكون مشفّرة بالكامل على جهازك.</div>
        </div>
      `;
    }
    return `
      <div class="alert alert--warning" style="margin-top:16px;font-size:12px;padding:10px">
        ${UI.ICONS.info}
        <div>لتفعيل التشفير الكامل، شغّل التطبيق من <strong>http://localhost</strong> (انظر التعليمات في ملف README).</div>
      </div>
    `;
  }

  async function completeOnboarding() {
    try {
      // إنشاء بيانات اعتماد PIN (هاش + salt)
      const creds = await Crypto.createPinCredentials(formData.pin);

      // بدء جلسة التشفير
      await Crypto.startSession(formData.pin, creds.pinSalt);

      // إنشاء سجل المستخدم
      const user = {
        id: 'user_default',
        name: formData.name.trim(),
        phone: formData.phone.trim(),
        // لا نخزّن PIN نص صريح - فقط هاشه
        pinHash: creds.pinHash,           // هاش PBKDF2 للتحقق
        pinSalt: creds.pinSalt,           // salt
        secureMode: creds.secure,         // هل التشفير مُفعّل؟
        avatar: null,
        currency: formData.currency,
        language: 'ar',
        autoLockMinutes: 2,               // افتراضي: قفل بعد دقيقتين
        createdAt: Utils.nowISO(),
        onboarded: true
      };
      await DB.put('user', user);

      // تخزين المستخدم في localStorage للوصول السريع
      localStorage.setItem('ibn_alsabrah_current_user', JSON.stringify(user));

      // إنشاء جلسة (تبقى 30 يوماً)
      const session = {
        userId: user.id,
        expiresAt: Date.now() + (30 * 24 * 60 * 60 * 1000)
      };
      localStorage.setItem('ibn_alsabrah_session', JSON.stringify(session));

      // طلب إذن الإشعارات
      if ('Notification' in window && Notification.permission === 'default') {
        try { await Notification.requestPermission(); } catch {}
      }

      if (window.Sounds) Sounds.success();
      UI.toastSuccess('تم إنشاء حسابك بنجاح! أهلاً بك ' + user.name);

      // الانتقال للوحة التحكم
      setTimeout(() => {
        window.location.hash = '#/dashboard';
      }, 600);
    } catch (err) {
      console.error('[Onboarding] error:', err);
      UI.toastError('تعذّر إعداد الحساب: ' + (err.message || err));
    }
  }

  return { render };
})();

/* =========================================================
   LOGIN.JS - صفحة تسجيل الدخول مع لوحة أرقام PIN
   =========================================================
   - تدعم وضع الإعداد الأولي (إن لم يُوجَد مستخدم)
   - تدعم وضع القفل التلقائي (إعادة إدخال PIN دون خروج)
   - لا تطلب معرّفاً - فقط PIN (المستخدم وحيد على الجهاز)
   ========================================================= */

window.LoginPage = (function () {
  'use strict';

  const PIN_LENGTH = 4;
  let enteredPin = '';
  let shakeTimer = null;
  let isLockedMode = false;

  async function render() {
    const root = document.getElementById('app-root');
    document.getElementById('bottom-nav').classList.add('hidden');

    enteredPin = '';

    // تحقق من الحالة: onboarding مطلوب؟ قفل تلقائي؟ تسجيل دخول عادي؟
    const onboarded = await Auth.isOnboarded();
    if (!onboarded) {
      // لا يوجد مستخدم - انتقل لصفحة الإعداد الأولي
      window.location.hash = '#/onboarding';
      return;
    }

    isLockedMode = Auth.isLocked();
    const user = await DB.get('user', 'user_default');

    root.innerHTML = `
      <div class="login-page login-page--pin">
        <div class="login-page__logo">
          <div class="login-page__logo-icon">
            <svg viewBox="0 0 24 24" width="44" height="44" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 7h18v12H3z"/>
              <path d="M3 7l3-4h12l3 4"/>
              <circle cx="12" cy="13" r="3"/>
            </svg>
          </div>
          <h1 class="login-page__title">Ibn-alSabrah</h1>
          <p class="login-page__subtitle">${isLockedMode ? 'التطبيق مقفل' : 'إدارة الموال الشخصي'}</p>
          ${user && user.name ? `<p style="font-size:13px;color:var(--color-text-secondary);margin-top:4px">أهلاً ${Utils.escapeHTML(user.name)}</p>` : ''}
        </div>

        <div class="pin-display" id="pin-display" aria-label="حقل إدخال الرمز">
          ${Array.from({length: PIN_LENGTH}).map((_, i) =>
            `<span class="pin-dot" data-index="${i}"></span>`
          ).join('')}
        </div>

        <div class="pin-hint" id="pin-hint">${isLockedMode ? 'أدخل رمزك لفتح القفل' : 'أدخل الرمز المكوّن من 4 أرقام'}</div>

        <div class="pin-pad" id="pin-pad" role="group" aria-label="لوحة الأرقام">
          ${[1,2,3,4,5,6,7,8,9].map(n => `
            <button type="button" class="pin-pad__key" data-digit="${n}" aria-label="رقم ${n}">${n}</button>
          `).join('')}
          <button type="button" class="pin-pad__key pin-pad__key--action" data-action="clear" aria-label="مسح الكل">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18"/>
              <path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
              <path d="M5 6l1 14a2 2 0 002 2h8a2 2 0 002-2l1-14"/>
            </svg>
          </button>
          <button type="button" class="pin-pad__key" data-digit="0" aria-label="رقم 0">0</button>
          <button type="button" class="pin-pad__key pin-pad__key--action" data-action="backspace" aria-label="حذف رقم">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/>
              <line x1="18" y1="9" x2="12" y2="15"/>
              <line x1="12" y1="9" x2="18" y2="15"/>
            </svg>
          </button>
        </div>

        <div class="login-page__footer">
          ${isLockedMode ? `
            <button class="btn btn--outline btn--sm" id="logout-full-btn" style="margin-bottom:8px">تسجيل خروج كامل</button>
          ` : ''}
          <p class="login-page__note">
            ${Crypto.isAvailable()
              ? '🔒 بياناتك مشفّرة محلياً (AES-256-GCM).'
              : 'لتفعيل التشفير، شغّل التطبيق من http://localhost'}
          </p>
        </div>
      </div>
    `;

    // ربط أحداث لوحة الأرقام
    const pad = document.getElementById('pin-pad');
    pad.addEventListener('click', (e) => {
      const btn = e.target.closest('.pin-pad__key');
      if (!btn) return;
      handleKey(btn);
    });

    document.addEventListener('keydown', onKeyboardKey);

    // زر الخروج الكامل (في وضع القفل)
    const logoutFullBtn = document.getElementById('logout-full-btn');
    if (logoutFullBtn) {
      logoutFullBtn.addEventListener('click', async () => {
        if (await UI.confirm({ title: 'تسجيل الخروج', message: 'هل تريد تسجيل الخروج الكامل؟', danger: true })) {
          Auth.logout();
        }
      });
    }

    function shake() {
      const disp = document.getElementById('pin-display');
      if (!disp) return;
      disp.classList.remove('shake');
      void disp.offsetWidth;
      disp.classList.add('shake');
      if (shakeTimer) clearTimeout(shakeTimer);
      shakeTimer = setTimeout(() => disp.classList.remove('shake'), 500);
    }

    async function handleKey(btn) {
      const digit = btn.dataset.digit;
      const action = btn.dataset.action;

      if (action === 'clear') {
        enteredPin = '';
        updateDisplay();
        if (window.Sounds) Sounds.tap();
        return;
      }
      if (action === 'backspace') {
        enteredPin = enteredPin.slice(0, -1);
        updateDisplay();
        if (window.Sounds) Sounds.tap();
        return;
      }
      if (digit == null) return;
      if (enteredPin.length >= PIN_LENGTH) return;

      enteredPin += digit;
      updateDisplay();

      if (window.Sounds) Sounds.keypad();
      if (navigator.vibrate) navigator.vibrate(10);

      if (enteredPin.length === PIN_LENGTH) {
        const padEl = document.getElementById('pin-pad');
        if (padEl) padEl.style.pointerEvents = 'none';
        await tryLogin();
        const padEl2 = document.getElementById('pin-pad');
        if (padEl2) padEl2.style.pointerEvents = '';
      }
    }

    function onKeyboardKey(e) {
      if (!document.getElementById('pin-pad')) {
        document.removeEventListener('keydown', onKeyboardKey);
        return;
      }
      if (e.key >= '0' && e.key <= '9') {
        e.preventDefault();
        const btn = document.querySelector(`.pin-pad__key[data-digit="${e.key}"]`);
        if (btn) handleKey(btn);
      } else if (e.key === 'Backspace') {
        e.preventDefault();
        const btn = document.querySelector('.pin-pad__key[data-action="backspace"]');
        if (btn) handleKey(btn);
      } else if (e.key === 'Escape') {
        e.preventDefault();
        const btn = document.querySelector('.pin-pad__key[data-action="clear"]');
        if (btn) handleKey(btn);
      }
    }

    function updateDisplay() {
      const dots = document.querySelectorAll('.pin-dot');
      dots.forEach((dot, i) => {
        dot.classList.toggle('filled', i < enteredPin.length);
      });
      const hint = document.getElementById('pin-hint');
      if (hint) {
        if (enteredPin.length === 0) {
          hint.textContent = isLockedMode ? 'أدخل رمزك لفتح القفل' : 'أدخل الرمز المكوّن من 4 أرقام';
          hint.classList.remove('error');
        } else if (enteredPin.length < PIN_LENGTH) {
          hint.textContent = `بقيت ${PIN_LENGTH - enteredPin.length} ${PIN_LENGTH - enteredPin.length === 1 ? 'رقم' : 'أرقام'}`;
          hint.classList.remove('error');
        }
      }
    }

    async function tryLogin() {
      const hint = document.getElementById('pin-hint');
      try {
        let result;
        if (isLockedMode) {
          result = await Auth.unlock(enteredPin);
        } else {
          result = await Auth.login(enteredPin);
        }

        if (result.success) {
          if (window.Sounds) Sounds.success();
          if (hint) {
            hint.textContent = 'تم تسجيل الدخول بنجاح ✓';
            hint.classList.remove('error');
            hint.classList.add('success');
          }
          UI.toastSuccess('أهلاً بك ' + (result.user.name || ''));
          document.removeEventListener('keydown', onKeyboardKey);
          await State.init();
          setTimeout(() => {
            window.location.hash = '#/dashboard';
          }, 400);
        } else if (result.needOnboarding) {
          document.removeEventListener('keydown', onKeyboardKey);
          window.location.hash = '#/onboarding';
        } else {
          if (window.Sounds) Sounds.error();
          if (hint) {
            hint.textContent = 'رمز خاطئ، حاول مرة أخرى';
            hint.classList.add('error');
            hint.classList.remove('success');
          }
          shake();
          if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
          enteredPin = '';
          setTimeout(updateDisplay, 500);
        }
      } catch (err) {
        console.error(err);
        if (hint) {
          hint.textContent = 'حدث خطأ، حاول مرة أخرى';
          hint.classList.add('error');
        }
        enteredPin = '';
        setTimeout(updateDisplay, 400);
      }
    }
  }

  function destroy() {
    document.removeEventListener('keydown', onKeyboardKey);
  }

  return { render, destroy };
})();

/* =========================================================
   DASHBOARD.JS - الصفحة الرئيسية (لوحة التحكم)
   ========================================================= */

window.DashboardPage = (function () {
  'use strict';

  let currentPeriod = 'this_month';

  async function render() {
    const root = document.getElementById('app-root');
    document.getElementById('bottom-nav').classList.remove('hidden');

    const user = await Auth.getCurrentUser();
    if (!user) {
      window.location.hash = '#/login';
      return;
    }

    // هيكل عام مؤقت
    root.innerHTML = `
      <div id="topbar-container"></div>
      <div class="period-filter" id="period-filter"></div>
      <div id="stats-container"></div>
      <div id="quick-actions"></div>
      <div id="chart-section"></div>
      <div id="top-expenses"></div>
      <div id="recent-transactions"></div>
    `;

    // الشريط العلوي
    renderTopbar(user);

    // شريط تصفية الفترة
    renderPeriodFilter();

    // تحميل الإحصائيات
    await refreshStats();

    // الإجراءات السريعة
    renderQuickActions();

    // الرسم البياني
    await renderChart();

    // أكثر المصاريف
    await renderTopExpenses();

    // آخر العمليات
    await renderRecentTransactions();
  }

  function renderTopbar(user) {
    const container = document.getElementById('topbar-container');
    container.innerHTML = '';
    container.appendChild(UI.topbar({
      userName: user.name,
      avatarText: Utils.initials(user.name),
      avatarUrl: user.avatar || null,
      showSearch: true,
      showNotifications: true
    }));
  }

  function renderPeriodFilter() {
    const container = document.getElementById('period-filter');
    const periods = [
      { value: 'all', label: 'كل الأيام' },
      { value: 'today', label: 'اليوم' },
      { value: 'yesterday', label: 'أمس' },
      { value: 'last_week', label: 'آخر أسبوع' },
      { value: 'this_month', label: 'هذا الشهر' },
      { value: 'last_month', label: 'الشهر الماضي' },
      { value: 'this_year', label: 'هذا العام' },
      { value: 'custom', label: 'مخصص' }
    ];

    container.innerHTML = periods.map(p => `
      <button class="period-filter__chip ${p.value === currentPeriod ? 'active' : ''}" data-period="${p.value}">
        ${p.label}
      </button>
    `).join('');

    container.querySelectorAll('.period-filter__chip').forEach(chip => {
      chip.addEventListener('click', async () => {
        const period = chip.dataset.period;
        if (period === 'custom') {
          showCustomPeriodPicker();
          return;
        }
        currentPeriod = period;
        container.querySelectorAll('.period-filter__chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        await refreshStats();
        await renderChart();
        await renderTopExpenses();
        await renderRecentTransactions();
      });
    });
  }

  async function refreshStats() {
    const container = document.getElementById('stats-container');
    container.innerHTML = '<div style="text-align:center;padding:20px"><div class="spinner-sm" style="margin:0 auto"></div></div>';

    try {
      const stats = await State.getStats(currentPeriod);
      container.innerHTML = `
        <div class="stats-grid">
          <div class="stat-card stat-card--primary stat-card--full">
            <div class="stat-card__label">إجمالي الرصيد</div>
            <div class="stat-card__value">${Utils.formatMoney(stats.totalBalance, State.get('currentCurrency'))}</div>
            <div class="stat-card__sub">${stats.walletsCount} محافظ</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">دخل ${stats.periodLabel}</div>
            <div class="stat-card__value text-success">${Utils.formatMoney(stats.income, State.get('currentCurrency'))}</div>

  async function loadInvestmentsCard() {

      const currency = State.get('currentCurrency');
      const subtitle = document.getElementById('inv-card-subtitle');
      const body = document.getElementById('inv-card-body');

      const totalInvested = investments.reduce((s, i) => s + Number(i.amountInvested || 0), 0);
      const totalCurrent  = investments.reduce((s, i) => s + Number(i.currentValue  || 0), 0);

      subtitle.textContent = `${active} نشط • القيمة الحالية ${Utils.formatMoney(totalCurrent, currency)}`;

    } catch (e) {

  // ============ حذف عملية (مع تأكيد بكلمة السر) ============
  async function deleteTransaction(txId) {
    const tx = await DB.get('transactions', txId);
    if (!tx) {
      UI.toastError('العملية غير موجودة');
      return;
    }

    const cat = State.CATEGORIES[tx.category] || State.CATEGORIES.other;
    const isIncome = tx.type === 'income' || tx.type === 'transfer_in';
    const desc = tx.note || cat.label;

    // طلب تأكيد بكلمة السر
    const confirmed = await UI.confirmWithPassword({
      title: 'حذف العملية',
      message: `سيتم حذف العملية "${desc}" بقيمة ${Utils.formatMoney(tx.amount, tx.currency || '₪')} (${isIncome ? 'دخل' : 'مصروف'}). لن يمكن التراجع عن هذا الإجراء.`,
      confirmText: 'حذف نهائي',
      cancelText: 'إلغاء',
      danger: true
    });

    if (!confirmed) return;

    try {
      // عكس تأثير العملية على رصيد المحفظة
      const wallet = await DB.get('wallets', tx.walletId);
      if (wallet) {
        if (tx.type === 'income') {
          wallet.balance = Number(wallet.balance) - Number(tx.amount);
        } else if (tx.type === 'expense') {
          wallet.balance = Number(wallet.balance) + Number(tx.amount);
        } else if (tx.type === 'transfer_out' && tx.destWalletId) {
          // إلغاء التحويل: إرجاع المبلغ للمحفظة المصدر وحذفه من الوجهة
          wallet.balance = Number(wallet.balance) + Number(tx.amount);
          const dest = await DB.get('wallets', tx.destWalletId);
          if (dest) {
            dest.balance = Number(dest.balance) - Number(tx.amount);
            await DB.put('wallets', dest);
          }
          // حذف العملية المقابلة (transfer_in)
          const allTx = await DB.getAll('transactions');
          const pair = allTx.find(t => t.type === 'transfer_in' && t.sourceWalletId === tx.walletId && t.amount === tx.amount && t.date === tx.date);
          if (pair) {
            await DB.remove('transactions', pair.id);
          }
        } else if (tx.type === 'transfer_in' && tx.sourceWalletId) {
          // إذا حذفنا transfer_in، نحذف أيضاً transfer_out المقابل
          const source = await DB.get('wallets', tx.sourceWalletId);
          if (source) {
            source.balance = Number(source.balance) + Number(tx.amount);
            await DB.put('wallets', source);
          }
          wallet.balance = Number(wallet.balance) - Number(tx.amount);
          const allTx = await DB.getAll('transactions');
          const pair = allTx.find(t => t.type === 'transfer_out' && t.destWalletId === tx.walletId && t.amount === tx.amount && t.date === tx.date);
          if (pair) {
            await DB.remove('transactions', pair.id);
          }
        }
        await DB.put('wallets', wallet);
      }

      // حذف العملية نفسها
      await DB.remove('transactions', txId);

      if (window.Sounds) Sounds.deleteSound();
      UI.toastSuccess('تم حذف العملية بنجاح');
      await refreshStats();
      await renderChart();
      await renderTopExpenses();
      await renderRecentTransactions();
    } catch (err) {
      console.error('Delete error:', err);
      UI.toastError('حدث خطأ أثناء الحذف');
    }
  }

  // ============ نافذة إضافة/تعديل عملية ============
  // type: 'income' | 'expense' | 'transfer'
  // existing: (اختياري) كائن العملية المراد تعديلها
  function showTransactionModal(type = 'expense', existing = null) {
    const isEdit = !!existing;
    const body = document.createElement('div');

    // قيم مبدئية في حالة التعديل
    const initialAmount = isEdit ? existing.amount : '';
    const initialDate = isEdit ? (existing.date || '').slice(0, 10) : Utils.todayISO();
    const initialNote = isEdit ? (existing.note || '') : '';
    const initialCategory = isEdit ? (existing.category || 'other') : 'other';
    const initialWalletId = isEdit ? existing.walletId : '';

    body.innerHTML = `
      <div class="segmented" style="margin-bottom:16px">
        <button class="segmented__btn ${type === 'income' ? 'active' : ''}" data-type="income" ${isEdit ? 'disabled' : ''}>دخل</button>
        <button class="segmented__btn ${type === 'expense' ? 'active' : ''}" data-type="expense" ${isEdit ? 'disabled' : ''}>مصروف</button>
        <button class="segmented__btn ${type === 'transfer' ? 'active' : ''}" data-type="transfer" ${isEdit ? 'disabled' : ''}>تحويل</button>
      </div>

      <div class="form-group">
        <label class="form-label">المبلغ <span class="required">*</span></label>
        <input class="form-input" type="number" step="0.01" id="tx-amount" placeholder="0.00" value="${initialAmount}" />
      </div>

      <div class="form-group" id="category-group" style="display:${type === 'transfer' ? 'none' : 'block'}">
        <label class="form-label">الفئة</label>
        <select class="form-select" id="tx-category">
          ${Object.entries(State.CATEGORIES).map(([k, v]) => `<option value="${k}" ${k === initialCategory ? 'selected' : ''}>${v.label}</option>`).join('')}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">المحفظة <span class="required">*</span></label>
        <select class="form-select" id="tx-wallet" required>
          <option value="">اختر محفظة...</option>
        </select>
      </div>

      <div class="form-group" id="dest-wallet-group" style="display:${type === 'transfer' ? 'block' : 'none'}">
        <label class="form-label">إلى محفظة <span class="required">*</span></label>
        <select class="form-select" id="tx-dest-wallet">
          <option value="">اختر محفظة...</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">التاريخ</label>
        <input class="form-input" type="date" id="tx-date" value="${initialDate}" />
      </div>

      <div class="form-group">
        <label class="form-label">ملاحظات</label>
        <textarea class="form-textarea" id="tx-note" placeholder="ملاحظات اختيارية">${initialNote}</textarea>
      </div>
    `;

    let currentType = type;

    const saveTxBtn = Utils.el('button', { class: 'btn btn--primary btn--block', id: 'save-tx-btn' }, isEdit ? 'حفظ التعديلات' : 'حفظ');

    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', { class: 'btn btn--outline btn--block', onclick: () => close() }, 'إلغاء'),
      saveTxBtn
    ]);

    if (window.Sounds) Sounds.whoosh();

    const close = UI.modal({
      title: isEdit ? 'تعديل العملية' : 'إضافة عملية',
      body,
      footer
    });

    // تحميل المحافظ
    DB.getAll('wallets').then(wallets => {
      const active = wallets.filter(w => !w.archived);
      const walletSelect = body.querySelector('#tx-wallet');
      const destSelect = body.querySelector('#tx-dest-wallet');
      active.forEach(w => {
        const sel = w.id === initialWalletId ? 'selected' : '';
        walletSelect.innerHTML += `<option value="${w.id}" ${sel}>${Utils.escapeHTML(w.name)} (${Utils.formatMoney(w.balance, w.currency)})</option>`;
        destSelect.innerHTML += `<option value="${w.id}">${Utils.escapeHTML(w.name)}</option>`;
      });
      // في حالة التعديل لتحويل، نحدد المحفظة الوجهة
      if (isEdit && existing.destWalletId) {
        destSelect.value = existing.destWalletId;
      }
    });

    // تبديل النوع (متاح فقط في الإضافة، معطّل في التعديل)
    body.querySelectorAll('.segmented__btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (isEdit) return; // لا يمكن تغيير النوع أثناء التعديل
        body.querySelectorAll('.segmented__btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentType = btn.dataset.type;
        body.querySelector('#category-group').style.display = currentType === 'transfer' ? 'none' : 'block';
        body.querySelector('#dest-wallet-group').style.display = currentType === 'transfer' ? 'block' : 'none';
      });
    });

    // حفظ
    saveTxBtn.addEventListener('click', async () => {
      const amount = parseFloat(body.querySelector('#tx-amount').value);
      const walletId = body.querySelector('#tx-wallet').value;
      const date = body.querySelector('#tx-date').value;
      const note = body.querySelector('#tx-note').value.trim();

      if (!amount || amount <= 0) {
        UI.toastError('أدخل مبلغاً صحيحاً');
        if (window.Sounds) Sounds.error();
        return;
      }
      if (!walletId) {
        UI.toastError('اختر محفظة');
        if (window.Sounds) Sounds.error();
        return;
      }

      const wallet = await DB.get('wallets', walletId);

      if (isEdit) {
        // ============ وضع التعديل ============
        // 1) عكس العملية القديمة على المحفظة
        await reverseTransactionEffect(existing);

        // 2) تطبيق العملية الجديدة
        if (currentType === 'transfer') {
          // للتعديل نستخدم نفس البيانات (لا يمكن تغيير نوع التحويل)
          const destId = existing.destWalletId;
          if (!destId) { UI.toastError('بيانات التحويل غير مكتملة'); return; }
          const dest = await DB.get('wallets', destId);
          existing.amount = amount;
          existing.note = note || `تحويل إلى ${dest.name}`;
          existing.date = date + 'T' + new Date().toTimeString().slice(0, 8);
          await DB.put('transactions', existing);
          // تحديث المقابل
          const allTx = await DB.getAll('transactions');
          const pair = allTx.find(t => t.type === 'transfer_in' && t.sourceWalletId === walletId && t.date === existing.date);
          if (pair) {
            pair.amount = amount;
            pair.note = note || `تحويل من ${wallet.name}`;
            await DB.put('transactions', pair);
          }
          wallet.balance = Number(wallet.balance) - amount;
          dest.balance = Number(dest.balance) + amount;
          await DB.put('wallets', wallet);
          await DB.put('wallets', dest);
        } else {
          existing.amount = amount;
          existing.walletId = walletId;
          existing.category = body.querySelector('#tx-category').value;
          existing.note = note;
          existing.date = date + 'T' + new Date().toTimeString().slice(0, 8);
          existing.currency = wallet.currency;
          await DB.put('transactions', existing);
          if (currentType === 'income') {
            wallet.balance = Number(wallet.balance) + amount;
          } else {
            wallet.balance = Number(wallet.balance) - amount;
          }
          await DB.put('wallets', wallet);
        }

        if (window.Sounds) Sounds.success();
        UI.toastSuccess('تم تعديل العملية بنجاح');
      } else {
        // ============ وضع الإضافة (الأصلي) ============
        if (currentType === 'transfer') {
          const destId = body.querySelector('#tx-dest-wallet').value;
          if (!destId) { UI.toastError('اختر المحفظة المستلمة'); return; }
          const dest = await DB.get('wallets', destId);

          await DB.add('transactions', {
            type: 'transfer_out', amount, walletId: walletId,
            destWalletId: destId, date: date + 'T' + new Date().toTimeString().slice(0, 8),
            note: note || `تحويل إلى ${dest.name}`, currency: wallet.currency
          });
          await DB.add('transactions', {
            type: 'transfer_in', amount, walletId: destId,
            sourceWalletId: walletId, date: date + 'T' + new Date().toTimeString().slice(0, 8),
            note: note || `تحويل من ${wallet.name}`, currency: dest.currency
          });
          wallet.balance = Number(wallet.balance) - amount;
          dest.balance = Number(dest.balance) + amount;
          await DB.put('wallets', wallet);
          await DB.put('wallets', dest);
        } else {
          const category = body.querySelector('#tx-category').value;
          await DB.add('transactions', {
            type: currentType, amount, walletId, category,
            date: date + 'T' + new Date().toTimeString().slice(0, 8),
            note, currency: wallet.currency
          });
          if (currentType === 'income') {
            wallet.balance = Number(wallet.balance) + amount;
          } else {
            wallet.balance = Number(wallet.balance) - amount;
          }
          await DB.put('wallets', wallet);
        }

        if (window.Sounds) Sounds.success();
        UI.toastSuccess('تم حفظ العملية بنجاح');
      }

      close();
      await refreshStats();
      await renderChart();
      await renderTopExpenses();
      await renderRecentTransactions();
    });
  }

  // عكس تأثير عملية على المحفظة (يُستخدم عند التعديل/الحذف)
  async function reverseTransactionEffect(tx) {
    if (!tx) return;
    const wallet = await DB.get('wallets', tx.walletId);
    if (!wallet) return;

    if (tx.type === 'income') {
      wallet.balance = Number(wallet.balance) - Number(tx.amount);
      await DB.put('wallets', wallet);
    } else if (tx.type === 'expense') {
      wallet.balance = Number(wallet.balance) + Number(tx.amount);
      await DB.put('wallets', wallet);
    } else if (tx.type === 'transfer_out' && tx.destWalletId) {
      wallet.balance = Number(wallet.balance) + Number(tx.amount);
      await DB.put('wallets', wallet);
      const dest = await DB.get('wallets', tx.destWalletId);
      if (dest) {
        dest.balance = Number(dest.balance) - Number(tx.amount);
        await DB.put('wallets', dest);
      }
    } else if (tx.type === 'transfer_in' && tx.sourceWalletId) {
      wallet.balance = Number(wallet.balance) - Number(tx.amount);
      await DB.put('wallets', wallet);
      const source = await DB.get('wallets', tx.sourceWalletId);
      if (source) {
        source.balance = Number(source.balance) + Number(tx.amount);
        await DB.put('wallets', source);
      }
    }
  }

                    <div style="font-weight:700;color:var(--color-danger)">${Utils.formatMoney(Number(d.remainingAmount || d.amount || 0), currency)}</div>
                    <div style="font-size:10px;color:${d.type === 'owed_to_me' ? 'var(--color-success)' : 'var(--color-danger)'}">

        <div class="section-header"><h3 class="section-header__title">التوزيع: لك vs عليك</h3></div>
        <div style="padding:0 16px">
          <canvas class="chart-canvas" id="debts-pie-chart" style="height:220px"></canvas>
        </div>
      `;

      setTimeout(() => {
        const pieCanvas = document.getElementById('debts-pie-chart');
        if (pieCanvas) {
          Charts.pieChart(pieCanvas, [
            { value: totalOwedToMe,   color: '#16a34a', label: 'ديون لك' },
            { value: totalOwedToThem, color: '#dc2626', label: 'ديون عليك' }
          ], { centerLabel: 'الإجمالي', centerValue: Utils.formatMoney(totalOwedToMe + totalOwedToThem, currency) });
        }
      }, 50);

    } else if (tabId === 'properties') {
      // ===== تحليلات الممتلكات =====
      const properties = await DB.getAll('properties');
      const currency = State.get('currentCurrency');
      const byType = {};
      properties.forEach(p => {
        const t = p.type || 'other';
        if (!byType[t]) byType[t] = { count: 0, value: 0, weight: 0 };
        byType[t].count++;
        byType[t].value += Number(p.purchasePrice || 0);
        byType[t].weight += Number(p.weight || 0);
      });
      const totalValue = properties.reduce((s, p) => s + Number(p.purchasePrice || 0), 0);
      const totalGold = properties.filter(p => p.type === 'gold').reduce((s, p) => s + Number(p.weight || 0), 0);
      const totalSilver = properties.filter(p => p.type === 'silver').reduce((s, p) => s + Number(p.weight || 0), 0);

      container.innerHTML = `
        <div class="section-header"><h3 class="section-header__title">ملخص الممتلكات</h3></div>
        <div class="analytics-grid">
          <div class="analytics-item">
            <div class="analytics-item__label">إجمالي القيمة</div>
            <div class="analytics-item__value">${Utils.formatMoney(totalValue, currency)}</div>
          </div>
          <div class="analytics-item">
            <div class="analytics-item__label">عدد الممتلكات</div>
            <div class="analytics-item__value">${properties.length}</div>
          </div>
          <div class="analytics-item">
            <div class="analytics-item__label">ذهب (جرام)</div>
            <div class="analytics-item__value">🥇 ${totalGold}</div>
          </div>
          <div class="analytics-item">
            <div class="analytics-item__label">فضة (جرام)</div>
            <div class="analytics-item__value">🥈 ${totalSilver}</div>
          </div>
        </div>

        ${Object.keys(byType).length > 0 ? `
          <div class="section-header"><h3 class="section-header__title">التوزيع حسب النوع</h3></div>
          <div style="padding:0 16px">
            <div class="card">
              ${Object.entries(byType).map(([type, data]) => {
                const labels = { gold:'ذهب', silver:'فضة', real_estate:'عقارات', car:'سيارة', land:'أراضي', other:'أخرى' };
                const colors = { gold:'#d97706', silver:'#94a3b8', real_estate:'#0d9488', car:'#2563eb', land:'#16a34a', other:'#64748b' };
                const pct = totalValue > 0 ? (data.value / totalValue * 100) : 0;
                return `
                  <div style="margin-bottom:12px">
                    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                      <span><span class="dot" style="background:${colors[type] || '#64748b'}"></span> ${labels[type] || type} (${data.count})</span>
                      <span style="font-weight:700">${Utils.formatMoney(data.value, currency)}</span>
                    </div>
                    <div class="progress"><div class="progress__bar" style="width:${pct}%;background:${colors[type] || '#64748b'}"></div></div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>

          <div class="section-header"><h3 class="section-header__title">الرسم البياني</h3></div>
          <div style="padding:0 16px">
            <canvas class="chart-canvas" id="prop-pie-chart" style="height:240px"></canvas>
          </div>
        ` : `
          <div class="empty-state" style="padding:24px">
            <div class="empty-state__icon">${UI.ICONS.property}</div>
            <div class="empty-state__title">لا توجد ممتلكات مسجّلة</div>
          </div>
        `}
      `;

      setTimeout(() => {
        const pieCanvas = document.getElementById('prop-pie-chart');
        if (pieCanvas) {
          const labels = { gold:'ذهب', silver:'فضة', real_estate:'عقارات', car:'سيارة', land:'أراضي', other:'أخرى' };
          const colors = { gold:'#d97706', silver:'#94a3b8', real_estate:'#0d9488', car:'#2563eb', land:'#16a34a', other:'#64748b' };
          const pieData = Object.entries(byType).map(([type, data]) => ({
            value: data.value, color: colors[type] || '#64748b', label: labels[type] || type
          }));
          Charts.pieChart(pieCanvas, pieData, { centerLabel: 'الإجمالي', centerValue: Utils.formatMoney(totalValue, currency) });
        }
      }, 50);

    } else if (tabId === 'subscriptions') {
      // ===== تحليلات الاشتراكات =====
      const subs = await DB.getAll('subscriptions');
      const currency = State.get('currentCurrency');
      const byFreq = {};
      subs.forEach(s => {
        const f = s.frequency || 'monthly';
        if (!byFreq[f]) byFreq[f] = { count: 0, total: 0 };
        byFreq[f].count++;
        byFreq[f].total += Number(s.amount || 0);
      });
      const FREQ_LABELS = { daily:'يومي', weekly:'أسبوعي', monthly:'شهري', quarterly:'ربع سنوي', yearly:'سنوي' };

      // حساب إجمالي الاشتراكات الشهري
      const monthlyEquiv = subs.reduce((sum, s) => {
        const amt = Number(s.amount || 0);
        switch (s.frequency) {
          case 'daily':     return sum + amt * 30;
          case 'weekly':    return sum + amt * 4.33;
          case 'monthly':   return sum + amt;
          case 'quarterly': return sum + amt / 3;
          case 'yearly':    return sum + amt / 12;
          default:          return sum;
        }
      }, 0);
      const yearlyEquiv = monthlyEquiv * 12;

      // المستحقة قريباً
      const upcoming = subs.filter(s => {
        if (!s.nextDueDate) return false;
        const due = new Date(s.nextDueDate);
        const now = new Date();
        const in7days = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
        return due >= now && due <= in7days;
      });

      container.innerHTML = `
        <div class="section-header"><h3 class="section-header__title">ملخص الاشتراكات</h3></div>
        <div class="analytics-grid">
          <div class="analytics-item">
            <div class="analytics-item__label">عدد الاشتراكات</div>
            <div class="analytics-item__value">${subs.length}</div>
          </div>
          <div class="analytics-item">
            <div class="analytics-item__label">التكلفة الشهرية</div>
            <div class="analytics-item__value text-danger">${Utils.formatMoney(monthlyEquiv, currency)}</div>
          </div>
          <div class="analytics-item">
            <div class="analytics-item__label">التكلفة السنوية</div>
            <div class="analytics-item__value text-danger">${Utils.formatMoney(yearlyEquiv, currency)}</div>
          </div>
          <div class="analytics-item">
            <div class="analytics-item__label">مستحقة خلال 7 أيام</div>
            <div class="analytics-item__value ${upcoming.length > 0 ? 'text-danger' : ''}">${upcoming.length}</div>
          </div>
        </div>

        ${Object.keys(byFreq).length > 0 ? `
          <div class="section-header"><h3 class="section-header__title">التوزيع حسب الدورية</h3></div>
          <div style="padding:0 16px">
            <div class="card">
              ${Object.entries(byFreq).map(([freq, data]) => `
                <div class="summary-row">
                  <span>${FREQ_LABELS[freq] || freq} (${data.count})</span>
                  <span style="font-weight:700">${Utils.formatMoney(data.total, currency)}</span>
                </div>
              `).join('')}
            </div>
          </div>
        ` : ''}

        ${upcoming.length > 0 ? `
          <div class="section-header"><h3 class="section-header__title">⏰ مستحقة قريباً</h3></div>
          <div style="padding:0 16px">
            <div class="card">
              ${upcoming.map(s => `
                <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--color-divider)">
                  <div>
                    <div style="font-weight:600">${Utils.escapeHTML(s.name)}</div>
                    <div style="font-size:11px;color:var(--color-text-tertiary)">${Utils.formatDateShort(s.nextDueDate)}</div>
                  </div>
                  <div style="font-weight:700;color:var(--color-danger)">${Utils.formatMoney(s.amount, currency)}</div>
                </div>
              `).join('')}
            </div>
          </div>
        ` : ''}
      `;

    } else if (tabId === 'wallets') {
      // ===== تحليلات المحافظ =====
      const wallets = (await DB.getAll('wallets')).filter(w => !w.archived);
      const currency = State.get('currentCurrency');
      const byCurrency = {};
      wallets.forEach(w => {
        const c = w.currency || currency;
        if (!byCurrency[c]) byCurrency[c] = { count: 0, total: 0 };
        byCurrency[c].count++;
        byCurrency[c].total += Number(w.balance || 0);
      });
      const totalBalance = wallets.reduce((s, w) => s + Number(w.balance || 0), 0);
      const topWallets = [...wallets].sort((a, b) => Number(b.balance || 0) - Number(a.balance || 0)).slice(0, 5);

      container.innerHTML = `
        <div class="section-header"><h3 class="section-header__title">ملخص المحافظ</h3></div>
        <div class="analytics-grid">
          <div class="analytics-item">
            <div class="analytics-item__label">إجمالي الرصيد</div>
            <div class="analytics-item__value text-success">${Utils.formatMoney(totalBalance, currency)}</div>
          </div>
          <div class="analytics-item">
            <div class="analytics-item__label">عدد المحافظ</div>
            <div class="analytics-item__value">${wallets.length}</div>
          </div>
        </div>

        ${topWallets.length > 0 ? `
          <div class="section-header"><h3 class="section-header__title">أعلى المحافظ رصيداً</h3></div>
          <div style="padding:0 16px">
            <div class="card">
              ${topWallets.map(w => {
                const pct = totalBalance > 0 ? (Number(w.balance || 0) / totalBalance * 100) : 0;
                return `
                  <div style="margin-bottom:12px">
                    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                      <span style="font-weight:600">${Utils.escapeHTML(w.name)}</span>
                      <span style="font-weight:700">${Utils.formatMoney(w.balance, w.currency || currency)}</span>
                    </div>
                    <div class="progress"><div class="progress__bar" style="width:${pct}%;background:#0d9488"></div></div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>

          <div class="section-header"><h3 class="section-header__title">التوزيع حسب العملة</h3></div>
          <div style="padding:0 16px">
            <canvas class="chart-canvas" id="wallets-pie-chart" style="height:220px"></canvas>
          </div>
        ` : `
          <div class="empty-state" style="padding:24px">
            <div class="empty-state__icon">${UI.ICONS.wallet}</div>
            <div class="empty-state__title">لا توجد محافظ</div>
          </div>
        `}
      `;

      setTimeout(() => {
        const pieCanvas = document.getElementById('wallets-pie-chart');
        if (pieCanvas) {
          const palette = ['#0d9488', '#2563eb', '#d97706', '#7c3aed', '#dc2626', '#16a34a'];
          const pieData = Object.entries(byCurrency).map(([cur, data], i) => ({
            value: data.total, color: palette[i % palette.length], label: `${cur} (${data.count})`
          }));
          Charts.pieChart(pieCanvas, pieData, {
            centerLabel: 'الإجمالي',
            centerValue: Utils.formatMoney(totalBalance, currency)
          });
        }
      }, 50);

    } else {
      // باقي الأقسام: قائمة مرجعية
      const sectionMap = {
        budgets:       { route: '#/more/budgets',            label: 'الميزانيات والأهداف' },
        installments:  { route: '#/commitments/installments', label: 'الأقساط' },
        socialJournal: { route: '#/more/social-journal',     label: 'دفتر المجاملات' },
        jamaeya:       { route: '#/more/jamaeya',            label: 'جمعيتي' },
        guarantees:    { route: '#/more/guarantees',         label: 'الضمانات' },
        zakat:         { route: '#/more/zakat',              label: 'حساب الزكاة' },
        tasks:         { route: '#/commitments/tasks',       label: 'المهام والمناسبات' }
      };
      const section = sectionMap[tabId] || { route: '#/dashboard', label: tabId };
      container.innerHTML = `
        <div class="empty-state" style="padding:32px">
          <div class="empty-state__icon">${UI.ICONS.chart}</div>
          <div class="empty-state__title">${section.label}</div>
          <div class="empty-state__text">لعرض التحليلات التفصيلية الكاملة، انتقل إلى القسم الرئيسي حيث تجد كل البيانات والإحصائيات الحيّة.</div>
          <button class="btn btn--primary empty-action" onclick="window.location.hash='${section.route}'">الانتقال إلى ${section.label} ←</button>
        </div>
      `;
    }
  }

  function showCustomPeriodPicker() {
    const body = Utils.el('div');
    body.innerHTML = `
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">من تاريخ</label>
          <input class="form-input" type="date" id="custom-start" value="${Utils.todayISO()}" />
        </div>
        <div class="form-group">
          <label class="form-label">إلى تاريخ</label>
          <input class="form-input" type="date" id="custom-end" value="${Utils.todayISO()}" />
        </div>
      </div>
    `;

    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', { class: 'btn btn--outline btn--block', onclick: () => close() }, 'إلغاء'),
      Utils.el('button', {
        class: 'btn btn--primary btn--block',
        onclick: async () => {
          const start = body.querySelector('#custom-start').value;
          const end = body.querySelector('#custom-end').value;
          if (!start || !end) { UI.toastError('اختر التواريخ'); return; }
          // للتبسيط نستخدم this_month كقاعدة
          currentPeriod = 'this_month';
          close();
          await refreshStats();
        }
      }, 'تطبيق')
    ]);

    const close = UI.modal({ title: 'فترة مخصصة', body, footer });
  }

  return {
    render,
    showTransactionModal,
    editTransaction,
    deleteTransaction,
    renderRecentTransactions
  };
})();

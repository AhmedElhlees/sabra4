      row.addEventListener('click', () => {
        const action = row.dataset.action;
        if (action === 'add-transaction') window.location.hash = '#/dashboard';
        else if (action === 'review-debts') window.location.hash = '#/commitments/debts';
        else if (action === 'set-budget') window.location.hash = '#/more/budgets';
        else if (action === 'calculate-zakat') window.location.hash = '#/more/zakat';
      });
    });

    // محادثة بسيطة
    const chatInput = container.querySelector('#chat-input');
    const chatMessages = container.querySelector('#chat-messages');
    const sendBtn = container.querySelector('#chat-send');

    async function sendMessage() {
      const q = chatInput.value.trim();
      if (!q) return;

      chatMessages.innerHTML += `<div style="background:var(--color-primary);color:#fff;padding:8px 12px;border-radius:12px;margin-bottom:8px;align-self:flex-start;margin-right:auto;display:inline-block;max-width:80%">${Utils.escapeHTML(q)}</div>`;
      chatInput.value = '';

      // رد ذكي بسيط
      const answer = await getAnswer(q);
      chatMessages.innerHTML += `<div style="background:var(--color-bg-alt);padding:8px 12px;border-radius:12px;margin-bottom:8px;margin-left:auto;display:inline-block;max-width:80%">${Utils.escapeHTML(answer)}</div>`;
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  }

  async function getAnswer(q) {
    const stats = await State.getStats('this_month');
    const ql = q.toLowerCase();

    if (ql.includes('رصيد') || ql.includes('balance')) {
      return `رصيدك الحالي ${Utils.formatMoney(stats.totalBalance, State.get('currentCurrency'))} موزع على ${stats.walletsCount} محافظ.`;
    }
    if (ql.includes('دخل') || ql.includes('income')) {
      return `دخل ${stats.periodLabel}: ${Utils.formatMoney(stats.income, State.get('currentCurrency'))}.`;
    }
    if (ql.includes('مصروف') || ql.includes('expense')) {
      return `مصروفات ${stats.periodLabel}: ${Utils.formatMoney(stats.expenses, State.get('currentCurrency'))} بنسبة ${stats.expenseRate}% من الدخل.`;
    }
    if (ql.includes('دين') || ql.includes('debt')) {
      return `ديون لك: ${Utils.formatMoney(stats.debtsOwedToMe, State.get('currentCurrency'))} • ديون عليك: ${Utils.formatMoney(stats.debtsOwedToThem, State.get('currentCurrency'))}.`;
    }
    if (ql.includes('ادخار') || ql.includes('saving')) {
      return `معدل ادخارك هذا الشهر ${stats.savingsRate}%.`;
    }
    if (ql.includes('ممتلك') || ql.includes('property')) {
      return `قيمة ممتلكاتك ${Utils.formatMoney(stats.propertiesValue, State.get('currentCurrency'))} (ذهب: ${stats.goldWeight}غ، فضة: ${stats.silverWeight}غ).`;
    }
    if (ql.includes('زكات') || ql.includes('zakat')) {
      return `لحساب الزكاة، انتقل إلى قسم "حساب الزكاة" من قائمة المزيد.`;
    }
    if (ql.includes('مرحبا') || ql.includes('السلام') || ql.includes('hello')) {
      return `أهلاً بك! كيف أساعدك في أموالك اليوم؟`;
    }

    return `لم أفهم سؤالك تماماً. جرب أن تسأل عن: الرصيد، الدخل، المصروفات، الديون، الادخار، الممتلكات، أو الزكاة.`;
  }

  return { render };
})();


/* ===== js/app.js ===== */
/* =========================================================
   APP.JS - الموجّه الرئيسي وإدارة التطبيق
   =========================================================

   تحسينات:
   - دعم صفحة الإعداد الأولي (#/onboarding)
   - قفل تلقائي بعد فترة خمول (افتراضي 2 دقيقة)
   - إصلاح خلل تراكم الاشتراكات (while loop + ملخص + تأكيد)
   - تذكيرات حقيقية عبر service worker (showNotification)
   - طلب إذن الإشعارات عند أول دخول
   ========================================================= */

(function () {
  'use strict';

  // تعريف المسارات والصفحات المقابلة
  const routes = {
    '/login': { page: 'LoginPage', hideNav: true },
    '/onboarding': { page: 'OnboardingPage', hideNav: true },
    '/dashboard': { page: 'DashboardPage' },
    '/wallets': { page: 'WalletsPage' },
    '/wallets/:id': { page: 'WalletsPage' },
    '/commitments': { page: 'CommitmentsPage' },
    '/commitments/debts': { page: 'DebtsPage' },
    '/commitments/installments': { page: 'DebtsPage' },
    '/commitments/investments': { page: 'InvestmentsPage' },
    '/commitments/subscriptions': { page: 'SubscriptionsPage' },
    '/commitments/tasks': { page: 'TasksPage' },
    '/commitments/occasions': { page: 'OccasionsPage' },
    '/commitments/medicines': { page: 'MedicinesPage' },
    '/properties': { page: 'PropertiesPage' },
    '/more': { page: 'MorePage' },
    '/more/budgets': { page: 'BudgetsPage' },
    '/more/social-journal': { page: 'SocialJournalPage' },
    '/more/jamaeya': { page: 'JamaeyaPage' },
    '/more/guarantees': { page: 'GuaranteesPage' },
    '/more/zakat': { page: 'ZakatPage' },
    '/more/notes': { page: 'NotesPage' },
    '/more/assistant': { page: 'AssistantPage' }
  };

  // ============ القفل التلقائي ============
  let _autoLockTimer = null;
  let _lastActivity = Date.now();
  const ACTIVITY_EVENTS = ['mousedown', 'touchstart', 'keydown', 'scroll', 'click'];

  async function getAutoLockMinutes() {
    try {
      const user = await Auth.getCurrentUser();
      if (user && user.autoLockMinutes != null) return user.autoLockMinutes;
    } catch {}
    return 2; // افتراضي
  }

  function setupAutoLock() {
    // إعادة ضبط المؤقت عند كل نشاط
    ACTIVITY_EVENTS.forEach(evt => {
      document.addEventListener(evt, () => { _lastActivity = Date.now(); }, { passive: true });
    });

    // فحص كل 15 ثانية
    if (_autoLockTimer) clearInterval(_autoLockTimer);
    _autoLockTimer = setInterval(async () => {
      if (!Auth.isLoggedIn()) return;
      if (Auth.isLocked()) return;
      const minutes = await getAutoLockMinutes();
      if (minutes <= 0) return; // 0 = معطّل
      const idleMs = Date.now() - _lastActivity;
      if (idleMs >= minutes * 60 * 1000) {
        console.log('[AutoLock] Locking after', minutes, 'minutes idle');
        Auth.lock();
      }
    }, 15000);

    // إعادة الضبط عند العودة للتطبيق (visibilitychange)
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        _lastActivity = Date.now();
      } else {
        // عند الإخفاء، نسجّل وقت المغادرة لإعادة الحساب عند العودة
        _lastActivity = Date.now();
      }
    });
  }

  // مطابقة المسار
  function matchRoute(hash) {
    const path = hash.replace(/^#/, '') || '/dashboard';
    if (routes[path]) return { ...routes[path], params: {} };

    for (const [pattern, config] of Object.entries(routes)) {
      if (pattern.includes(':')) {
        const patternParts = pattern.split('/');
        const pathParts = path.split('/');
        if (patternParts.length === pathParts.length) {
          const params = {};
          let match = true;
          for (let i = 0; i < patternParts.length; i++) {
            if (patternParts[i].startsWith(':')) {
              params[patternParts[i].slice(1)] = pathParts[i];
            } else if (patternParts[i] !== pathParts[i]) {
              match = false;
              break;
            }
          }
          if (match) return { ...config, params };
        }
      }
    }

    return null;
  }

  // الانتقال للصفحة
  async function navigate() {
    const hash = window.location.hash || '#/dashboard';
    const route = matchRoute(hash);

    if (!route) {
      window.location.hash = '#/dashboard';
      return;
    }

    // صفحتا الدخول والإعداد الأولي لا تتطلبان مصادقة
    if (route.page !== 'LoginPage' && route.page !== 'OnboardingPage') {
      const ok = await Auth.requireAuth();
      if (!ok) return;
    }

    const page = window[route.page];
    if (page && typeof page.render === 'function') {
      try {
        await page.render();
        updateBottomNav(hash);
      } catch (e) {
        console.error(`Error rendering ${route.page}:`, e);
        document.getElementById('app-root').innerHTML = `
          <div class="empty-state">
            <div class="empty-state__icon">${UI.ICONS.warning}</div>
            <div class="empty-state__title">حدث خطأ</div>
            <div class="empty-state__text">حدث خطأ أثناء تحميل الصفحة. حاول مرة أخرى.</div>
            <button class="btn btn--primary empty-action" onclick="location.reload()">إعادة التحميل</button>
          </div>
        `;
      }
    } else {
      console.error(`Page ${route.page} not found`);
      window.location.hash = '#/dashboard';
    }
  }

  function updateBottomNav(hash) {
    const nav = document.getElementById('bottom-nav');
    if (!nav) return;

    const items = nav.querySelectorAll('.bottom-nav__item');
    items.forEach(item => {
      const route = item.dataset.route;
      let active = false;

      if (hash === '#/dashboard' && route === 'dashboard') active = true;
      else if (hash.startsWith('#/wallets') && route === 'wallets') active = true;
      else if (hash.startsWith('#/commitments') && route === 'commitments') active = true;
      else if (hash.startsWith('#/more') && route === 'more') active = true;

      item.classList.toggle('active', active);
    });
  }

  async function handleFabAdd() {
    if (window.Sounds) Sounds.whoosh();
    const action = await UI.showAddMenu();
    if (!action) return;
    if (window.Sounds) Sounds.tap();

    switch (action) {
      case 'transaction':
        DashboardPage.showTransactionModal('expense');
        break;
      case 'wallet':
        WalletsPage.render().then(() => {
          setTimeout(() => {
            const event = new CustomEvent('show-wallet-form');
            window.dispatchEvent(event);
          }, 500);
        });
        break;
      case 'debt':
        window.location.hash = '#/commitments/debts';
        break;
      case 'subscription':
        window.location.hash = '#/commitments/subscriptions';
        break;
      case 'task':
        window.location.hash = '#/commitments/tasks';
        break;
      case 'occasion':
        window.location.hash = '#/commitments/occasions';
        break;
      case 'medicine':
        window.location.hash = '#/commitments/medicines';
        break;
      case 'property':
        window.location.hash = '#/properties';
        break;
    }
  }

  function hideSplash() {
    const splash = document.getElementById('splash');
    if (splash) {
      splash.style.opacity = '0';
      splash.style.transition = 'opacity 300ms';
      setTimeout(() => { if (splash.parentNode) splash.remove(); }, 300);
    }
  }

  async function init() {
    const failsafe = setTimeout(() => {
      console.warn('[Init] Failsafe timeout - hiding splash anyway');
      hideSplash();
      if (!window.location.hash || window.location.hash === '#') {
        window.location.hash = '#/login';
      }
    }, 6000);

    try {
      try {
        await DB.open();
      } catch (dbErr) {
        console.warn('[Init] DB.open threw (non-fatal):', dbErr);
      }

      try {
        await Auth.ensureDefaultUser();
      } catch (e) {
        console.warn('[Init] ensureDefaultUser failed (non-fatal):', e);
      }

      try {
        await State.init();
      } catch (e) {
        console.warn('[Init] State.init failed (non-fatal):', e);
      }

      // تسجيل Service Worker للعمل بدون إنترنت + الإشعارات (فقط من http/https)
      if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
        try {
          const reg = await navigator.serviceWorker.register('sw.js');
          console.log('Service Worker registered:', reg.scope);
        } catch (e) {
          console.warn('Service Worker registration failed:', e);
        }
      } else if ('serviceWorker' in navigator) {
        console.log('[Ibn-alSabrah] يعمل من ملف محلي - Service Worker معطّل (طبيعي).');
      }

      // إعداد القفل التلقائي
      setupAutoLock();

      // مستمعو الأحداث
      window.addEventListener('hashchange', navigate);

      const fab = document.getElementById('fab-add');
      if (fab) fab.addEventListener('click', handleFabAdd);

      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
          e.preventDefault();
          UI.globalSearch();
        }
      });

      // التنقل الأولي
      if (!window.location.hash || window.location.hash === '#') {
        // تحقق من onboarding أولاً
        const onboarded = await Auth.isOnboarded();
        if (!onboarded) {
          window.location.hash = '#/onboarding';
        } else if (Auth.isLoggedIn() && !Auth.isLocked()) {
          window.location.hash = '#/dashboard';
        } else {
          window.location.hash = '#/login';
        }
      } else {
        await navigate();
      }

      hideSplash();
      clearTimeout(failsafe);

      // طلب إذن الإشعارات (بعد فترة قصيرة من الاستخدام)
      if ('Notification' in window && Notification.permission === 'default') {
        setTimeout(async () => {
          try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
              console.log('[Notifications] Permission granted');
            }
          } catch (e) {
            console.warn('[Notifications] Permission request failed:', e);
          }
        }, 4000);
      }
    } catch (err) {
      console.error('[Init] error:', err);
      hideSplash();
      clearTimeout(failsafe);
      if (!window.location.hash || window.location.hash === '#') {
        window.location.hash = '#/login';
      }
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // ============ إظهار إشعار عبر service worker أو fallback ============
  async function showNotification(title, body, options = {}) {
    const opts = {
      body,
      dir: 'rtl',
      lang: 'ar',
      vibrate: [100, 50, 100],
      tag: options.tag || `malia-${Date.now()}`,
      ...options
    };

    // إذا كان SW مسجّلاً، استخدم showNotification عبره
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      try {
        const reg = await navigator.serviceWorker.ready;
        await reg.showNotification(title, opts);
        return;
      } catch (e) {
        console.warn('[Notify] SW showNotification failed, trying direct:', e);
      }
    }

    // Fallback: Notification مباشرة
    if ('Notification' in window && Notification.permission === 'granted') {
      try {
        new Notification(title, opts);
      } catch (e) {
        console.warn('[Notify] Direct notification failed:', e);
      }
    }
  }

  // ============ جدولة التذكيرات والعمليات التلقائية ============
  async function runScheduledTasks() {
    try {
      const now = new Date();

      // 1. الاشتراكات المستحقة - معالجة آمنة لتراكم الدفعات
      const subs = await DB.getAll('subscriptions');
      for (const sub of subs) {
        if (!sub.autoCreate) continue;
        if (!sub.nextDueDate) continue;

        // اكتشف كل الدفعات المتراكمة (حلقة while مع سقف أمان 24 دورة)
        const dueDates = [];
        let cursor = new Date(sub.nextDueDate);
        let safety = 0;
        while (cursor <= now && safety < 24) {
          dueDates.push(new Date(cursor));
          // إضافة دورة
          switch (sub.frequency) {
            case 'daily': cursor.setDate(cursor.getDate() + 1); break;
            case 'weekly': cursor.setDate(cursor.getDate() + 7); break;
            case 'monthly': cursor.setMonth(cursor.getMonth() + 1); break;
            case 'quarterly': cursor.setMonth(cursor.getMonth() + 3); break;
            case 'yearly': cursor.setFullYear(cursor.getFullYear() + 1); break;
            default: cursor.setMonth(cursor.getMonth() + 1); break;
          }
          safety++;
        }

        if (dueDates.length === 0) continue;

        // إذا كانت دفعة واحدة فقط: تنفيذ مباشر (كالسابق)
        // إذا كانت دفعات متعددة متراكمة: عرض ملخص وتأكيد
        if (dueDates.length === 1) {
          await processSubscriptionPayment(sub, dueDates[0]);
        } else {
          // تراكم: تأكيد صريح قبل التنفيذ
          const confirmed = await UI.confirm({
            title: `دفعات متراكمة للاشتراك: ${sub.name}`,
            message: `يوجد ${dueDates.length} دفعات متراكمة بقيمة ${Utils.formatMoney(Number(sub.amount) * dueDates.length, sub.currency)} (كل دفعة ${Utils.formatMoney(sub.amount, sub.currency)}). هل تريد تنفيذها كلها الآن؟`,
            confirmText: 'تنفيذ الكل',
            cancelText: 'تأجيل'
          });
          if (confirmed) {
            for (const d of dueDates) {
              await processSubscriptionPayment(sub, d);
            }
          } else {
            // تم التأجيل - نُحدّث nextDueDate لتجنّب إعادة السؤال
            sub.nextDueDate = cursor.toISOString().slice(0, 10);
            await DB.put('subscriptions', sub);
          }
        }
      }

      // 2. تذكيرات المهام (قبل يوم)
      const tasks = await DB.getAll('tasks');
      for (const task of tasks) {
        if (task.completed) continue;
        if (!task.dueDate) continue;
        if (task.reminded) continue;

        const due = new Date(task.dueDate);
        const dayBefore = new Date(due.getTime() - 24 * 60 * 60 * 1000);

        if (dayBefore <= now && now < due) {
          const title = `تذكير: ${task.title}`;
          const body = `استحقاق غداً ${Utils.formatDate(task.dueDate)}`;
          await DB.add('notifications', {
            title, body,
            date: Utils.nowISO(),
            read: false,
            type: 'task'
          });
          await showNotification(title, body, { tag: `task-${task.id}` });
          task.reminded = true;
          await DB.put('tasks', task);
        }
      }

      // 3. تذكيرات المناسبات (قبل 3 أيام)
      const occasions = await DB.getAll('occasions');
      for (const occ of occasions) {
        if (occ.reminded) continue;
        if (!occ.date) continue;

        const next = getNextOccasionDate(occ);
        if (!next) continue;

        const threeDaysBefore = new Date(next.getTime() - 3 * 24 * 60 * 60 * 1000);
        if (threeDaysBefore <= now && now < next) {
          const days = Utils.daysBetween(now, next);
          const title = `مناسبة قادمة: ${occ.title}`;
          const body = days === 0 ? 'اليوم' : `بعد ${days} يوم`;
          await DB.add('notifications', {
            title, body,
            date: Utils.nowISO(),
            read: false,
            type: 'occasion'
          });
          await showNotification(title, body, { tag: `occ-${occ.id}` });
          occ.reminded = true;
          await DB.put('occasions', occ);
        }
      }

      // 4. تذكيرات الأدوية (5 دقائق قبل)
      const meds = await DB.getAll('medicines');
      for (const med of meds) {
        if (!med.reminders || med.reminders === false) continue;
        if (!med.times || med.times.length === 0) continue;

        for (const time of med.times) {
          const [h, m] = time.split(':').map(Number);
          const doseTime = new Date();
          doseTime.setHours(h, m, 0, 0);
          const reminderTime = new Date(doseTime.getTime() - 5 * 60 * 1000);

          const key = `${med.id}_${Utils.todayISO()}_${time}`;
          if (reminderTime <= now && now < doseTime) {
            const sent = await DB.getSetting(`med_reminder_${key}`, false);
            if (!sent) {
              const title = `تذكير دواء: ${med.name}`;
              const body = `حان وقت تناول ${med.dose || 1} ${med.form || 'قرص'}${med.beneficiary && med.beneficiary !== 'لي' ? ' لـ ' + med.beneficiary : ''}`;
              await DB.add('notifications', {
                title, body,
                date: Utils.nowISO(),
                read: false,
                type: 'medicine',
                hideOnLock: med.hideOnLock
              });
              await showNotification(title, body, { tag: `med-${key}` });
              await DB.setSetting(`med_reminder_${key}`, true);
            }
          }
        }
      }

      // 5. الأقساط المستحقة
      const debts = await DB.getAll('debts');
      for (const debt of debts) {
        if (!debt.installment?.enabled) continue;
        if (!debt.dueDate) continue;

        const due = new Date(debt.dueDate);
        if (due <= now && (debt.remainingAmount || 0) > 0) {
          const sent = await DB.getSetting(`debt_reminder_${debt.id}_${debt.dueDate}`, false);
          if (!sent) {
            const title = `قسط مستحق: ${debt.personName}`;
            const body = `مبلغ ${Utils.formatMoney(debt.remainingAmount, debt.currency)}${debt.type === 'owed_to_me' ? ' (لك)' : ' (عليك)'}`;
            await DB.add('notifications', {
              title, body,
              date: Utils.nowISO(),
              read: false,
              type: 'debt'
            });
            await showNotification(title, body, { tag: `debt-${debt.id}` });
            await DB.setSetting(`debt_reminder_${debt.id}_${debt.dueDate}`, true);
          }
        }
      }
    } catch (e) {
      console.error('Scheduled tasks error:', e);
    }
  }

  // تنفيذ دفعة اشتراك واحدة
  async function processSubscriptionPayment(sub, dueDate) {
    try {
      if (sub.walletId) {
        const wallet = await DB.get('wallets', sub.walletId);
        if (wallet) {
          wallet.balance = Number(wallet.balance) - Number(sub.amount);
          await DB.put('wallets', wallet);

          await DB.add('transactions', {
            type: 'expense',
            amount: sub.amount,
            walletId: sub.walletId,
            category: 'bills',
            note: `دفع تلقائي: ${sub.name}`,
            currency: sub.currency,
            date: dueDate.toISOString().slice(0, 10) + 'T' + new Date().toTimeString().slice(0, 8)
          });
        }
      }

      // إشعار
      const title = `دفعة تلقائية: ${sub.name}`;
      const body = `تم دفع ${Utils.formatMoney(sub.amount, sub.currency)} تلقائياً`;
      await DB.add('notifications', {
        title, body,
        date: Utils.nowISO(),
        read: false,
        type: 'subscription'
      });
      await showNotification(title, body, { tag: `sub-${sub.id}-${dueDate.getTime()}` });

      // تحديث تاريخ الاستحقاق القادم (آخر دفعة + دورة واحدة)
      const next = new Date(dueDate);
      switch (sub.frequency) {
        case 'daily': next.setDate(next.getDate() + 1); break;
        case 'weekly': next.setDate(next.getDate() + 7); break;
        case 'monthly': next.setMonth(next.getMonth() + 1); break;
        case 'quarterly': next.setMonth(next.getMonth() + 3); break;
        case 'yearly': next.setFullYear(next.getFullYear() + 1); break;
        default: next.setMonth(next.getMonth() + 1); break;
      }
      sub.nextDueDate = next.toISOString().slice(0, 10);
      await DB.put('subscriptions', sub);
    } catch (e) {
      console.error('[Scheduled] subscription payment failed:', e);
    }
  }

  function getNextOccasionDate(occ) {
    if (!occ.date) return null;
    const date = new Date(occ.date);
    const now = new Date();
    const thisYear = new Date(now.getFullYear(), date.getMonth(), date.getDate());
    if (thisYear < now) {
      return new Date(now.getFullYear() + 1, date.getMonth(), date.getDate());
    }
    return thisYear;
  }

  // تشغيل الجدولة كل دقيقة
  setInterval(runScheduledTasks, 60000);
  setTimeout(runScheduledTasks, 3000);

  // إتاحة showNotification عالمياً للاستخدام من الصفحات
  window.__showNotification = showNotification;
})();

  </script>

  <script>
/* ===== js/lib/utils.js ===== */
/* =========================================================
   UTILS.JS - دوال مساعدة عامة
   ========================================================= */

window.Utils = (function () {
  'use strict';

  // تنسيق المبلغ كعملة
  function formatMoney(amount, currency = '₪') {
    const num = Number(amount) || 0;
    const formatted = num.toLocaleString('en-US', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
    return `${formatted} ${currency}`;
  }

  // تنسيق رقم بدون رمز العملة
  function formatNumber(n) {
    return (Number(n) || 0).toLocaleString('en-US', { maximumFractionDigits: 2 });
  }

  // تنسيق التاريخ بصيغة عربية
  function formatDate(date, opts = {}) {
    const d = new Date(date);
    if (isNaN(d.getTime())) return '';
    const options = {
      year: 'numeric',
      month: 'long',
      day: 'numeric',
      ...opts
    };
    return d.toLocaleDateString('ar-EG', options);
  }

  // تنسيق التاريخ القصير
  function formatDateShort(date) {
    const d = new Date(date);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleDateString('en-GB'); // dd/mm/yyyy
  }

  // تنسيق الوقت
  function formatTime(date) {
    const d = new Date(date);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
  }

  // تنسيق التاريخ والوقت
  function formatDateTime(date) {
    return `${formatDate(date)} ${formatTime(date)}`;
  }

  // التاريخ اليوم بصيغة ISO
  function todayISO() {
    const d = new Date();
    const tz = d.getTimezoneOffset() * 60000;
    return new Date(d - tz).toISOString().slice(0, 10);
  }

  // التاريخ والوقت الحالي بصيغة ISO
  function nowISO() {
    return new Date().toISOString();
  }

  // عدد الأيام بين تاريخين
  function daysBetween(d1, d2) {
    const a = new Date(d1);
    const b = new Date(d2);
    return Math.round((b - a) / (1000 * 60 * 60 * 24));
  }

  // إضافة أيام إلى تاريخ
  function addDays(date, days) {
    const d = new Date(date);
    d.setDate(d.getDate() + days);
    return d;
  }

  // بداية الشهر الحالي
  function startOfMonth(date = new Date()) {
    return new Date(date.getFullYear(), date.getMonth(), 1);
  }

  // نهاية الشهر الحالي
  function endOfMonth(date = new Date()) {
    return new Date(date.getFullYear(), date.getMonth() + 1, 0, 23, 59, 59);
  }

  // بداية اليوم
  function startOfDay(date = new Date()) {
    const d = new Date(date);
    d.setHours(0, 0, 0, 0);
    return d;
  }

  // نهاية اليوم
  function endOfDay(date = new Date()) {
    const d = new Date(date);
    d.setHours(23, 59, 59, 999);
    return d;
  }

  // بداية الأسبوع (السبت)
  function startOfWeek(date = new Date()) {
    const d = new Date(date);
    const day = d.getDay();
    // الأحد=0, الإثنين=1, ... السبت=6
    // نعتبر السبت بداية الأسبوع
    const diff = (day === 6) ? 0 : (day + 1);
    const start = new Date(d);
    start.setDate(d.getDate() - diff);
    start.setHours(0, 0, 0, 0);
    return start;
  }

  // بداية السنة
  function startOfYear(date = new Date()) {
    return new Date(date.getFullYear(), 0, 1);
  }

  // الحصول على معرّف فريد
  function uid(prefix = 'id') {
    return `${prefix}_${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;
  }

  // توليد UUID v4
  function uuid() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
      const r = Math.random() * 16 | 0;
      const v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }

  // هروب HTML
  function escapeHTML(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  // إنشاء عنصر DOM من نص HTML
  function html(strings, ...values) {
    let result = '';
    strings.forEach((s, i) => {
      result += s;
      if (i < values.length) {
        const v = values[i];
        if (v == null) {
          result += '';
        } else if (Array.isArray(v)) {
          result += v.join('');
        } else {
          result += escapeHTML(v);
        }
      }
    });
    return result;
  }

  // إنشاء عنصر DOM بسرعة
  function el(tag, attrs = {}, children = []) {
    const node = document.createElement(tag);
    Object.entries(attrs).forEach(([k, v]) => {
      if (k === 'class') node.className = v;
      else if (k === 'style' && typeof v === 'object') Object.assign(node.style, v);
      else if (k.startsWith('on') && typeof v === 'function') {
        node.addEventListener(k.slice(2).toLowerCase(), v);
      } else if (k === 'dataset') {
        Object.entries(v).forEach(([dk, dv]) => node.dataset[dk] = dv);
      } else if (v !== null && v !== undefined) {
        node.setAttribute(k, v);
      }
    });
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if (c == null) return;
      if (typeof c === 'string') node.appendChild(document.createTextNode(c));
      else node.appendChild(c);
    });
    return node;
  }

  // تأخير
  function delay(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  // debounce
  function debounce(fn, wait = 300) {
    let t;
    return function (...args) {
      clearTimeout(t);
      t = setTimeout(() => fn.apply(this, args), wait);
    };
  }

  // الحصول على الحرف الأول من الاسم
  function initials(name) {
    if (!name) return '?';
    const parts = name.trim().split(/\s+/);
    if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
    return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
  }

  // التحقق من صحة البريد الإلكتروني
  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  // التحقق من رقم الهاتف
  function isValidPhone(phone) {
    return /^[+]?[\d\s-]{8,}$/.test(phone);
  }

  // تحويل الملف إلى Base64
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // تنزيل ملف من نص
  function downloadFile(filename, content, type = 'text/plain') {
    const blob = new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  // نسخ إلى الحافظة
  async function copyToClipboard(text) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch {
      return false;
    }
  }

  // اهتزاز الجهاز إن كان مدعوماً
  function vibrate(pattern = 50) {
    if (navigator.vibrate) navigator.vibrate(pattern);
  }

  // الحصول على نص نسبي للوقت (منذ/خلال)
  function relativeTime(date) {
    const d = new Date(date);
    const now = new Date();
    const diff = daysBetween(now, d);
    if (diff === 0) return 'اليوم';
    if (diff === 1) return 'غداً';
    if (diff === -1) return 'أمس';
    if (diff > 0 && diff <= 7) return `بعد ${diff} أيام`;
    if (diff < 0 && diff >= -7) return `منذ ${Math.abs(diff)} أيام`;
    if (diff > 7 && diff <= 30) return `بعد ${Math.floor(diff / 7)} أسابيع`;
    if (diff < -7 && diff >= -30) return `منذ ${Math.floor(Math.abs(diff) / 7)} أسابيع`;
    return formatDate(d);
  }

  // تحويل ms إلى نص مدة
  function duration(ms) {
    const s = Math.floor(ms / 1000);
    if (s < 60) return `${s} ثانية`;
    const m = Math.floor(s / 60);
    if (m < 60) return `${m} دقيقة`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h} ساعة`;
    const d = Math.floor(h / 24);
    return `${d} يوم`;
  }

  // الحصول على عدد الأيام في الشهر
  function daysInMonth(year, month) {
    return new Date(year, month + 1, 0).getDate();
  }

  // تنسيق شهر وسنة
  function formatMonthYear(date) {
    const d = new Date(date);
    return d.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long' });
  }

  // تحويل ثواني إلى ساعات ودقائق
  function formatDuration(minutes) {
    const h = Math.floor(minutes / 60);
    const m = minutes % 60;
    if (h === 0) return `${m} دقيقة`;
    if (m === 0) return `${h} ساعة`;
    return `${h} س ${m} د`;
  }

  // قيمة آمنة من كائن
  function safeGet(obj, path, def = null) {
    return path.split('.').reduce((acc, k) => (acc && acc[k] != null ? acc[k] : def), obj);
  }

  // دمج كائنات بعمق
  function deepMerge(target, ...sources) {
    if (!sources.length) return target;
    const source = sources.shift();
    if (isObject(target) && isObject(source)) {
      for (const key in source) {
        if (isObject(source[key])) {
          if (!target[key]) Object.assign(target, { [key]: {} });
          deepMerge(target[key], source[key]);
        } else {
          Object.assign(target, { [key]: source[key] });
        }
      }
    }
    return deepMerge(target, ...sources);
  }

  function isObject(item) {
    return item && typeof item === 'object' && !Array.isArray(item);
  }

  // توليد لون عشوائي
  function randomColor() {
    const colors = [
      '#0f766e', '#2563eb', '#7c3aed', '#db2777', '#dc2626',
      '#ea580c', '#ca8a04', '#16a34a', '#0891b2', '#4f46e5'
    ];
    return colors[Math.floor(Math.random() * colors.length)];
  }

  // تحويل سلسلة إلى لون هاش
  function colorFromString(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    const hue = Math.abs(hash) % 360;
    return `hsl(${hue}, 65%, 45%)`;
  }

  return {
    formatMoney,
    formatNumber,
    formatDate,
    formatDateShort,
    formatTime,
    formatDateTime,
    todayISO,
    nowISO,
    daysBetween,
    addDays,
    startOfMonth,
    endOfMonth,
    startOfDay,
    endOfDay,
    startOfWeek,
    startOfYear,
    uid,
    uuid,
    escapeHTML,
    html,
    el,
    delay,
    debounce,
    initials,
    isValidEmail,
    isValidPhone,
    fileToBase64,
    downloadFile,
    copyToClipboard,
    vibrate,
    relativeTime,
    duration,
    daysInMonth,
    formatMonthYear,
    formatDuration,
    safeGet,
    deepMerge,
    randomColor,
    colorFromString
  };
})();


/* ===== js/lib/crypto.js ===== */
/* =========================================================
   CRYPTO.JS - طبقة التشفير باستخدام Web Crypto API
   =========================================================
   - توليد مفتاح تشفير من الـ PIN عبر PBKDF2
   - تشفير/فك تشفير السجلات بـ AES-256-GCM
   - هاش الـ PIN للتحقق (لا يُخزَّن PIN نص صريح)
   - المفتاح الفعلي يبقى في الذاكرة فقط طوال الجلسة
   - يتطلب سياقاً آمناً (http://localhost أو https://)
   - إذا تعذّر (file:// أو content://) يعطّل التشفير بهدوء
   ========================================================= */

window.Crypto = (function () {
  'use strict';

  const PBKDF2_ITERATIONS = 100000;
  const SALT_LENGTH = 16;        // 16 bytes for PBKDF2 salt
  const IV_LENGTH = 12;          // 12 bytes for AES-GCM IV
  const KEY_HASH_LEN = 32;      // 256-bit hash for verification

  // مفتاح التشفير الفعلي (في الذاكرة فقط)
  let _sessionKey = null;
  let _sessionPinHash = null;   // base64 of PBKDF2 hash for verification
  let _sessionSalt = null;      // salt used for both key derivation and verification

  // تحقق من توفر Web Crypto API
  function isAvailable() {
    return typeof crypto !== 'undefined'
      && crypto.subtle
      && typeof crypto.subtle.importKey === 'function'
      && typeof crypto.subtle.encrypt === 'function'
      && (location.protocol === 'https:'
          || location.protocol === 'http:'
          || location.protocol === 'file:');
  }

  // ============ أدوات Base64 ============
  function bufToB64(buf) {
    const bytes = new Uint8Array(buf);
    let bin = '';
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin);
  }
  function b64ToBuf(b64) {
    try {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes.buffer;
    } catch {
      return null;
    }
  }

  // توليد salt عشوائي
  function generateSalt() {
    const arr = new Uint8Array(SALT_LENGTH);
    crypto.getRandomValues(arr);
    return arr.buffer;
  }

  // توليد IV عشوائي
  function generateIV() {
    const arr = new Uint8Array(IV_LENGTH);
    crypto.getRandomValues(arr);
    return arr.buffer;
  }

  // ============ اشتقاق المفتاح من PIN ============
  // يُستخدم المفتاح نفسه لـ:
  // 1. تشفير/فك تشفير السجلات (AES-GCM)
  // 2. هاش التحقق من صحة الـ PIN (PBKDF2 hash)
  async function deriveKey(pin, saltBuf) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      'raw',
      enc.encode(pin),
      { name: 'PBKDF2' },
      false,
      ['deriveKey', 'deriveBits']
    );

    // مفتاح AES-GCM
    const aesKey = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: saltBuf, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt', 'decrypt']
    );

    // هاش التحقق (256 bit)
    const hashBits = await crypto.subtle.deriveBits(
      { name: 'PBKDF2', salt: saltBuf, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
      keyMaterial,
      KEY_HASH_LEN * 8
    );

    return { aesKey, hash: bufToB64(hashBits) };
  }

  // ============ تشفير سجل ============
  // record: أي كائن JS
  // يعيد: { __enc: true, iv, data, salt? }
  async function encryptRecord(record) {
    if (!isAvailable() || !_sessionKey) {
      // وضع غير آمن: إرجاع السجل كما هو
      return { ...record };
    }
    try {
      const json = JSON.stringify(record);
      const enc = new TextEncoder();
      const iv = generateIV();
      const ciphertext = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        _sessionKey,
        enc.encode(json)
      );
      return {
        __enc: true,
        iv: bufToB64(iv),
        data: bufToB64(ciphertext)
      };
    } catch (e) {
      console.warn('[Crypto] encryptRecord failed, returning plaintext:', e);
      return { ...record };
    }
  }

  // ============ فك تشفير سجل ============
  // يقبل إما:
  //  - { __enc: true, iv, data } (نسق encryptRecord المباشر)
  //  - { iv, data } (نسق التخزين في DB، بعد فصل الحمولة عن المعرّفات)
  async function decryptRecord(stored) {
    if (!stored) return stored;
    // استخراج iv و data من أي من النسقين
    const iv = stored.iv;
    const data = stored.data;
    if (!iv || !data) return stored;  // غير مشفّر أو ناقص
    if (!isAvailable() || !_sessionKey) {
      // السجل مشفّر لكن المفتاح غير متوفر
      return { _encrypted: true };
    }
    try {
      const ivBuf = b64ToBuf(iv);
      const dataBuf = b64ToBuf(data);
      if (!ivBuf || !dataBuf) return null;
      const plaintext = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: ivBuf },
        _sessionKey,
        dataBuf
      );
      const dec = new TextDecoder();
      return JSON.parse(dec.decode(plaintext));
    } catch (e) {
      console.warn('[Crypto] decryptRecord failed:', e);
      return null;
    }
  }

  // ============ بدء جلسة بتشفير ============
  // pin: الـ PIN الذي أدخله المستخدم
  // saltB64: salt محفوظ مسبقاً (للتحقق من PIN موجود) - أو null لإنشاء جديد
  async function startSession(pin, saltB64) {
    if (!isAvailable()) {
      // سياق غير آمن - نشغّل بدون تشفير
      _sessionKey = null;
      _sessionPinHash = null;
      _sessionSalt = null;
      return { secure: false };
    }

    let saltBuf;
    if (saltB64) {
      saltBuf = b64ToBuf(saltB64);
      if (!saltBuf) return { secure: false, error: 'salt غير صالح' };
    } else {
      saltBuf = generateSalt();
    }

    const { aesKey, hash } = await deriveKey(pin, saltBuf);
    _sessionKey = aesKey;
    _sessionPinHash = hash;
    _sessionSalt = bufToB64(saltBuf);

    return {
      secure: true,
      salt: _sessionSalt,
      hash: _sessionPinHash
    };
  }

  // ============ التحقق من PIN ============
  // pin: الـ PIN المدخل
  // expectedHash, expectedSalt: محفوظان في user record
  async function verifyPin(pin, expectedHash, expectedSalt) {
    if (!isAvailable() || !expectedHash || !expectedSalt) {
      // وضع غير آمن: تحقق نصّي مباشر
      return pin === expectedHash;
    }
    const saltBuf = b64ToBuf(expectedSalt);
    if (!saltBuf) return false;
    const { hash } = await deriveKey(pin, saltBuf);
    return hash === expectedHash;
  }

  // ============ إنشاء مستخدم جديد (تشفير) ============
  // يُستخدم عند الإعداد الأولي أو تغيير PIN
  // يعيد: { pinHash, pinSalt } ليُخزّنا في سجل المستخدم
  async function createPinCredentials(pin) {
    if (!isAvailable()) {
      // وضع غير آمن: نُخزّن الـ PIN كنص (للتوافق مع البيئات غير الآمنة)
      return { pinHash: pin, pinSalt: null, secure: false };
    }
    const saltBuf = generateSalt();
    const { aesKey, hash } = await deriveKey(pin, saltBuf);
    return {
      pinHash: hash,
      pinSalt: bufToB64(saltBuf),
      secure: true
    };
  }

  // ============ تشفير/فك تشفير ملف النسخ الاحتياطي ============
  // يستخدم نفس المفتاح المشتق من الـ PIN
  async function encryptBackup(dataObj, pin) {
    if (!isAvailable()) {
      // وضع غير آمن: JSON عادي
      return { __format: 'malia-backup-v1', __secure: false, data: dataObj };
    }
    const saltBuf = generateSalt();
    const { aesKey } = await deriveKey(pin, saltBuf);
    const iv = generateIV();
    const enc = new TextEncoder();
    const json = JSON.stringify(dataObj);
    const ciphertext = await crypto.subtle.encrypt(
      { name: 'AES-GCM', iv },
      aesKey,
      enc.encode(json)
    );
    return {
      __format: 'malia-backup-v1',
      __secure: true,
      __salt: bufToB64(saltBuf),
      __iv: bufToB64(iv),
      __data: bufToB64(ciphertext)
    };
  }

  async function decryptBackup(backupObj, pin) {
    if (!backupObj || backupObj.__format !== 'malia-backup-v1') {
      throw new Error('ملف نسخة احتياطية غير صالح');
    }
    if (!backupObj.__secure) {
      // نسخة غير مشفّرة (قديمة)
      return backupObj.data;
    }
    if (!isAvailable()) {
      throw new Error('هذا الملف مشفّر. يتطلب التشغيل من http://localhost أو https://');
    }
    const saltBuf = b64ToBuf(backupObj.__salt);
    const iv = b64ToBuf(backupObj.__iv);
    const data = b64ToBuf(backupObj.__data);
    if (!saltBuf || !iv || !data) throw new Error('ملف تالف');
    const { aesKey } = await deriveKey(pin, saltBuf);
    const plaintext = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv },
      aesKey,
      data
    );
    const dec = new TextDecoder();
    return JSON.parse(dec.decode(plaintext));
  }

  // ============ إنهاء الجلسة (مسح المفتاح) ============
  function endSession() {
    _sessionKey = null;
    _sessionPinHash = null;
    _sessionSalt = null;
  }

  // حالة الجلسة
  function hasSessionKey() { return !!_sessionKey; }
  function getSessionSalt() { return _sessionSalt; }
  function getSessionHash() { return _sessionPinHash; }

  return {
    isAvailable,
    encryptRecord,
    decryptRecord,
    startSession,
    verifyPin,
    createPinCredentials,
    encryptBackup,
    decryptBackup,
    endSession,
    hasSessionKey,
    getSessionSalt,
    getSessionHash,
    PBKDF2_ITERATIONS
  };
})();


/* ===== js/lib/db.js ===== */
/* =========================================================
   DB.JS - طبقة قاعدة البيانات (IndexedDB + localStorage Fallback)
   =========================================================
   تعمل أولاً عبر IndexedDB. إذا تعذّر فتحها (مثلاً من
   `content://media/external/file/1` على Brave/Chrome في Android)
   تنتقل تلقائياً إلى وضع localStorage.

   كما تدعم طبقة تشفير شفافة:
   - إذا كان مفتاح تشفير متوفراً (Crypto.hasSessionKey())،
     يُشفّر كل سجل قبل تخزينه ويُفك تشفيره عند القراءة.
   - السجل المخزَّن يصبح: { id, createdAt, updatedAt, __enc: {iv, data} }
   - السجلات القديمة غير المشفّرة تُعامَل كـ legacy وتُعاد كما هي.
   - الاستعلام بالفهرس (getByIndex) يُحوَّل إلى getAll + filter
     لضمان عمل التشفير (لأن الحقول المفهرسة داخل الحمولة المشفّرة).
   ========================================================= */

window.DB = (function () {
  'use strict';

  const DB_NAME = 'malia_app_db';
  const DB_VERSION = 4;
  const LS_PREFIX = 'malia_ls_db_';

  // تعريف المخازن وفهارسها
  const STORES = {
    user: { keyPath: 'id', indexes: [] },
    wallets: { keyPath: 'id', indexes: ['currency', 'archived', 'createdAt'] },
    transactions: { keyPath: 'id', indexes: ['walletId', 'type', 'category', 'date', 'createdAt'] },
    debts: { keyPath: 'id', indexes: ['type', 'listName', 'personName', 'archived', 'dueDate'] },
    subscriptions: { keyPath: 'id', indexes: ['type', 'frequency', 'nextDueDate'] },
    tasks: { keyPath: 'id', indexes: ['listId', 'priority', 'dueDate', 'completed', 'createdAt'] },
    taskLists: { keyPath: 'id', indexes: ['type', 'createdAt'] },
    occasions: { keyPath: 'id', indexes: ['group', 'type', 'date'] },
    medicines: { keyPath: 'id', indexes: ['beneficiary', 'name', 'startDate', 'endDate'] },
    properties: { keyPath: 'id', indexes: ['type', 'currency', 'storageLocation', 'createdAt'] },
    budgets: { keyPath: 'id', indexes: ['category', 'period', 'active'] },
    socialJournal: { keyPath: 'id', indexes: ['personName', 'occasion', 'date'] },
    jamaeya: { keyPath: 'id', indexes: ['name', 'active', 'startDate'] },
    guarantees: { keyPath: 'id', indexes: ['personName', 'date', 'status'] },
    zakat: { keyPath: 'id', indexes: ['type', 'date', 'year'] },
    investments: { keyPath: 'id', indexes: ['type', 'status', 'startDate', 'endDate', 'archived'] },
    investmentTransactions: { keyPath: 'id', indexes: ['investmentId', 'type', 'date', 'walletId'] },
    investmentValuations:   { keyPath: 'id', indexes: ['investmentId', 'date'] },
    notes: { keyPath: 'id', indexes: ['category', 'createdAt', 'pinned'] },
    noteAttachments: { keyPath: 'id', indexes: ['noteId', 'type', 'createdAt'] },
    notifications: { keyPath: 'id', indexes: ['read', 'date', 'type'] },
    settings: { keyPath: 'key', indexes: [] }
  };

  // مخازن لا تُشفَّر (بيانات نظام/إعدادات/مستخدم)
  // user: يحتوي على pinHash و pinSalt اللازمة للتحقق من PIN قبل اشتقاق مفتاح التشفير
  //       (الـ PIN نفسه لا يُخزَّن، فقط هاشه - مثل /etc/shadow)
  // settings: تُستخدم قبل تسجيل الدخول (الثيم، اللغة)
  // notifications: بيانات عابرة
  const NO_ENCRYPT_STORES = new Set(['settings', 'notifications', 'user']);

  let dbInstance = null;
  let _mode = 'idb';        // 'idb' | 'ls'
  let _openFailed = false;

  // ============ وضع localStorage ============
  function _lsKey(storeName) { return LS_PREFIX + storeName; }

  function _lsLoad(storeName) {
    try {
      const raw = localStorage.getItem(_lsKey(storeName));
      if (!raw) return [];
      const arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch {
      return [];
    }
  }

  function _lsSave(storeName, arr) {
    try {
      localStorage.setItem(_lsKey(storeName), JSON.stringify(arr));
      return true;
    } catch (e) {
      console.error('[DB:LS] save failed for', storeName, e);
      if (e && e.name === 'QuotaExceededError') {
        try {
          localStorage.setItem(_lsKey('noteAttachments'), JSON.stringify([]));
          localStorage.setItem(_lsKey(storeName), JSON.stringify(arr));
          return true;
        } catch {}
      }
      throw e;
    }
  }

  function _lsGetByKey(storeName, keyValue) {
    const arr = _lsLoad(storeName);
    const cfg = STORES[storeName] || { keyPath: 'id' };
    const kp = cfg.keyPath;
    return arr.find(r => r && r[kp] === keyValue) || null;
  }

  function _lsAdd(storeName, record) {
    const arr = _lsLoad(storeName);
    const cfg = STORES[storeName] || { keyPath: 'id' };
    const kp = cfg.keyPath;
    if (!record[kp]) record[kp] = Utils.uid(storeName.slice(0, 3));
    if (!record.createdAt) record.createdAt = Utils.nowISO();
    record.updatedAt = Utils.nowISO();
    const existing = arr.find(r => r && r[kp] === record[kp]);
    if (existing) {
      const err = new Error('ConstraintError: key already exists');
      err.name = 'ConstraintError';
      throw err;
    }
    arr.push(record);
    _lsSave(storeName, arr);
    return record;
  }

  function _lsPut(storeName, record) {
    const arr = _lsLoad(storeName);
    const cfg = STORES[storeName] || { keyPath: 'id' };
    const kp = cfg.keyPath;
    if (!record[kp]) record[kp] = Utils.uid(storeName.slice(0, 3));
    record.updatedAt = Utils.nowISO();
    const idx = arr.findIndex(r => r && r[kp] === record[kp]);
    if (idx >= 0) arr[idx] = record;
    else arr.push(record);
    _lsSave(storeName, arr);
    return record;
  }

  function _lsRemove(storeName, keyValue) {
    const arr = _lsLoad(storeName);
    const cfg = STORES[storeName] || { keyPath: 'id' };
    const kp = cfg.keyPath;
    const filtered = arr.filter(r => r && r[kp] !== keyValue);
    _lsSave(storeName, filtered);
    return true;
  }

  function _lsClear(storeName) {
    _lsSave(storeName, []);
    return true;
  }

  function _lsGetByIndex(storeName, indexName, value) {
    const arr = _lsLoad(storeName);
    return arr.filter(r => r && r[indexName] === value);
  }

  // ============ طبقة التشفير الشفافة ============

  // هل يجب تشفير هذا المخزن؟
  function _shouldEncrypt(storeName) {
    if (NO_ENCRYPT_STORES.has(storeName)) return false;
    if (!window.Crypto) return false;
    return Crypto.isAvailable() && Crypto.hasSessionKey();
  }

  // تشفير سجل قبل التخزين
  // يحتفظ بـ id, createdAt, updatedAt ظاهرة، ويُشفّر الباقي
  async function _encryptForStorage(storeName, record) {
    if (!_shouldEncrypt(storeName)) return record;
    const stored = await Crypto.encryptRecord(record);
    // encrypted blob is in stored.__enc, stored.iv, stored.data
    if (!stored.__enc) {
      // لم يُشفّر (ربما فشل) - أرجع السجل كما هو
      return record;
    }
    return {
      id: record.id,
      createdAt: record.createdAt,
      updatedAt: record.updatedAt,
      key: record.key,  // لدعم مخزن settings (رغم أنه لا يُشفّر عادة)
      __enc: { iv: stored.iv, data: stored.data }
    };
  }

  // فك تشفير سجل بعد القراءة
  async function _decryptFromStorage(stored) {
    if (!stored) return stored;
    if (!stored.__enc) return stored;  // legacy - غير مشفّر
    if (!window.Crypto) return { _encrypted: true, id: stored.id };
    // مرّر الحمولة المشفّرة فقط لـ decryptRecord
    return await Crypto.decryptRecord(stored.__enc);
  }

  // فك تشفير مصفوفة سجلات
  async function _decryptArray(arr) {
    if (!Array.isArray(arr)) return [];
    const out = [];
    for (const r of arr) {
      out.push(await _decryptFromStorage(r));
    }
    return out.filter(r => r != null);
  }

  // ============ فتح قاعدة البيانات ============
  function open() {
    return new Promise((resolve, reject) => {
      if (dbInstance) return resolve(dbInstance);
      if (_openFailed) {
        if (_mode === 'ls') return resolve('ls-mode');
        return reject(new Error('IndexedDB غير متاح في هذا السياق'));
      }

      if (typeof indexedDB === 'undefined') {
        console.warn('[DB] indexedDB undefined - falling back to localStorage');
        _mode = 'ls';
        _openFailed = true;
        return resolve('ls-mode');
      }

      let req;
      try {
        req = indexedDB.open(DB_NAME, DB_VERSION);
      } catch (e) {
        console.warn('[DB] indexedDB.open threw - falling back to localStorage:', e);
        _mode = 'ls';
        _openFailed = true;
        return resolve('ls-mode');
      }

      let settled = false;
      const timeout = setTimeout(() => {
        if (!settled) {
          console.warn('[DB] open timeout - falling back to localStorage');
          settled = true;
          _mode = 'ls';
          _openFailed = true;
          resolve('ls-mode');
        }
      }, 4000);

      req.onerror = () => {
        settled = true;
        clearTimeout(timeout);
        console.warn('[DB] open error - falling back to localStorage:', req.error);
        _mode = 'ls';
        _openFailed = true;
        resolve('ls-mode');
      };
      req.onsuccess = () => {
        settled = true;
        clearTimeout(timeout);
        dbInstance = req.result;
        _mode = 'idb';
        dbInstance.onclose = () => { dbInstance = null; };
        dbInstance.onversionchange = () => { dbInstance.close(); dbInstance = null; };
        resolve(dbInstance);
      };
      req.onblocked = () => {
        console.warn('[DB] open blocked - another tab may be holding the DB');
      };

      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        Object.entries(STORES).forEach(([name, config]) => {
          if (!db.objectStoreNames.contains(name)) {
            const store = db.createObjectStore(name, { keyPath: config.keyPath });
            config.indexes.forEach(idx => {
              store.createIndex(idx, idx, { unique: false });
            });
          }
        });
        if (!db.objectStoreNames.contains('_meta')) {
          db.createObjectStore('_meta', { keyPath: 'key' });
        }
      };
    });
  }

  // ============ العمليات العامة (تعمل على الوضعين + تشفير) ============

  // إدراج سجل
  async function add(storeName, record) {
    // تجهيز المعرّفات الافتراضية
    const cfg = STORES[storeName] || { keyPath: 'id' };
    const kp = cfg.keyPath;
    if (!record[kp]) record[kp] = Utils.uid(storeName.slice(0, 3));
    if (!record.createdAt) record.createdAt = Utils.nowISO();
    record.updatedAt = Utils.nowISO();

    // تشفير قبل التخزين
    const toStore = await _encryptForStorage(storeName, record);

    if (_mode === 'ls' || _openFailed) {
      return _lsAdd(storeName, toStore);
    }
    try {
      const db = await open();
      if (_mode === 'ls' || db === 'ls-mode') return _lsAdd(storeName, toStore);
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const req = tx.objectStore(storeName).add(toStore);
        req.onsuccess = () => resolve(record);
        req.onerror = () => reject(req.error);
      });
    } catch (e) {
      console.warn('[DB] add failed, falling back to localStorage:', e);
      _mode = 'ls';
      _openFailed = true;
      return _lsAdd(storeName, toStore);
    }
  }

  // تحديث سجل
  async function put(storeName, record) {
    const cfg = STORES[storeName] || { keyPath: 'id' };
    const kp = cfg.keyPath;
    if (!record[kp]) record[kp] = Utils.uid(storeName.slice(0, 3));
    if (!record.createdAt) record.createdAt = Utils.nowISO();
    record.updatedAt = Utils.nowISO();

    const toStore = await _encryptForStorage(storeName, record);

    if (_mode === 'ls' || _openFailed) {
      return _lsPut(storeName, toStore);
    }
    try {
      const db = await open();
      if (_mode === 'ls' || db === 'ls-mode') return _lsPut(storeName, toStore);
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const req = tx.objectStore(storeName).put(toStore);
        req.onsuccess = () => resolve(record);
        req.onerror = () => reject(req.error);
      });
    } catch (e) {
      console.warn('[DB] put failed, falling back to localStorage:', e);
      _mode = 'ls';
      _openFailed = true;
      return _lsPut(storeName, toStore);
    }
  }

  // الحصول على سجل بواسطة المعرّف
  async function get(storeName, id) {
    if (id == null) return null;
    let stored;
    if (_mode === 'ls' || _openFailed) {
      stored = _lsGetByKey(storeName, id);
    } else {
      try {
        const db = await open();
        if (_mode === 'ls' || db === 'ls-mode') {
          stored = _lsGetByKey(storeName, id);
        } else {
          stored = await new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, 'readonly');
            const req = tx.objectStore(storeName).get(id);
            req.onsuccess = () => resolve(req.result || null);
            req.onerror = () => reject(req.error);
          });
        }
      } catch (e) {
        console.warn('[DB] get failed, falling back to localStorage:', e);
        _mode = 'ls';
        _openFailed = true;
        stored = _lsGetByKey(storeName, id);
      }
    }
    return await _decryptFromStorage(stored);
  }

  // الحصول على جميع السجلات
  async function getAll(storeName) {
    let arr;
    if (_mode === 'ls' || _openFailed) {
      arr = _lsLoad(storeName);
    } else {
      try {
        const db = await open();
        if (_mode === 'ls' || db === 'ls-mode') {
          arr = _lsLoad(storeName);
        } else {
          arr = await new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, 'readonly');
            const req = tx.objectStore(storeName).getAll();
            req.onsuccess = () => resolve(req.result || []);
            req.onerror = () => reject(req.error);
          });
        }
      } catch (e) {
        console.warn('[DB] getAll failed, falling back to localStorage:', e);
        _mode = 'ls';
        _openFailed = true;
        arr = _lsLoad(storeName);
      }
    }
    return await _decryptArray(arr);
  }

  // الحصول على سجلات حسب فهرس
  // ملاحظة: مع التشفير، الحقول المفهرسة داخل الحمولة المشفّرة،
  // لذلك نستخدم getAll + filter في الذاكرة (مثل وضع LS).
  async function getByIndex(storeName, indexName, value) {
    const all = await getAll(storeName);
    return all.filter(r => r && r[indexName] === value);
  }

  // حذف سجل
  async function remove(storeName, id) {
    if (_mode === 'ls' || _openFailed) {
      return _lsRemove(storeName, id);
    }
    try {
      const db = await open();
      if (_mode === 'ls' || db === 'ls-mode') return _lsRemove(storeName, id);
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const req = tx.objectStore(storeName).delete(id);
        req.onsuccess = () => resolve(true);
        req.onerror = () => reject(req.error);
      });
    } catch (e) {
      console.warn('[DB] remove failed, falling back to localStorage:', e);
      _mode = 'ls';
      _openFailed = true;
      return _lsRemove(storeName, id);
    }
  }

  // مسح جميع سجلات مخزن
  async function clear(storeName) {
    if (_mode === 'ls' || _openFailed) {
      return _lsClear(storeName);
    }
    try {
      const db = await open();
      if (_mode === 'ls' || db === 'ls-mode') return _lsClear(storeName);
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const req = tx.objectStore(storeName).clear();
        req.onsuccess = () => resolve(true);
        req.onerror = () => reject(req.error);
      });
    } catch (e) {
      console.warn('[DB] clear failed, falling back to localStorage:', e);
      _mode = 'ls';
      _openFailed = true;
      return _lsClear(storeName);
    }
  }

  // عد السجلات
  async function count(storeName) {
    const all = await getAll(storeName);
    return all.length;
  }

  // استعلام متقدم بفلتر
  async function query(storeName, filterFn) {
    const all = await getAll(storeName);
    if (typeof filterFn !== 'function') return all;
    return all.filter(filterFn);
  }

  // استعلام بمدى تاريخي
  async function queryByDateRange(storeName, dateField, startDate, endDate) {
    const all = await getAll(storeName);
    return all.filter(item => {
      if (!item[dateField]) return false;
      const d = new Date(item[dateField]);
      return d >= new Date(startDate) && d <= new Date(endDate);
    });
  }

  // ============ الإعدادات ============
  async function getSetting(key, defaultValue = null) {
    const rec = await get('settings', key);
    return rec ? rec.value : defaultValue;
  }

  async function setSetting(key, value) {
    return await put('settings', { key, value, updatedAt: Utils.nowISO() });
  }

  // ============ النسخ الاحتياطي ============
  // يُرجع كائن يحتوي كل السجلات (مُفك تشفيرها) لتصديره
  async function exportAll() {
    const data = {};
    for (const storeName of Object.keys(STORES)) {
      data[storeName] = await getAll(storeName);
    }
    data._exportedAt = Utils.nowISO();
    data._version = DB_VERSION;
    data._storageMode = _mode;
    return data;
  }

  // استيراد (يُشفّر السجلات قبل تخزينها تلقائياً)
  async function importAll(data) {
    if (!data || typeof data !== 'object') throw new Error('بيانات غير صالحة');
    for (const storeName of Object.keys(STORES)) {
      if (Array.isArray(data[storeName])) {
        await clear(storeName);
        for (const record of data[storeName]) {
          await add(storeName, record);
        }
      }
    }
    return true;
  }

  // ============ مسح جميع البيانات ============
  async function wipeAll() {
    for (const storeName of Object.keys(STORES)) {
      await clear(storeName);
    }
    return true;
  }

  // ============ تشغيل معاملة موحدة ============
  async function transaction(storeNames, mode, callback) {
    // في وضع التشفير أو LS، نُسقّط للنمط البسيط (getAll/put متسلسلة)
    if (_mode === 'ls' || _openFailed || _shouldEncryptAny(storeNames)) {
      const stores = {};
      storeNames.forEach(name => {
        stores[name] = {
          add: async (rec) => { return await add(name, rec); },
          put: async (rec) => { return await put(name, rec); },
          get: async (id) => { return await get(name, id); },
          getAll: async () => { return await getAll(name); },
          delete: async (id) => { return await remove(name, id); },
          clear: async () => { return await clear(name); },
          count: async () => { return await count(name); },
          index: (idxName) => ({
            getAll: async (val) => { return await getByIndex(name, idxName, val); }
          })
        };
      });
      return await callback(stores);
    }
    try {
      const db = await open();
      if (_mode === 'ls' || db === 'ls-mode') {
        const stores = {};
        storeNames.forEach(name => {
          stores[name] = {
            add: (rec) => _lsAdd(name, rec),
            put: (rec) => _lsPut(name, rec),
            get: (id) => _lsGetByKey(name, id),
            getAll: () => _lsLoad(name),
            delete: (id) => _lsRemove(name, id),
            clear: () => _lsClear(name),
            count: () => _lsLoad(name).length,
            index: (idxName) => ({
              getAll: (val) => _lsGetByIndex(name, idxName, val)
            })
          };
        });
        return callback(stores);
      }
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeNames, mode);
        const stores = {};
        storeNames.forEach(name => stores[name] = tx.objectStore(name));
        let result;
        tx.oncomplete = () => resolve(result);
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error);
        try {
          result = callback(stores);
        } catch (e) {
          tx.abort();
          reject(e);
        }
      });
    } catch (e) {
      console.warn('[DB] transaction failed, falling back to localStorage:', e);
      _mode = 'ls';
      _openFailed = true;
      const stores = {};
      storeNames.forEach(name => {
        stores[name] = {
          add: (rec) => _lsAdd(name, rec),
          put: (rec) => _lsPut(name, rec),
          get: (id) => _lsGetByKey(name, id),
          getAll: () => _lsLoad(name),
          delete: (id) => _lsRemove(name, id),
          clear: () => _lsClear(name),
          count: () => _lsLoad(name).length,
          index: (idxName) => ({
            getAll: (val) => _lsGetByIndex(name, idxName, val)
          })
        };
      });
      return callback(stores);
    }
  }

  function _shouldEncryptAny(storeNames) {
    return storeNames.some(n => _shouldEncrypt(n));
  }

  // ============ معلومات النظام ============
  function getMode() { return _mode; }
  function isLS() { return _mode === 'ls'; }
  function isIDB() { return _mode === 'idb'; }

  return {
    STORES,
    open,
    add,
    put,
    get,
    getAll,
    getByIndex,
    remove,
    clear,
    count,
    query,
    queryByDateRange,
    getSetting,
    setSetting,
    exportAll,
    importAll,
    wipeAll,
    transaction,
    getMode,
    isLS,
    isIDB
  };
})();


/* ===== js/lib/auth.js ===== */
/* =========================================================
   AUTH.JS - نظام المصادقة (محسّن بالتشفير)
   =========================================================
   - لا يحتوي على بيانات مستخدم افتراضية حقيقية
   - شاشة الإعداد الأولي (onboarding) تنشئ المستخدم
   - PIN يُخزَّن كهاش PBKDF2 فقط (لا نص صريح)
   - مفتاح فك التشفير يُشتق من PIN ويبقى في الذاكرة
   - القفل التلقائي يُفرّغ المفتاح دون تسجيل خروج
   ========================================================= */

window.Auth = (function () {
  'use strict';

  const SESSION_KEY = 'ibn_alsabrah_session';
  const USER_KEY = 'ibn_alsabrah_current_user';
  const LOCKED_FLAG = 'ibn_alsabrah_locked';

  // التحقق من حالة تسجيل الدخول
  function isLoggedIn() {
    try {
      const session = localStorage.getItem(SESSION_KEY);
      if (!session) return false;
      const data = JSON.parse(session);
      return data && data.userId && data.expiresAt > Date.now();
    } catch {
      return false;
    }
  }

  // هل التطبيق مقفل (auto-lock)؟
  function isLocked() {
    return localStorage.getItem(LOCKED_FLAG) === '1';
  }

  // هل المستخدم قد أُعدّ (onboarding مكتمل)؟
  async function isOnboarded() {
    try {
      const user = await DB.get('user', 'user_default');
      return !!(user && user.onboarded);
    } catch {
      return false;
    }
  }

  // الحصول على المستخدم الحالي
  async function getCurrentUser() {
    if (!isLoggedIn()) return null;
    // محاولة من localStorage أولاً (أسرع)
    const stored = localStorage.getItem(USER_KEY);
    if (stored) {
      try {
        const u = JSON.parse(stored);
        if (u && u.id) return u;
      } catch {}
    }
    // محاولة من DB
    try {
      const user = await DB.get('user', 'user_default');
      if (user) {
        localStorage.setItem(USER_KEY, JSON.stringify(user));
        return user;
      }
    } catch {}
    return null;
  }

  // تسجيل الدخول
  // pin: الـ PIN الذي أدخله المستخدم
  async function login(pin) {
    const user = await DB.get('user', 'user_default');
    if (!user) {
      return { success: false, error: 'لا يوجد مستخدم. يرجى الإعداد الأولي.', needOnboarding: true };
    }

    // التحقق من PIN
    // Crypto.verifyPin يتولّى الوضعين الآمن (PBKDF2) وغير الآمن (نصّي)
    // داخلياً: إذا لم يتوفر salt أو لم يكن crypto متاحاً، يُقارن PIN مباشرةً بـ pinHash
    // الذي يُخزَّن فيه الـ PIN كنص في الوضع غير الآمن.
    let valid = false;
    try {
      if (user.pinHash) {
        valid = await Crypto.verifyPin(pin, user.pinHash, user.pinSalt);
      } else if (user.password) {
        // توافق مع المستخدمين القدامى قبل نظام التشفير
        valid = (pin === user.password);
      }
    } catch (e) {
      console.error('[Auth] PIN verify error:', e);
      valid = false;
    }

    if (!valid) {
      return { success: false, error: 'الرمز غير صحيح' };
    }

    // بدء جلسة التشفير (يُنشئ مفتاح في الذاكرة من PIN)
    try {
      await Crypto.startSession(pin, user.pinSalt);
    } catch (e) {
      console.warn('[Auth] Could not start crypto session:', e);
      // نتابع الدخول حتى لو فشل التشفير (للوضع غير الآمن)
    }

    // إنشاء الجلسة (تبقى 30 يوماً)
    const session = {
      userId: user.id,
      expiresAt: Date.now() + (30 * 24 * 60 * 60 * 1000)
    };
    localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    localStorage.setItem(USER_KEY, JSON.stringify(user));
    localStorage.removeItem(LOCKED_FLAG);

    return { success: true, user };
  }

  // تسجيل الخروج الكامل
  function logout() {
    Crypto.endSession();
    localStorage.removeItem(SESSION_KEY);
    localStorage.removeItem(USER_KEY);
    localStorage.removeItem(LOCKED_FLAG);
    window.location.hash = '#/login';
  }

  // قفل التطبيق (دون تسجيل خروج)
  function lock() {
    Crypto.endSession();
    localStorage.setItem(LOCKED_FLAG, '1');
    // نُبقي الجلسة نشيطة لكن نُعيد التوجيه لصفحة إدخال PIN
    if (!window.location.hash.startsWith('#/login')) {
      window.location.hash = '#/login';
    }
  }

  // فتح القفل (إعادة إدخال PIN)
  async function unlock(pin) {
    const user = await getCurrentUser();
    if (!user) {
      // الجلسة انتهت - تسجيل خروج كامل
      logout();
      return { success: false, error: 'انتهت الجلسة' };
    }
    let valid = false;
    try {
      if (user.pinHash) {
        valid = await Crypto.verifyPin(pin, user.pinHash, user.pinSalt);
      } else if (user.password) {
        valid = (pin === user.password);
      }
    } catch (e) {
      valid = false;
    }
    if (!valid) return { success: false, error: 'الرمز غير صحيح' };

    try {
      await Crypto.startSession(pin, user.pinSalt);
    } catch (e) {
      console.warn('[Auth] Crypto restart failed:', e);
    }
    localStorage.removeItem(LOCKED_FLAG);
    return { success: true, user };
  }

  // تحديث بيانات المستخدم
  // أكثر متانة: تُعيد قراءة المستخدم من DB إن لم يكن متوفراً
  async function updateUser(updates) {
    let current = await getCurrentUser();
    if (!current) {
      // محاولة من DB مباشرة
      try { current = await DB.get('user', 'user_default'); } catch {}
    }
    if (!current) {
      throw new Error('لم يتم العثور على بيانات المستخدم. سجّل الدخول أولاً.');
    }
    const updated = { ...current, ...updates, updatedAt: Utils.nowISO() };
    await DB.put('user', updated);
    localStorage.setItem(USER_KEY, JSON.stringify(updated));
    return updated;
  }

  // تغيير كلمة السر (PIN)
  // 1. يتحقق من PIN القديم
  // 2. يُنشئ هاش/مفتاح جديد من PIN الجديد
  // 3. يُعيد تشفير السجل بـ PIN الجديد (في الوضع الآمن)
  async function changePassword(oldPin, newPin) {
    const current = await getCurrentUser();
    if (!current) return { success: false, error: 'غير مسجل الدخول' };

    // التحقق من PIN القديم
    let oldValid = false;
    try {
      if (current.pinHash) {
        oldValid = await Crypto.verifyPin(oldPin, current.pinHash, current.pinSalt);
      } else if (current.password) {
        oldValid = (oldPin === current.password);
      }
    } catch (e) {
      oldValid = false;
    }
    if (!oldValid) {
      return { success: false, error: 'الرمز الحالي غير صحيح' };
    }

    // إنشاء بيانات اعتماد جديدة للـ PIN الجديد
    const creds = await Crypto.createPinCredentials(newPin);

    // تحديث سجل المستخدم - لا نخزّن PIN نص صريح أبداً
    const updates = {
      password: null,            // إزالة الـ PIN النصّي القديم (إن وُجد)
      pinHash: creds.pinHash,
      pinSalt: creds.pinSalt,
      secureMode: creds.secure
    };
    const updated = await updateUser(updates);

    // بدء جلسة تشفير جديدة بالمفتاح الجديد
    try {
      await Crypto.startSession(newPin, creds.pinSalt);
    } catch (e) {
      console.warn('[Auth] Could not restart crypto session with new PIN:', e);
    }

    return { success: true, user: updated };
  }

  // إعداد أول مرة - إنشاء مستخدم افتراضي فارغ إن لم يكن موجوداً
  // لم يعد يُنشئ DEFAULT_USER حقيقياً - يُترك للمستخدم إنشاء حسابه عبر onboarding
  async function ensureDefaultUser() {
    const user = await DB.get('user', 'user_default');
    return user;
  }

  // حماية المسارات - إن لم يكن مسجل دخول، ينقل لصفحة الدخول
  // إن لم يكن هناك onboarding، ينقل لصفحة الإعداد الأولي
  async function requireAuth() {
    // تحقق من onboarding
    const onboarded = await isOnboarded();
    if (!onboarded) {
      // لا يوجد مستخدم - اذهب لصفحة الإعداد الأولي
      if (!window.location.hash.startsWith('#/onboarding')) {
        window.location.hash = '#/onboarding';
      }
      return false;
    }

    if (!isLoggedIn()) {
      window.location.hash = '#/login';
      return false;
    }

    // إن كان مقفولاً (auto-lock)، اذهب لصفحة الدخول (مع طلب PIN)
    if (isLocked()) {
      if (!window.location.hash.startsWith('#/login')) {
        window.location.hash = '#/login';
      }
      return false;
    }

    return true;
  }

  return {
    isLoggedIn,
    isLocked,
    isOnboarded,
    getCurrentUser,
    login,
    logout,
    lock,
    unlock,
    updateUser,
    changePassword,
    ensureDefaultUser,
    requireAuth
  };
})();


/* ===== js/lib/ui.js ===== */
/* =========================================================
   UI.JS - مكتبة مكونات واجهة المستخدم المشتركة
   ========================================================= */

window.UI = (function () {
  'use strict';

  // ============ Toast ============
  function toast(message, type = 'default', duration = 2500) {
    const root = document.getElementById('toast-root');
    if (!root) return;
    const t = document.createElement('div');
    t.className = `toast toast--${type}`;
    t.textContent = message;
    root.appendChild(t);
    // مؤثرات صوتية حسب نوع الإشعار
    if (window.Sounds) {
      if (type === 'success') Sounds.success();
      else if (type === 'danger') Sounds.error();
      else if (type === 'warning') Sounds.notify();
    }
    setTimeout(() => {
      t.style.opacity = '0';
      t.style.transform = 'translateY(20px)';
      t.style.transition = 'all 250ms ease';
      setTimeout(() => t.remove(), 250);
    }, duration);
  }

  function toastSuccess(msg, dur) { toast(msg, 'success', dur); }
  function toastError(msg, dur) { toast(msg, 'danger', dur); }
  function toastWarning(msg, dur) { toast(msg, 'warning', dur); }

  // ============ Modal ============
  function modal({ title, body, footer, onClose, size }) {
    const root = document.getElementById('modal-root');
    if (!root) return () => {};

    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';

    const m = document.createElement('div');
    m.className = 'modal';
    m.innerHTML = `
      <div class="modal__handle"></div>
      <div class="modal__header">
        <h3 class="modal__title">${Utils.escapeHTML(title || '')}</h3>
        <button class="modal__close" aria-label="إغلاق">×</button>
      </div>
      <div class="modal__body"></div>
      ${footer ? '<div class="modal__footer"></div>' : ''}
    `;
    m.querySelector('.modal__body').appendChild(typeof body === 'string' ? createFromHTML(body) : body);
    if (footer) {
      const footerEl = m.querySelector('.modal__footer');
      footerEl.appendChild(typeof footer === 'string' ? createFromHTML(footer) : footer);
    }

    let closed = false;
    function close() {
      if (closed) return;
      closed = true;
      m.style.transform = 'translate(-50%, 100%)';
      backdrop.style.opacity = '0';
      setTimeout(() => {
        backdrop.remove();
        m.remove();
        if (typeof onClose === 'function') onClose();
      }, 250);
    }

    backdrop.addEventListener('click', close);
    m.querySelector('.modal__close').addEventListener('click', close);

    root.appendChild(backdrop);
    root.appendChild(m);

    return close;
  }

  // ============ Confirm ============
  function confirm({ title, message, confirmText = 'تأكيد', cancelText = 'إلغاء', danger = false }) {
    return new Promise(resolve => {
      const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
        Utils.el('button', {
          class: 'btn btn--outline btn--block',
          onclick: () => { close(); resolve(false); }
        }, cancelText),
        Utils.el('button', {
          class: `btn btn--block ${danger ? 'btn--danger' : 'btn--primary'}`,
          onclick: () => { close(); resolve(true); }
        }, confirmText)
      ]);

      const body = Utils.el('p', { style: { color: 'var(--color-text-secondary)', margin: 0 } }, message);
      const close = modal({ title, body, footer });
    });
  }

  // ============ Action Sheet ============
  function actionSheet({ title, items }) {
    return new Promise(resolve => {
      const root = document.getElementById('modal-root');
      const backdrop = Utils.el('div', { class: 'modal-backdrop' });
      const sheet = Utils.el('div', { class: 'modal' });

      sheet.innerHTML = `
        <div class="modal__handle"></div>
        ${title ? `<div class="modal__header"><h3 class="modal__title">${Utils.escapeHTML(title)}</h3><button class="modal__close">×</button></div>` : ''}
        <div class="modal__body" style="padding:0"></div>
      `;
      const body = sheet.querySelector('.modal__body');

      items.forEach(item => {
        const btn = Utils.el('button', {
          class: `action-sheet-item ${item.danger ? 'action-sheet-item--danger' : ''}`,
          onclick: () => { close(); resolve(item.value); }
        });
        if (item.icon) {
          const icon = Utils.el('span', { style: { display: 'inline-flex', color: item.danger ? 'var(--color-danger)' : 'var(--color-primary)' } });
          icon.innerHTML = item.icon;
          btn.appendChild(icon);
        }
        btn.appendChild(document.createTextNode(item.label));
        body.appendChild(btn);
      });

      // زر إلغاء
      const cancelBtn = Utils.el('button', {
        class: 'action-sheet-item',
        style: { fontWeight: '600' },
        onclick: () => { close(); resolve(null); }
      }, 'إلغاء');
      body.appendChild(cancelBtn);

      function close() {
        sheet.style.transform = 'translate(-50%, 100%)';
        backdrop.style.opacity = '0';
        setTimeout(() => { backdrop.remove(); sheet.remove(); }, 250);
      }

      backdrop.addEventListener('click', close);
      sheet.querySelector('.modal__close')?.addEventListener('click', close);

      root.appendChild(backdrop);
      root.appendChild(sheet);
    });
  }

  // ============ Bottom Sheet ============
  function sheet({ title, body, onClose }) {
    const root = document.getElementById('sheet-root');
    if (!root) return () => {};

    root.classList.remove('hidden');
    root.innerHTML = '';

    const backdrop = Utils.el('div', { class: 'modal-backdrop' });
    const s = Utils.el('div', { class: 'sheet' });
    s.innerHTML = `
      <div class="modal__handle"></div>
      <div class="modal__header">
        <h3 class="modal__title">${Utils.escapeHTML(title || '')}</h3>
        <button class="modal__close" aria-label="إغلاق">×</button>
      </div>
      <div class="sheet__body"></div>
    `;
    s.querySelector('.sheet__body').appendChild(typeof body === 'string' ? createFromHTML(body) : body);

    let closed = false;
    function close() {
      if (closed) return;
      closed = true;
      s.style.transform = 'translate(-50%, 100%)';
      backdrop.style.opacity = '0';
      setTimeout(() => {
        root.classList.add('hidden');
        root.innerHTML = '';
        if (typeof onClose === 'function') onClose();
      }, 250);
    }

    backdrop.addEventListener('click', close);
    s.querySelector('.modal__close').addEventListener('click', close);

    root.appendChild(backdrop);
    root.appendChild(s);

    return close;
  }

  // ============ إنشاء عنصر من HTML ============
  function createFromHTML(html) {
    const tpl = document.createElement('template');
    tpl.innerHTML = html.trim();
    return tpl.content.firstElementChild || document.createDocumentFragment();
  }

  // ============ Empty State ============
  function emptyState({ icon, title, text, actionText, onAction }) {
    const div = Utils.el('div', { class: 'empty-state' });
    div.innerHTML = `
      <div class="empty-state__icon">${icon || ICONS.wallet}</div>

  // ============ Topbar ============
  function topbar({ userName = '', avatarText = '', avatarUrl = null, showSearch = true, showNotifications = true, onSearch, onNotifications }) {
    const t = Utils.el('div', { class: 'topbar' });
    const avatarInner = avatarUrl
      ? `<img src="${Utils.escapeHTML(avatarUrl)}" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover" />`
      : Utils.escapeHTML(avatarText);
    t.innerHTML = `
      <div class="topbar__user">
        <div class="topbar__avatar">${avatarInner}</div>
        <div class="topbar__name">${Utils.escapeHTML(userName)}</div>
      </div>
      <div class="topbar__actions">
        ${showSearch ? `<button class="icon-btn" data-action="search" aria-label="بحث">${ICONS.search}</button>` : ''}
        ${showNotifications ? `<button class="icon-btn icon-btn--badge" data-action="notifications" aria-label="الإشعارات">${ICONS.bell}</button>` : ''}
      </div>
    `;
    if (showSearch) {
      t.querySelector('[data-action="search"]').addEventListener('click', () => {
        if (typeof onSearch === 'function') onSearch();
        else globalSearch();
      });
    }
    if (showNotifications) {
      t.querySelector('[data-action="notifications"]').addEventListener('click', () => {
        if (typeof onNotifications === 'function') onNotifications();
        else showNotificationsPanel();
      });
    }
    return t;
  }

  // ============ Search Page ============
  function globalSearch() {
    const body = Utils.el('div');
    body.innerHTML = `
      <div class="search-bar" style="margin:0 0 16px">
        <input type="search" id="global-search-input" placeholder="ابحث عن أي معلومة..." autofocus />
      </div>
      <div id="search-results"></div>
    `;
    const close = sheet({ title: 'البحث', body });

    const input = body.querySelector('#global-search-input');
    const results = body.querySelector('#search-results');

    const doSearch = Utils.debounce(async () => {
      const q = input.value.trim();
      if (!q) {
        results.innerHTML = '<div class="text-tertiary text-sm text-center p-4">اكتب كلمة للبحث</div>';
        return;
      }
      results.innerHTML = '<div class="text-center p-4"><div class="spinner-sm" style="margin:0 auto"></div></div>';

      // البحث في كل المخازن
      const stores = ['wallets', 'transactions', 'debts', 'subscriptions', 'tasks', 'occasions', 'medicines', 'properties', 'notes'];
      const found = [];

      for (const store of stores) {
        try {
          const items = await DB.getAll(store);
          items.forEach(item => {
            const text = JSON.stringify(item).toLowerCase();
            if (text.includes(q.toLowerCase())) {
              found.push({ store, item });
            }
          });
        } catch {}
      }

      if (found.length === 0) {
        results.innerHTML = '<div class="text-center p-4 text-tertiary text-sm">لا توجد نتائج</div>';
        return;
      }

      results.innerHTML = found.map(r => `
        <div class="list-item" data-store="${r.store}" data-id="${r.item.id}">
          <div class="list-item__icon">${ICONS[r.store] || ICONS.list}</div>
          <div class="list-item__body">
            <div class="list-item__title">${Utils.escapeHTML(r.item.name || r.item.title || r.item.personName || 'عنصر')}</div>
            <div class="list-item__subtitle">${Utils.escapeHTML(labelForStore(r.store))}</div>
          </div>
        </div>
      `).join('');

      results.querySelectorAll('.list-item').forEach(el => {
        el.addEventListener('click', () => {
          const store = el.dataset.store;
          const id = el.dataset.id;
          close();
          navigateToItem(store, id);
        });
      });
    }, 300);

    input.addEventListener('input', doSearch);
    input.focus();
  }

  // ============ Notifications Panel ============
  async function showNotificationsPanel() {
    const body = Utils.el('div');
    body.innerHTML = '<div class="text-center p-4"><div class="spinner-sm" style="margin:0 auto"></div></div>';
    const close = sheet({ title: 'الإشعارات', body });

    try {
      const notes = await DB.getAll('notifications');
      const unread = notes.filter(n => !n.read).sort((a, b) => new Date(b.date) - new Date(a.date));
      const read = notes.filter(n => n.read).sort((a, b) => new Date(b.date) - new Date(a.date));

      if (notes.length === 0) {
        body.innerHTML = '';
        body.appendChild(emptyState({
          icon: ICONS.bell,
          title: 'لا توجد إشعارات',
          text: 'ستظهر الإشعارات هنا عند ورودها'
        }));
        return;
      }

      body.innerHTML = `
        ${unread.length > 0 ? '<div class="section-header__title" style="padding:8px 0">الجديدة</div>' + unread.map(n => renderNotification(n)).join('') : ''}
        ${read.length > 0 ? '<div class="section-header__title" style="padding:8px 0; margin-top:16px">السابقة</div>' + read.map(n => renderNotification(n)).join('') : ''}
      `;

      // وضع علامة مقروء
      body.querySelectorAll('.notif-item').forEach(el => {
        el.addEventListener('click', async () => {
          const id = el.dataset.id;
          const notif = await DB.get('notifications', id);
          if (notif && !notif.read) {
            notif.read = true;
            await DB.put('notifications', notif);
            el.classList.remove('unread');
          }
        });
      });

      // مسح الكل
      const clearBtn = Utils.el('button', {
        class: 'btn btn--ghost btn--block mt-4',
        onclick: async () => {
          if (await UI.confirm({ title: 'مسح الإشعارات', message: 'هل تريد مسح جميع الإشعارات؟', danger: true })) {
            await DB.clear('notifications');
            close();
          }
        }
      }, 'مسح الكل');
      body.appendChild(clearBtn);
    } catch (e) {
      body.innerHTML = '<div class="text-center p-4 text-danger">حدث خطأ</div>';
    }
  }

  function renderNotification(n) {
    return `
      <div class="list-item notif-item ${!n.read ? 'unread' : ''}" data-id="${n.id}" style="${!n.read ? 'background:var(--color-primary-50);' : ''}">
        <div class="list-item__icon">${n.icon || ICONS.bell}</div>
        <div class="list-item__body">
          <div class="list-item__title">${Utils.escapeHTML(n.title)}</div>
          <div class="list-item__subtitle">${Utils.escapeHTML(n.body || '')}</div>
          <div class="list-item__subtitle">${Utils.escapeHTML(Utils.formatDateTime(n.date))}</div>
        </div>
      </div>
    `;
  }

  // ============ Form Field Helpers ============
  function field({ label, type = 'text', name, value = '', placeholder, required = false, hint, options }) {
    const id = `field_${name}`;
    const input = type === 'select'
      ? `<select class="form-select" id="${id}" name="${name}">${(options || []).map(o => `<option value="${o.value}" ${o.value === value ? 'selected' : ''}>${Utils.escapeHTML(o.label)}</option>`).join('')}</select>`
      : type === 'textarea'
        ? `<textarea class="form-textarea" id="${id}" name="${name}" placeholder="${Utils.escapeHTML(placeholder || '')}">${Utils.escapeHTML(value)}</textarea>`
        : `<input class="form-input" type="${type}" id="${id}" name="${name}" value="${Utils.escapeHTML(value)}" placeholder="${Utils.escapeHTML(placeholder || '')}" />`;

    return `
      <div class="form-group">
        <label class="form-label" for="${id}">${Utils.escapeHTML(label)} ${required ? '<span class="required">*</span>' : ''}</label>
        ${input}
        ${hint ? `<div class="form-hint">${Utils.escapeHTML(hint)}</div>` : ''}
      </div>
    `;
  }

  function toggleField({ label, name, checked = false, hint }) {
    return `
      <div class="form-group">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <div class="form-label" style="margin:0">${Utils.escapeHTML(label)}</div>
            ${hint ? `<div class="form-hint">${Utils.escapeHTML(hint)}</div>` : ''}
          </div>
          <label class="toggle">
            <input type="checkbox" name="${name}" ${checked ? 'checked' : ''} />
            <span class="toggle__slider"></span>
          </label>
        </div>
      </div>
    `;
  }

  // ============ تأكيد بكلمة السر (للعمليات الحساسة مثل الحذف) ============
  function confirmWithPassword({ title, message, confirmText = 'تأكيد الحذف', cancelText = 'إلغاء', danger = true }) {
    return new Promise(async (resolve) => {
      const user = await DB.get('user', 'user_default');

      const body = Utils.el('div', {});
      body.innerHTML = `
        ${message ? `<p style="color:var(--color-text-secondary); margin:0 0 16px; line-height:1.6;">${Utils.escapeHTML(message)}</p>` : ''}
        <div class="form-group" style="margin:0">
          <label class="form-label">أدخل رمز الدخول للتأكيد <span class="required">*</span></label>
          <div class="input-group">
            <input class="input-group__input" type="password" id="confirm-pwd" placeholder="••••" autocomplete="off" inputmode="numeric" pattern="[0-9]*" maxlength="8" />
            <button type="button" class="input-group__addon" id="toggle-confirm-pwd" style="cursor:pointer; border:none; background:transparent">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div id="confirm-pwd-error" style="color:var(--color-danger); font-size:13px; margin-top:6px; min-height:18px;"></div>
        </div>
      `;

      const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
        Utils.el('button', {
          class: 'btn btn--outline btn--block',
          onclick: () => { close(); resolve(false); }
        }, cancelText),
        Utils.el('button', {
          class: `btn btn--block ${danger ? 'btn--danger' : 'btn--primary'}`,
          id: 'confirm-pwd-btn'
        }, confirmText)
      ]);

      const close = modal({ title: title || 'تأكيد العملية', body, footer });

      const pwdInput = body.querySelector('#confirm-pwd');
      const errorEl = body.querySelector('#confirm-pwd-error');
      const confirmBtn = footer.querySelector('#confirm-pwd-btn');
      const toggleBtn = body.querySelector('#toggle-confirm-pwd');

      toggleBtn.addEventListener('click', () => {
        pwdInput.type = pwdInput.type === 'password' ? 'text' : 'password';
      });

      pwdInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          confirmBtn.click();
        }
      });

      confirmBtn.addEventListener('click', async () => {
        const entered = pwdInput.value;
        if (!entered) {
          errorEl.textContent = 'الرجاء إدخال الرمز';
          if (window.Sounds) Sounds.error();
          return;
        }
        // تحقق عبر PBKDF2 (الوضع الآمن) أو نصّي (الوضع غير الآمن)
        // Crypto.verifyPin يتولّى الوضعين داخلياً: في الوضع غير الآمن يُقارن PIN
        // بـ pinHash (الذي يُخزَّن فيه الـ PIN كنص في ذلك الوضع).
        let valid = false;
        try {
          if (user && user.pinHash) {
            valid = await Crypto.verifyPin(entered, user.pinHash, user.pinSalt);
          } else if (user && user.password) {
            // توافق مع المستخدمين القدامى قبل نظام التشفير
            valid = (entered === user.password);
          }
        } catch (e) {
          valid = false;
        }
        if (!valid) {
          errorEl.textContent = 'الرمز غير صحيح';
          pwdInput.value = '';
          pwdInput.focus();
          if (window.Sounds) Sounds.error();
          pwdInput.style.animation = 'none';
          void pwdInput.offsetWidth;
          pwdInput.style.animation = 'pin-shake 0.4s';
          return;
        }
        if (window.Sounds) Sounds.confirm();
        close();
        resolve(true);
      });

      setTimeout(() => pwdInput.focus(), 100);
    });
  }

/* =========================================================
   CHARTS.JS - رسم بياني بسيط باستخدام Canvas (بدون مكتبات خارجية)
   ========================================================= */

window.Charts = (function () {
  'use strict';

  // رسم بياني عمودي - دخل مقابل مصروف
  function barChart(canvas, data, options = {}) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, rect.width, rect.height);

    const W = rect.width;
    const H = rect.height;
    const padding = { top: 20, right: 10, bottom: 30, left: 40 };
    const chartW = W - padding.left - padding.right;
    const chartH = H - padding.top - padding.bottom;

    if (!data || data.length === 0) {
      ctx.fillStyle = '#94a3b8';
      ctx.font = '13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('لا توجد بيانات', W / 2, H / 2);
      return;
    }

    const values = data.flatMap(d => [d.income || 0, d.expense || 0]);
    const maxVal = Math.max(...values, 1);
    const barWidth = chartW / data.length / 2.5;
    const groupWidth = chartW / data.length;

    // محور Y
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 1;
    ctx.font = '10px sans-serif';
    ctx.fillStyle = '#94a3b8';
    ctx.textAlign = 'right';

    const ySteps = 4;
    for (let i = 0; i <= ySteps; i++) {
      const y = padding.top + chartH - (i / ySteps) * chartH;
      const val = (i / ySteps) * maxVal;
      ctx.beginPath();
      ctx.moveTo(padding.left, y);
      ctx.lineTo(W - padding.right, y);
      ctx.stroke();
      ctx.fillText(Math.round(val).toString(), padding.left - 4, y + 3);
    }

    // الأعمدة
    data.forEach((d, i) => {
      const x = padding.left + i * groupWidth + groupWidth / 2 - barWidth;

      // دخل
      const incomeH = (d.income / maxVal) * chartH;
      const incomeY = padding.top + chartH - incomeH;
      const grad1 = ctx.createLinearGradient(0, incomeY, 0, padding.top + chartH);
      grad1.addColorStop(0, '#16a34a');
      grad1.addColorStop(1, '#22c55e');
      ctx.fillStyle = grad1;
      roundRect(ctx, x, incomeY, barWidth - 2, incomeH, 3);
      ctx.fill();

      // مصروف
      const expH = (d.expense / maxVal) * chartH;
      const expY = padding.top + chartH - expH;
      const grad2 = ctx.createLinearGradient(0, expY, 0, padding.top + chartH);
      grad2.addColorStop(0, '#dc2626');
      grad2.addColorStop(1, '#ef4444');
      ctx.fillStyle = grad2;
      roundRect(ctx, x + barWidth, expY, barWidth - 2, expH, 3);
      ctx.fill();

      // تسمية المحور X
      ctx.fillStyle = '#475569';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(d.label, x + barWidth, padding.top + chartH + 16);
    });

    // وسيلة الإيضاح
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillStyle = '#16a34a';
    ctx.fillRect(W - 100, 6, 10, 10);
    ctx.fillStyle = '#475569';
    ctx.fillText('دخل', W - 86, 14);
    ctx.fillStyle = '#dc2626';
    ctx.fillRect(W - 50, 6, 10, 10);
    ctx.fillStyle = '#475569';
    ctx.fillText('مصروف', W - 36, 14);
  }

  // رسم دائري - المصروفات حسب الفئة
  function pieChart(canvas, data, options = {}) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, rect.width, rect.height);

    const W = rect.width;
    const H = rect.height;
    const cx = W / 2;
    const cy = H / 2;
    const radius = Math.min(W, H) / 2 - 10;

    if (!data || data.length === 0) {
      ctx.fillStyle = '#94a3b8';
      ctx.font = '13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('لا توجد بيانات', cx, cy);
      return;
    }

    const total = data.reduce((s, d) => s + d.value, 0);
    if (total === 0) return;

    let startAngle = -Math.PI / 2;
    data.forEach((d) => {
      const angle = (d.value / total) * 2 * Math.PI;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, radius, startAngle, startAngle + angle);
      ctx.closePath();
      ctx.fillStyle = d.color || '#0f766e';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();

      // نسبة مئوية على الرسمة
      if (d.value / total > 0.05) {
        const midAngle = startAngle + angle / 2;
        const tx = cx + Math.cos(midAngle) * radius * 0.65;
        const ty = cy + Math.sin(midAngle) * radius * 0.65;
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`${Math.round((d.value / total) * 100)}%`, tx, ty);
      }

      startAngle += angle;
    });

    // دائرة داخلية (donut)
    ctx.beginPath();
    ctx.arc(cx, cy, radius * 0.5, 0, 2 * Math.PI);
    ctx.fillStyle = '#fff';
    ctx.fill();

    // المجموع في الوسط
    ctx.fillStyle = '#0f172a';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(options.centerLabel || 'المجموع', cx, cy - 8);
    ctx.font = 'bold 16px sans-serif';
    ctx.fillText(options.centerValue || '', cx, cy + 10);
  }

  // رسم خطي
  function lineChart(canvas, data, options = {}) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, rect.width, rect.height);

    const W = rect.width;
    const H = rect.height;
    const padding = { top: 20, right: 15, bottom: 30, left: 40 };
    const chartW = W - padding.left - padding.right;
    const chartH = H - padding.top - padding.bottom;

    if (!data || data.length === 0) {
      ctx.fillStyle = '#94a3b8';
      ctx.font = '13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('لا توجد بيانات', W / 2, H / 2);
      return;
    }

    const values = data.map(d => d.value);
    const maxVal = Math.max(...values, 1);
    const minVal = Math.min(...values, 0);

    // محاور
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 1;
    ctx.font = '10px sans-serif';
    ctx.fillStyle = '#94a3b8';
    ctx.textAlign = 'right';

    const ySteps = 4;
    for (let i = 0; i <= ySteps; i++) {
      const y = padding.top + chartH - (i / ySteps) * chartH;
      const val = minVal + (i / ySteps) * (maxVal - minVal);
      ctx.beginPath();
      ctx.moveTo(padding.left, y);
      ctx.lineTo(W - padding.right, y);
      ctx.stroke();
      ctx.fillText(Math.round(val).toString(), padding.left - 4, y + 3);
    }

    // الخط
    const step = chartW / (data.length - 1 || 1);
    ctx.beginPath();
    data.forEach((d, i) => {
      const x = padding.left + i * step;
      const y = padding.top + chartH - ((d.value - minVal) / (maxVal - minVal || 1)) * chartH;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });

    // تعبئة أسفل الخط
    ctx.lineTo(padding.left + (data.length - 1) * step, padding.top + chartH);
    ctx.lineTo(padding.left, padding.top + chartH);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, padding.top, 0, padding.top + chartH);
    grad.addColorStop(0, 'rgba(15, 118, 110, 0.3)');
    grad.addColorStop(1, 'rgba(15, 118, 110, 0.02)');
    ctx.fillStyle = grad;
    ctx.fill();

    // الخط نفسه
    ctx.beginPath();
    data.forEach((d, i) => {
      const x = padding.left + i * step;
      const y = padding.top + chartH - ((d.value - minVal) / (maxVal - minVal || 1)) * chartH;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.strokeStyle = '#0f766e';
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // النقاط
    data.forEach((d, i) => {
      const x = padding.left + i * step;
      const y = padding.top + chartH - ((d.value - minVal) / (maxVal - minVal || 1)) * chartH;
      ctx.beginPath();
      ctx.arc(x, y, 3.5, 0, 2 * Math.PI);
      ctx.fillStyle = '#0f766e';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();

      // تسمية المحور X
      ctx.fillStyle = '#475569';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(d.label, x, padding.top + chartH + 16);
    });
  }

  // دالة مساعدة لرسم مستطيل بزوايا دائرية
  function roundRect(ctx, x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    if (r < 0) r = 0;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  return {
    barChart,
    pieChart,
    lineChart
  };
})();

    { id: 'briefcase', label: 'عمل',        svg: `<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>` },
    { id: 'shield',    label: 'أمان',       svg: `<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>` },
    { id: 'users',     label: 'عائلة',      svg: `<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>` },
    { id: 'star',      label: 'مميز',       svg: `<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>` }
  ];

  function getWalletIcon(iconId) {
    const icon = WALLET_ICONS.find(i => i.id === iconId);
    return icon ? icon.svg : WALLET_ICONS[0].svg;
  }

  async function render() {
    const root = document.getElementById('app-root');
    document.getElementById('bottom-nav').classList.remove('hidden');

    root.innerHTML = `
      ${UI.topbar({ userName: (await Auth.getCurrentUser())?.name || '', avatarText: Utils.initials((await Auth.getCurrentUser())?.name || '') }).outerHTML}
      <div class="page">
        <div class="page__header" style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <h1 class="page__title">محفظتي</h1>
            <p class="page__subtitle">أرصدة المحافظ والعمليات</p>
          </div>
          <button class="icon-btn" id="wallet-analytics" title="التحليلات">${UI.ICONS.chart}</button>
        </div>

        <div class="tabs">
          <button class="tab ${activeTab === 'wallets' ? 'active' : ''}" data-tab="wallets">كل المحافظ</button>
          <button class="tab ${activeTab === 'transactions' ? 'active' : ''}" data-tab="transactions">كل العمليات</button>
        </div>

        <div class="search-bar">
          ${UI.ICONS.search}
          <input type="search" id="wallet-search" placeholder="ابحث عن محفظة أو عملية..." />
        </div>

        <div id="wallets-content"></div>
      </div>
    `;

    // إعادة بناء التوب بار (لأن outerHTML يفقد المستمعين)
    const topbarEl = root.querySelector('.topbar');
    const user = await Auth.getCurrentUser();
    const newTopbar = UI.topbar({
      userName: user?.name || '',
      avatarText: Utils.initials(user?.name || '')
    });
    topbarEl.replaceWith(newTopbar);

    // التبويبات
    root.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        activeTab = tab.dataset.tab;
        root.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        loadContent();
      });
    });

    // البحث
    root.querySelector('#wallet-search').addEventListener('input', Utils.debounce(() => {
      loadContent();
    }, 300));

    // زر التحليلات
    root.querySelector('#wallet-analytics').addEventListener('click', () => {
      window.location.hash = '#/dashboard';
      setTimeout(() => DashboardPage.showAnalyticsSheet?.(), 300);
    });

    await loadContent();
  }

  async function loadContent() {
    const container = document.getElementById('wallets-content');
    const search = document.getElementById('wallet-search').value.trim().toLowerCase();

    if (activeTab === 'wallets') {
      await renderWalletsList(container, search);
    } else {
      await renderTransactionsList(container, search);
    }
  }

  async function renderWalletsList(container, search) {
    container.innerHTML = '<div style="text-align:center;padding:20px"><div class="spinner-sm" style="margin:0 auto"></div></div>';

    const wallets = await DB.getAll('wallets');
    let filtered = wallets.filter(w =>
      !search || w.name.toLowerCase().includes(search)
    );

    const active = filtered.filter(w => !w.archived);
    const archived = filtered.filter(w => w.archived);

    container.innerHTML = `
      <div class="page__body">
        <div style="display:flex;gap:8px;margin-bottom:16px">
          <button class="btn btn--primary btn--block" id="add-wallet-btn">
            ${UI.ICONS.plus} إضافة محفظة
          </button>
        </div>

        <div class="segmented" style="margin-bottom:16px">
          <button class="segmented__btn ${!showArchived ? 'active' : ''}" data-filter="active">
            النشطة (${active.length})
          </button>
          <button class="segmented__btn ${showArchived ? 'active' : ''}" data-filter="archived">
            المؤرشفة (${archived.length})
          </button>
        </div>

        <div id="wallets-list"></div>
      </div>
    `;

    container.querySelector('#add-wallet-btn').addEventListener('click', () => showWalletForm());

    container.querySelectorAll('.segmented__btn').forEach(btn => {
      btn.addEventListener('click', () => {
        showArchived = btn.dataset.filter === 'archived';
        container.querySelectorAll('.segmented__btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderWalletsList(container, search);
      });
    });

    const list = container.querySelector('#wallets-list');
    const displayList = showArchived ? archived : active;

    if (displayList.length === 0) {
      list.appendChild(UI.emptyState({
        icon: UI.ICONS.wallet,
        title: showArchived ? 'لا توجد محافظ مؤرشفة' : 'ابدأ بإضافة محفظة',
        text: showArchived ? 'ستظهر المحافظ المؤرشفة هنا' : 'أضف محفظتك الأولى لإدارة أموالك',
        actionText: showArchived ? null : 'إضافة محفظة',
        onAction: () => showWalletForm()
      }));
      return;
    }

    list.innerHTML = displayList.map(w => `
      <div class="wallet-card" data-id="${w.id}" style="${w.color ? `--gradient-from:${w.color};--gradient-to:${w.colorDark || w.color}` : ''}">
        <div class="wallet-card__header">
          <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
            <div style="background:rgba(255,255,255,0.18);border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              ${getWalletIcon(w.icon)}
            </div>
            <div class="wallet-card__name" style="flex:1;min-width:0">${Utils.escapeHTML(w.name)}</div>
          </div>
          <div class="badge badge--${w.archived ? 'warning' : 'success'}">${w.archived ? 'مؤرشفة' : 'نشطة'}</div>
        </div>
        <div class="wallet-card__balance">${Utils.formatNumber(w.balance)} <span class="wallet-card__currency">${w.currency || '₪'}</span></div>
        <div class="wallet-card__footer">
          <span>${Utils.formatDate(w.createdAt)}</span>
          <div style="display:flex;gap:8px">
            <button class="icon-btn" style="color:inherit;padding:4px" data-action="edit" data-id="${w.id}" title="تعديل">${UI.ICONS.edit}</button>
            <button class="icon-btn" style="color:inherit;padding:4px" data-action="share" data-id="${w.id}" title="مشاركة">${UI.ICONS.share}</button>
            <button class="icon-btn" style="color:inherit;padding:4px" data-action="lock" data-id="${w.id}" title="${w.archived ? 'فتح' : 'أرشفة'}">${UI.ICONS.lock}</button>
          </div>
        </div>
      </div>
    `).join('');

    // تطبيق تدرّج لوني عشوائي لكل محفظة بدون لون
    list.querySelectorAll('.wallet-card').forEach(card => {
      if (!card.style.getPropertyValue('--gradient-from')) {
        const colors = [
          ['#0f766e', '#134e4a'],
          ['#2563eb', '#1e3a8a'],
          ['#7c3aed', '#4c1d95'],
          ['#db2777', '#831843'],
          ['#ea580c', '#7c2d12'],
          ['#0891b2', '#164e63']
        ];
        const [from, to] = colors[Math.floor(Math.random() * colors.length)];
        card.classList.add('wallet-card--gradient');
        card.style.setProperty('--gradient-from', from);
        card.style.setProperty('--gradient-to', to);
      } else {
        card.classList.add('wallet-card--gradient');
      }
    });

    // الأحداث
    list.querySelectorAll('.wallet-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('[data-action]')) return;
        showWalletDetails(card.dataset.id);
      });
    });

    list.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const action = btn.dataset.action;
        if (action === 'edit') showWalletForm(id);
        else if (action === 'share') shareWallet(id);
        else if (action === 'lock') await toggleArchive(id);
      });
    });
  }

  async function renderTransactionsList(container, search) {
    container.innerHTML = '<div style="text-align:center;padding:20px"><div class="spinner-sm" style="margin:0 auto"></div></div>';

    const allTx = await DB.getAll('transactions');
    const wallets = await DB.getAll('wallets');
    const walletMap = {};
    wallets.forEach(w => walletMap[w.id] = w);

    let filtered = allTx.sort((a, b) => new Date(b.date) - new Date(a.date));
    if (search) {
      filtered = filtered.filter(t => {
        const w = walletMap[t.walletId];
        return (t.note || '').toLowerCase().includes(search) ||
          (w && w.name.toLowerCase().includes(search));
      });
    }

    container.innerHTML = `
      <div class="page__body">
        <div class="card">
          <div class="card__header">
            <h3 class="card__title">آخر العمليات (${filtered.length})</h3>
          </div>
          <div id="tx-list"></div>
        </div>
      </div>
    `;

    const list = container.querySelector('#tx-list');

    if (filtered.length === 0) {
      list.appendChild(UI.emptyState({
        icon: UI.ICONS.transaction,
        title: 'لا توجد عمليات',
        text: 'ستظهر جميع العمليات المالية هنا'
      }));
      return;
    }

    list.innerHTML = filtered.map(tx => {
      const w = walletMap[tx.walletId];
      const cat = State.CATEGORIES[tx.category] || State.CATEGORIES.other;
      const isIncome = tx.type === 'income' || tx.type === 'transfer_in';
      const isTransfer = tx.type.startsWith('transfer');
      const typeLabel = isTransfer ? 'تحويل' : (isIncome ? 'دخل' : 'مصروف');

      return `
        <div class="list-item" data-id="${tx.id}">
          <div class="list-item__icon" style="background:${cat.color}20;color:${cat.color}">
            ${isIncome ? UI.ICONS.income : isTransfer ? UI.ICONS.transaction : UI.ICONS.expense}
          </div>
          <div class="list-item__body">
            <div class="list-item__title">${Utils.escapeHTML(tx.note || cat.label)}</div>
            <div class="list-item__subtitle">
              <span class="badge badge--${isIncome ? 'success' : 'danger'}">${typeLabel}</span>
              ${w ? ` • ${Utils.escapeHTML(w.name)}` : ''}
              • ${Utils.formatDate(tx.date)}
            </div>
          </div>
          <div class="list-item__meta">
            <div class="list-item__amount ${isIncome ? 'list-item__amount--positive' : 'list-item__amount--negative'}">
              ${isIncome ? '+' : '-'}${Utils.formatMoney(tx.amount, tx.currency || '₪')}
            </div>
          </div>
        </div>
      `;
    }).join('');

    list.querySelectorAll('.list-item').forEach(item => {
      item.addEventListener('click', () => showTransactionDetails(item.dataset.id));
    });
  }

  // ============ نموذج إضافة/تعديل محفظة ============
  function showWalletForm(walletId = null) {
    const isEdit = !!walletId;

    DB.get('wallets', walletId).then(wallet => {
      const body = Utils.el('div');
      body.innerHTML = `
        <div class="form-group">
          <label class="form-label">اسم المحفظة <span class="required">*</span></label>
          <input class="form-input" id="wallet-name" placeholder="مثال: المحفظة الرئيسية" value="${wallet ? Utils.escapeHTML(wallet.name) : ''}" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">العملة <span class="required">*</span></label>
            <select class="form-select" id="wallet-currency">
              ${State.CURRENCIES.map(c => `<option value="${c.symbol}" ${wallet && wallet.currency === c.symbol ? 'selected' : ''}>${c.label} (${c.symbol})</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">الرصيد الافتتاحي</label>
            <input class="form-input" type="number" step="0.01" id="wallet-balance" placeholder="0.00" value="${wallet ? wallet.balance : 0}" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">الأيقونة</label>
          <div class="icon-picker" id="wallet-icons" style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px">
            ${WALLET_ICONS.map(ic => `
              <button type="button" class="icon-option ${(!wallet && ic.id === 'wallet') || (wallet && wallet.icon === ic.id) ? 'selected' : ''}" data-icon="${ic.id}" title="${ic.label}" style="aspect-ratio:1/1;border:2px solid ${(!wallet && ic.id === 'wallet') || (wallet && wallet.icon === ic.id) ? 'var(--color-primary)' : 'var(--color-border)'};background:${(!wallet && ic.id === 'wallet') || (wallet && wallet.icon === ic.id) ? 'var(--color-primary-50)' : 'transparent'};border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:${(!wallet && ic.id === 'wallet') || (wallet && wallet.icon === ic.id) ? 'var(--color-primary)' : 'var(--color-text-secondary)'};padding:0;transition:all 150ms">
                ${ic.svg}
              </button>
            `).join('')}
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">اللون</label>
          <div class="color-picker" id="wallet-colors">
            ${['#0f766e', '#2563eb', '#7c3aed', '#db2777', '#ea580c', '#0891b2', '#ca8a04', '#16a34a'].map(c => `
              <div class="color-option ${wallet && wallet.color === c ? 'selected' : ''}" data-color="${c}" style="background:${c}"></div>
            `).join('')}
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">ملاحظات</label>
          <textarea class="form-textarea" id="wallet-note" placeholder="ملاحظات اختيارية">${wallet ? Utils.escapeHTML(wallet.note || '') : ''}</textarea>
        </div>
      `;

      let selectedColor = wallet?.color || '#0f766e';
      let selectedIcon = wallet?.icon || 'wallet';

      const saveBtn = Utils.el('button', { class: 'btn btn--primary btn--block', id: 'save-wallet-btn' }, isEdit ? 'تحديث' : 'إنشاء');
      saveBtn.addEventListener('click', async () => {
        const name = body.querySelector('#wallet-name').value.trim();
        if (!name) { UI.toastError('أدخل اسم المحفظة'); return; }

        const data = {
          ...(wallet || {}),
          name,
          currency: body.querySelector('#wallet-currency').value,
          balance: parseFloat(body.querySelector('#wallet-balance').value) || 0,
          note: body.querySelector('#wallet-note').value.trim(),
          color: selectedColor,
          colorDark: selectedColor,
          icon: selectedIcon,
          archived: wallet?.archived || false
        };

        if (isEdit) {
          await DB.put('wallets', data);
          UI.toastSuccess('تم تحديث المحفظة');
        } else {
          await DB.add('wallets', data);
          UI.toastSuccess('تم إنشاء المحفظة');
        }

        close();
        await loadContent();
      });

      const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
        Utils.el('button', { class: 'btn btn--outline btn--block', onclick: () => close() }, 'إلغاء'),
        saveBtn
      ]);

      const close = UI.modal({
        title: isEdit ? 'تعديل محفظة' : 'إضافة محفظة',
        body, footer
      });

      // أحداث اختيار اللون
      body.querySelectorAll('.color-option').forEach(opt => {
        opt.addEventListener('click', () => {
          body.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
          selectedColor = opt.dataset.color;
        });
      });

      // أحداث اختيار الأيقونة
      body.querySelectorAll('.icon-option').forEach(btn => {
        btn.addEventListener('click', () => {
          body.querySelectorAll('.icon-option').forEach(o => {
            o.classList.remove('selected');
            o.style.border = '2px solid var(--color-border)';
            o.style.background = 'transparent';
            o.style.color = 'var(--color-text-secondary)';
          });
          btn.classList.add('selected');
          btn.style.border = '2px solid var(--color-primary)';
          btn.style.background = 'var(--color-primary-50)';
          btn.style.color = 'var(--color-primary)';
          selectedIcon = btn.dataset.icon;
        });
      });
    });
  }

  // ============ تفاصيل محفظة ============
  async function showWalletDetails(walletId) {
    const wallet = await DB.get('wallets', walletId);
    if (!wallet) return;

    const transactions = (await DB.getByIndex('transactions', 'walletId', walletId))
      .sort((a, b) => new Date(b.date) - new Date(a.date))
      .slice(0, 20);

    const income = transactions.filter(t => t.type === 'income' || t.type === 'transfer_in').reduce((s, t) => s + Number(t.amount), 0);
    const expense = transactions.filter(t => t.type === 'expense' || t.type === 'transfer_out').reduce((s, t) => s + Number(t.amount), 0);

    const body = Utils.el('div');
    body.innerHTML = `
      <div class="wallet-card wallet-card--gradient" style="--gradient-from:${wallet.color || '#0f766e'};--gradient-to:${wallet.colorDark || wallet.color || '#134e4a'};margin-bottom:16px">
        <div class="wallet-card__header">
          <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
            <div style="background:rgba(255,255,255,0.18);border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              ${getWalletIcon(wallet.icon)}
            </div>
            <div class="wallet-card__name" style="flex:1;min-width:0">${Utils.escapeHTML(wallet.name)}</div>
          </div>
          <div class="badge" style="background:rgba(255,255,255,0.2);color:#fff">${wallet.currency}</div>
        </div>
        <div class="wallet-card__balance">${Utils.formatNumber(wallet.balance)} <span class="wallet-card__currency">${wallet.currency}</span></div>
        ${wallet.note ? `<div style="margin-top:8px;font-size:13px;opacity:0.85">${Utils.escapeHTML(wallet.note)}</div>` : ''}
      </div>

      <div class="stats-grid" style="padding:0">
        <div class="stat-card">
          <div class="stat-card__label">إجمالي الدخل</div>
          <div class="stat-card__value text-success">${Utils.formatMoney(income, wallet.currency)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">إجمالي المصروف</div>
          <div class="stat-card__value text-danger">${Utils.formatMoney(expense, wallet.currency)}</div>
        </div>
      </div>

      <div class="section-header"><h3 class="section-header__title">آخر العمليات</h3></div>
      <div id="wallet-tx-list">
        ${transactions.length === 0 ? '<div class="empty-state" style="padding:24px"><div class="empty-state__text">لا توجد عمليات</div></div>' :
          transactions.map(tx => {
            const isIncome = tx.type === 'income' || tx.type === 'transfer_in';
            const cat = State.CATEGORIES[tx.category] || State.CATEGORIES.other;
            return `
              <div class="list-item">
                <div class="list-item__icon" style="background:${cat.color}20;color:${cat.color}">
                  ${isIncome ? UI.ICONS.income : UI.ICONS.expense}
                </div>
                <div class="list-item__body">
                  <div class="list-item__title">${Utils.escapeHTML(tx.note || cat.label)}</div>
                  <div class="list-item__subtitle">${Utils.formatDate(tx.date)}</div>
                </div>
                <div class="list-item__meta">
                  <div class="list-item__amount ${isIncome ? 'list-item__amount--positive' : 'list-item__amount--negative'}">
                    ${isIncome ? '+' : '-'}${Utils.formatMoney(tx.amount, tx.currency)}
                  </div>
                </div>
              </div>
            `;
          }).join('')
        }
      </div>
    `;

    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', { class: 'btn btn--outline', onclick: () => close() }, 'إغلاق'),
      Utils.el('button', {
        class: 'btn btn--primary',
        style: { flex: 1 },
        onclick: () => { close(); showWalletForm(walletId); }
      }, 'تعديل'),
      Utils.el('button', {
        class: 'btn btn--success',
        onclick: () => { close(); DashboardPage.showTransactionModal('expense'); }
      }, '+ عملية')
    ]);

    const close = UI.modal({ title: 'تفاصيل المحفظة', body, footer });
  }

  async function shareWallet(id) {
    const wallet = await DB.get('wallets', id);
    if (!wallet) return;
    const text = `محفظة ${wallet.name}: ${Utils.formatMoney(wallet.balance, wallet.currency)}`;
    if (navigator.share) {
      try { await navigator.share({ title: 'مشاركة محفظة', text }); } catch {}
    } else {
      await Utils.copyToClipboard(text);
      UI.toastSuccess('تم نسخ المعلومات');
    }
  }

  async function toggleArchive(id) {
    const wallet = await DB.get('wallets', id);
    if (!wallet) return;
    wallet.archived = !wallet.archived;
    await DB.put('wallets', wallet);
    UI.toastSuccess(wallet.archived ? 'تمت أرشفة المحفظة' : 'تم تفعيل المحفظة');
    await loadContent();
  }

  async function showTransactionDetails(id) {
    const tx = await DB.get('transactions', id);
    if (!tx) return;
    const wallet = await DB.get('wallets', tx.walletId);
    const cat = State.CATEGORIES[tx.category] || State.CATEGORIES.other;

    const body = Utils.el('div');
    body.innerHTML = `
      <div class="card" style="text-align:center">
        <div class="list-item__amount ${tx.type === 'income' || tx.type === 'transfer_in' ? 'list-item__amount--positive' : 'list-item__amount--negative'}" style="font-size:28px">
          ${tx.type === 'income' || tx.type === 'transfer_in' ? '+' : '-'}${Utils.formatMoney(tx.amount, tx.currency)}
        </div>
        <div style="margin-top:8px;color:var(--color-text-secondary)">${cat.label}</div>
      </div>
      <div class="card">
        <div class="summary-row"><span>المحفظة</span><span>${wallet ? Utils.escapeHTML(wallet.name) : 'محذوفة'}</span></div>
        <div class="summary-row"><span>التاريخ</span><span>${Utils.formatDateTime(tx.date)}</span></div>
        <div class="summary-row"><span>النوع</span><span>${tx.type === 'income' ? 'دخل' : tx.type === 'expense' ? 'مصروف' : 'تحويل'}</span></div>
        ${tx.note ? `<div class="summary-row"><span>ملاحظة</span><span>${Utils.escapeHTML(tx.note)}</span></div>` : ''}
      </div>
    `;

    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', {
        class: 'btn btn--danger',
        onclick: async () => {
          if (await UI.confirm({ title: 'حذف العملية', message: 'هل تريد حذف هذه العملية؟ سيتم تعديل رصيد المحفظة.', danger: true })) {
            // عكس التأثير على الرصيد
            if (wallet) {
              if (tx.type === 'income') wallet.balance -= Number(tx.amount);
              else if (tx.type === 'expense') wallet.balance += Number(tx.amount);
              await DB.put('wallets', wallet);
            }
            await DB.remove('transactions', tx.id);
            UI.toastSuccess('تم الحذف');
            close();
            await loadContent();
          }
        }
      }, UI.ICONS.trash),
      Utils.el('button', { class: 'btn btn--outline', style: { flex: 1 }, onclick: () => close() }, 'إغلاق')
    ]);

    const close = UI.modal({ title: 'تفاصيل العملية', body, footer });
  }

  return { render };
})();

      },
      {
        id: 'medicines',
        icon: UI.ICONS.medicine,
        title: 'أدويتي',
        count: medicines.length,
        desc: 'متابعة الأدوية والجرعات والتذكيرات',
        route: '#/commitments/medicines',
        color: '#ea580c'
      },
      {
        id: 'budgets',
        icon: UI.ICONS.target,
        title: 'الميزانيات والأهداف',
        count: 0,
        desc: 'وضع ميزانيات وتتبع تحقيق الأهداف',
        route: '#/more/budgets',
        color: '#2563eb'
      }
    ];

    grid.innerHTML = `
      <div class="choice-list" style="grid-template-columns:1fr 1fr">
        ${items.map(item => `
          <div class="choice-item" data-route="${item.route}">
            <div class="choice-item__icon" style="background:${item.color}20;color:${item.color}">${item.icon}</div>
            <div class="choice-item__title">${item.title}</div>
            <div class="choice-item__desc">${item.desc}</div>
            ${item.count > 0 ? `<div class="counter" style="margin-top:8px;background:${item.color}20;color:${item.color}">${item.count}</div>` : ''}
          </div>
        `).join('')}
      </div>
    `;

    grid.querySelectorAll('.choice-item').forEach(item => {
      item.addEventListener('click', () => {
        window.location.hash = item.dataset.route;
      });
    });
  }

  return { render };
})();


/* ===== js/pages/debts.js ===== */
/* =========================================================
   DEBTS.JS - واجهة الديون والأقساط
   ========================================================= */

window.DebtsPage = (function () {
  'use strict';

  let activeTab = 'debts'; // debts | installments
  let showArchived = false;

  async function render() {
    const root = document.getElementById('app-root');
    document.getElementById('bottom-nav').classList.remove('hidden');

    const user = await Auth.getCurrentUser();

    root.innerHTML = `
      ${UI.topbar({ userName: user?.name || '', avatarText: Utils.initials(user?.name || '') }).outerHTML}
      <div class="page">
        <div class="page__header" style="display:flex;align-items:center">
          <button class="back-btn" onclick="history.back()">${UI.ICONS.chevronRight}</button>
          <h1 class="page__title">الديون والأقساط</h1>
        </div>

        <div class="tabs">
          <button class="tab ${activeTab === 'debts' ? 'active' : ''}" data-tab="debts">ديون</button>
          <button class="tab ${activeTab === 'installments' ? 'active' : ''}" data-tab="installments">أقساط</button>
        </div>

        <div class="segmented" style="margin:0 16px 16px">
          <button class="segmented__btn ${!showArchived ? 'active' : ''}" data-filter="active">النشطة</button>
          <button class="segmented__btn ${showArchived ? 'active' : ''}" data-filter="archived">المؤرشفة</button>
        </div>

        <div id="debts-summary"></div>
        <div id="debts-list"></div>
      </div>
    `;

    const topbarEl = root.querySelector('.topbar');
    topbarEl.replaceWith(UI.topbar({
      userName: user?.name || '',
      avatarText: Utils.initials(user?.name || '')
    }));

    root.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        activeTab = tab.dataset.tab;
        root.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        loadContent();
      });
    });

    root.querySelectorAll('.segmented__btn').forEach(btn => {
      btn.addEventListener('click', () => {
        showArchived = btn.dataset.filter === 'archived';
        root.querySelectorAll('.segmented__btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadContent();
      });
    });

    await loadContent();
  }

  async function loadContent() {
    await renderSummary();
    await renderList();
  }

  async function renderSummary() {
    const container = document.getElementById('debts-summary');
    const debts = await DB.getAll('debts');
    const active = debts.filter(d => !d.archived);

    const owedToMe = active.filter(d => d.type === 'owed_to_me').reduce((s, d) => {
      const r = (d.remainingAmount != null && d.remainingAmount !== '') ? Number(d.remainingAmount) : Number(d.amount || 0);
      return s + r;
    }, 0);
    const owedToThem = active.filter(d => d.type === 'owed_to_them').reduce((s, d) => {
      const r = (d.remainingAmount != null && d.remainingAmount !== '') ? Number(d.remainingAmount) : Number(d.amount || 0);
      return s + r;
    }, 0);

    container.innerHTML = `
      <div class="card" style="margin:0 16px 16px">
        <div class="summary-row">
          <span><span class="dot dot--success"></span> لي عند الناس</span>
          <span class="text-success font-bold">${Utils.formatMoney(owedToMe, State.get('currentCurrency'))}</span>
        </div>
        <div class="summary-row">
          <span><span class="dot dot--danger"></span> علي للناس</span>
          <span class="text-danger font-bold">${Utils.formatMoney(owedToThem, State.get('currentCurrency'))}</span>
        </div>
        <div class="summary-row">
          <span>المتأخرة</span>
          <span>${active.filter(d => {
            const r = (d.remainingAmount != null && d.remainingAmount !== '') ? Number(d.remainingAmount) : Number(d.amount || 0);
            return d.dueDate && new Date(d.dueDate) < new Date() && r > 0;
          }).length}</span>
        </div>
        <div class="summary-row">
          <span>المسددة</span>
          <span>${debts.filter(d => {
            const r = (d.remainingAmount != null && d.remainingAmount !== '') ? Number(d.remainingAmount) : Number(d.amount || 0);
            return r === 0;
          }).length}</span>
        </div>
      </div>
    `;
  }

  async function renderList() {
    const container = document.getElementById('debts-list');
    container.innerHTML = '<div style="text-align:center;padding:20px"><div class="spinner-sm" style="margin:0 auto"></div></div>';

    const debts = await DB.getAll('debts');
    let filtered = activeTab === 'installments'
      ? debts.filter(d => d.installment && d.installment.enabled)
      : debts;

    filtered = filtered.filter(d => showArchived ? d.archived : !d.archived);
    filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    container.innerHTML = `
      <div class="page__body">
        <button class="btn btn--primary btn--block mb-4" id="add-debt-btn">
          ${UI.ICONS.plus} تسجيل دين جديد
        </button>

        <div class="search-bar" style="margin:0 0 16px">
          ${UI.ICONS.search}
          <input type="search" id="debt-search" placeholder="ابحث باسم الدين أو الشخص أو الرقم..." />
        </div>

        <div id="debts-items"></div>
      </div>
    `;

    container.querySelector('#add-debt-btn').addEventListener('click', () => showDebtForm());

    const searchInput = container.querySelector('#debt-search');
    searchInput.addEventListener('input', Utils.debounce(() => {
      renderDebtItems(container.querySelector('#debts-items'), filtered, searchInput.value);
    }, 200));

    renderDebtItems(container.querySelector('#debts-items'), filtered, '');
  }

  function renderDebtItems(container, debts, search) {
    let filtered = debts;
    if (search) {
      const q = search.toLowerCase();
      filtered = debts.filter(d =>
        (d.personName || '').toLowerCase().includes(q) ||
        (d.notes || '').toLowerCase().includes(q) ||
        (d.phone || '').includes(q)
      );
    }

    if (filtered.length === 0) {
      container.innerHTML = '';
      container.appendChild(UI.emptyState({
        icon: UI.ICONS.debt,
        title: 'لا توجد ديون',
        text: 'سجّل ديونك لتتبع المسدد والمتبقي',
        actionText: 'تسجيل دين',
        onAction: () => showDebtForm()
      }));
      return;
    }

    container.innerHTML = filtered.map(d => {
      const isOwedToMe = d.type === 'owed_to_me';
      // نتحقق من remainingAmount كقيمة (حتى لو 0) قبل السقوط إلى amount
      const remRaw = d.remainingAmount;
      const remaining = (remRaw != null && remRaw !== '') ? Number(remRaw) : Number(d.amount || 0);
      const originalAmount = Number(d.amount || 0);
      const isOverdue = d.dueDate && new Date(d.dueDate) < new Date() && remaining > 0;
      const isPaid = remaining <= 0;
      // نسبة المسدد
      const paidAmount = Math.max(0, originalAmount - remaining);
      const paidPct = originalAmount > 0 ? Math.min(100, Math.round((paidAmount / originalAmount) * 100)) : (isPaid ? 100 : 0);
      const isPartial = !isPaid && paidPct > 0;

      return `
        <div class="card" data-id="${d.id}" style="cursor:pointer">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="beneficiary-card__avatar" style="background:${isOwedToMe ? '#16a34a' : '#dc2626'}">
              ${Utils.escapeHTML(Utils.initials(d.personName))}
            </div>
            <div style="flex:1">
              <div style="display:flex;align-items:center;justify-content:space-between">
                <div style="font-weight:700">${Utils.escapeHTML(d.personName)}</div>
                ${isPaid ? '<span class="status-chip status-chip--paid">مسدد</span>' :
                  isOverdue ? '<span class="status-chip status-chip--overdue">متأخر</span>' :
                  isPartial ? `<span class="status-chip" style="background:#fef3c7;color:#92400e">مسدد ${paidPct}%</span>` :
                  `<span class="status-chip status-chip--active">${isOwedToMe ? 'لي' : 'علي'}</span>`}
              </div>
              <div style="font-size:13px;color:var(--color-text-secondary);margin-top:2px">
                ${Utils.formatDate(d.date)}
                ${d.dueDate ? ` • استحقاق: ${Utils.formatDateShort(d.dueDate)}` : ''}
              </div>
              ${d.description ? `<div style="font-size:12px;color:var(--color-text-tertiary);margin-top:4px">${Utils.escapeHTML(d.description)}</div>` : ''}
            </div>
          </div>
          ${isPartial ? `
            <div style="margin-top:12px">
              <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px">
                <span>المسدد: ${Utils.formatMoney(paidAmount, d.currency || '₪')}</span>
                <span>${paidPct}%</span>
              </div>
              <div style="height:6px;background:var(--color-bg-alt);border-radius:3px;overflow:hidden">
                <div style="height:100%;width:${paidPct}%;background:${isOwedToMe ? 'var(--color-success)' : 'var(--color-danger)'};border-radius:3px;transition:width 300ms"></div>
              </div>
            </div>
          ` : ''}
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--color-divider)">
            <div>
              <div style="font-size:11px;color:var(--color-text-tertiary)">${isOwedToMe ? 'متبقٍ لك' : 'متبقٍ عليك'}</div>
              <div style="font-weight:700;font-size:18px;color:${isOwedToMe ? 'var(--color-success)' : 'var(--color-danger)'}">
                ${Utils.formatMoney(remaining, d.currency || '₪')}
              </div>
              ${isPartial ? `<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:2px">من أصل ${Utils.formatMoney(originalAmount, d.currency || '₪')}</div>` : ''}
            </div>
            <div style="display:flex;gap:8px;align-items:center">
              ${isPaid
                ? `<span style="display:inline-flex;align-items:center;gap:4px;background:#dcfce7;color:#16a34a;padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600">${UI.ICONS.check}<span>تم التسديد</span></span>`
                : `<button class="btn btn--sm btn--success" data-action="pay" data-id="${d.id}">تسجيل سداد</button>`}
              <button class="icon-btn" data-action="edit" data-id="${d.id}">${UI.ICONS.edit}</button>
            </div>
          </div>
        </div>
      `;
    }).join('');

    container.querySelectorAll('[data-id]').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('[data-action]')) return;
        showDebtDetails(card.dataset.id);
      });
    });

    container.querySelectorAll('[data-action="edit"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        showDebtForm(btn.dataset.id);
      });
    });

    container.querySelectorAll('[data-action="pay"]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        await recordPayment(btn.dataset.id);
      });
    });
  }

  // ============ نموذج إضافة دين (صفحتان) ============
  function showDebtForm(debtId = null) {
    let currentStep = 1;
    let formData = {
      type: 'owed_to_me',
      personName: '',
      phone: '',
      email: '',
      address: '',
      description: '',
      openAccount: false,
      notes: '',
      currency: State.get('currentCurrency'),
      amount: 0,
      date: Utils.todayISO(),
      dueDate: '',
      walletId: '',
      listName: '',
      attachment: null,
      installment: { enabled: false, months: 1, type: 'monthly' }
    };

    if (debtId) {
      DB.get('debts', debtId).then(d => {
        if (d) {
          formData = { ...formData, ...d };
          renderStep();
        }
      });
    }

    const body = Utils.el('div');
    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } });

    function renderStep() {
      body.innerHTML = '';
      footer.innerHTML = '';

      const stepIndicator = `
        <div class="step-indicator">
          <div class="step-dot ${currentStep >= 1 ? 'active' : ''}"></div>
          <div class="step-dot ${currentStep >= 2 ? 'active' : ''}"></div>
        </div>
      `;

      if (currentStep === 1) {
        body.innerHTML = `
          ${stepIndicator}
          <p style="text-align:center;color:var(--color-text-secondary);margin-bottom:16px;font-size:13px">
            سجّل من تدين له ومن يدين لك، واربط الدين بمحفظة لتتبع الرصيد تلقائياً
          </p>

          <div class="form-group">
            <label class="form-label">النوع</label>
            <div class="radio-row">
              <label class="radio-card">
                <input type="radio" name="debt-type" value="owed_to_me" ${formData.type === 'owed_to_me' ? 'checked' : ''} />
                <span class="radio-card__label">يدين لي (شخص يدين لك)</span>
              </label>
              <label class="radio-card">
                <input type="radio" name="debt-type" value="owed_to_them" ${formData.type === 'owed_to_them' ? 'checked' : ''} />
                <span class="radio-card__label">أدين له (أنت تدين لشخص)</span>
              </label>
            </div>
          </div>

          ${UI.field({ label: 'اسم الجهة', name: 'personName', value: formData.personName, placeholder: 'مثال: أحمد', required: true })}
          ${UI.field({ label: 'العملة', name: 'currency', type: 'select', value: formData.currency, options: State.CURRENCIES.map(c => ({ value: c.symbol, label: `${c.label} (${c.symbol})` })) })}
          ${UI.field({ label: 'رقم الهاتف', name: 'phone', type: 'tel', value: formData.phone, placeholder: '059XXXXXXXX' })}
          ${UI.field({ label: 'بريد إلكتروني', name: 'email', type: 'email', value: formData.email })}
          ${UI.field({ label: 'العنوان', name: 'address', value: formData.address })}
          ${UI.field({ label: 'عنوان/وصف إضافي', name: 'description', value: formData.description, placeholder: 'مثال: قرض شخصي' })}
          ${UI.toggleField({ label: 'حساب مفتوح', name: 'openAccount', checked: formData.openAccount, hint: 'يسمح بتسجيل سداد أكبر من الرصيد، وعند التجاوز يتحول الرصيد تلقائياً' })}
          ${UI.field({ label: 'ملاحظات', name: 'notes', type: 'textarea', value: formData.notes, placeholder: 'ملاحظات اختيارية' })}
        `;

        // قراءة القيم
        body.querySelectorAll('input, select, textarea').forEach(input => {
          input.addEventListener('change', () => {
            if (input.type === 'radio') formData.type = input.value;
            else if (input.type === 'checkbox') formData[input.name] = input.checked;
            else formData[input.name] = input.value;
          });
          input.addEventListener('input', () => {
            if (input.type !== 'radio' && input.type !== 'checkbox') {
              formData[input.name] = input.value;
            }
          });
        });

        const nextBtn = Utils.el('button', {
          class: 'btn btn--primary',
          style: { flex: 1 },
          onclick: () => {
            if (!formData.personName.trim()) {
              UI.toastError('أدخل اسم الجهة');
              return;
            }
            currentStep = 2;
            renderStep();
          }
        }, 'التالي');
        const cancelBtn = Utils.el('button', { class: 'btn btn--outline', onclick: () => close() }, 'إلغاء');
        footer.appendChild(cancelBtn);
        footer.appendChild(nextBtn);
      } else {
        body.innerHTML = `
          ${stepIndicator}
          ${UI.field({ label: 'المبلغ', name: 'amount', type: 'number', value: formData.amount, placeholder: '0.00', required: true })}
          ${UI.field({ label: 'تاريخ الدين', name: 'date', type: 'date', value: formData.date, required: true })}
          ${UI.field({ label: 'تاريخ الاستحقاق', name: 'dueDate', type: 'date', value: formData.dueDate, hint: 'افتراضي: لا يوجد' })}

          <div class="form-group">
            <label class="form-label">محفظة (اختياري)</label>
            <select class="form-select" id="debt-wallet">
              <option value="">بدون محفظة</option>
            </select>
          </div>

          ${UI.field({ label: 'قائمة الديون (اختياري)', name: 'listName', value: formData.listName, placeholder: 'اكتب اسم قائمة جديدة أو اتركه فارغاً' })}
          ${UI.field({ label: 'مرفق (اختياري)', name: 'attachment', type: 'file' })}

          ${UI.toggleField({
            label: 'تقسيط المبلغ',
            name: 'installment_enabled',
            checked: formData.installment.enabled,
            hint: 'تقسيم المبلغ على دفعات شهرية/ربعية/سنوية'
          })}
          <div id="installment-options" style="${formData.installment.enabled ? '' : 'display:none'}">
            <div class="form-row">
              ${UI.field({ label: 'عدد الأقساط', name: 'installment_months', type: 'number', value: formData.installment.months })}
              <div class="form-group">
                <label class="form-label">نوع التقسيط</label>
                <select class="form-select" id="installment_type">
                  <option value="monthly" ${formData.installment.type === 'monthly' ? 'selected' : ''}>شهري</option>
                  <option value="quarterly" ${formData.installment.type === 'quarterly' ? 'selected' : ''}>ربع سنوي</option>
                  <option value="yearly" ${formData.installment.type === 'yearly' ? 'selected' : ''}>سنوي</option>
                </select>
              </div>
            </div>
          </div>
        `;

        // تحميل المحافظ
        DB.getAll('wallets').then(wallets => {
          const sel = body.querySelector('#debt-wallet');
          wallets.filter(w => !w.archived).forEach(w => {
            sel.innerHTML += `<option value="${w.id}" ${formData.walletId === w.id ? 'selected' : ''}>${Utils.escapeHTML(w.name)}</option>`;
          });
          sel.addEventListener('change', () => formData.walletId = sel.value);
        });

        // قراءة القيم
        body.querySelectorAll('input:not([type="file"]), select, textarea').forEach(input => {
          if (input.type === 'checkbox') {
            input.addEventListener('change', () => {
              if (input.name === 'installment_enabled') {
                formData.installment.enabled = input.checked;
                body.querySelector('#installment-options').style.display = input.checked ? 'block' : 'none';
              } else {
                formData[input.name] = input.checked;
              }
            });
          } else if (input.type !== 'radio') {
            input.addEventListener('input', () => {
              if (input.name === 'installment_months') formData.installment.months = parseInt(input.value) || 1;
              else if (input.id === 'installment_type') formData.installment.type = input.value;
              else formData[input.name] = input.value;
            });
          }
        });

        // مرفق
        const fileInput = body.querySelector('input[type="file"]');
        if (fileInput) {
          fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
              formData.attachment = {
                name: file.name,
                type: file.type,
                size: file.size,
                data: await Utils.fileToBase64(file)
              };
            }
          });
        }

        const backBtn = Utils.el('button', { class: 'btn btn--outline', onclick: () => { currentStep = 1; renderStep(); } }, 'رجوع');
        const saveBtn = Utils.el('button', {
          class: 'btn btn--primary',
          style: { flex: 1 },
          onclick: async () => {
            const amount = parseFloat(formData.amount);
            if (!amount || amount <= 0) {
              UI.toastError('أدخل مبلغاً صحيحاً');
              return;
            }

            const debtData = {
              ...formData,
              amount,
              remainingAmount: debtId ? formData.remainingAmount : amount,
              archived: false
            };

            if (debtId) {
              await DB.put('debts', debtData);
              UI.toastSuccess('تم تحديث الدين');
            } else {
              await DB.add('debts', debtData);
              UI.toastSuccess('تم تسجيل الدين بنجاح');
            }

            // إنشاء عملية في المحفظة إن وُجدت
            if (formData.walletId && !debtId) {
              const wallet = await DB.get('wallets', formData.walletId);
              if (wallet) {
                if (formData.type === 'owed_to_me') {
                  // دين لك = ستحصل على مبلغ لاحقاً (لا يؤثر على الرصيد الآن)
                } else {
                  // دين عليك = أضفت لمحفظتك مبلغاً
                  wallet.balance = Number(wallet.balance) + amount;
                  await DB.put('wallets', wallet);
                  await DB.add('transactions', {
                    type: 'income', amount, walletId: wallet.id,
                    category: 'other', note: `دين من ${formData.personName}`,
                    currency: wallet.currency, date: formData.date + 'T' + new Date().toTimeString().slice(0, 8)
                  });
                }
              }
            }

            close();
            await loadContent();
          }
        }, 'تسجيل الدين');
        footer.appendChild(backBtn);
        footer.appendChild(saveBtn);
      }
    }

    const close = UI.modal({
      title: debtId ? 'تعديل دين' : 'تسجيل دين',
      body, footer
    });

    renderStep();
  }

  async function recordPayment(debtId) {
    const debt = await DB.get('debts', debtId);
    if (!debt) return;

    const remaining = Number(debt.remainingAmount || debt.amount);

    const body = Utils.el('div');
    body.innerHTML = `
      <div class="card" style="text-align:center;background:var(--color-bg-alt)">
        <div style="font-size:13px;color:var(--color-text-secondary)">${debt.personName}</div>
        <div style="font-size:24px;font-weight:700;margin-top:4px">
          ${Utils.formatMoney(remaining, debt.currency)}
        </div>
        <div style="font-size:12px;color:var(--color-text-tertiary);margin-top:4px">المتبقي ${debt.type === 'owed_to_me' ? 'لك' : 'عليك'}</div>
      </div>

      <div class="form-group">
        <label class="form-label">المبلغ المسدد <span class="required">*</span></label>
        <input class="form-input" id="pay-amount-input" name="payAmount" type="number" step="0.01" value="${remaining}" placeholder="0.00" />
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px">
          <button type="button" class="btn btn--sm btn--outline" data-quick="25" style="padding:6px 4px">25%</button>
          <button type="button" class="btn btn--sm btn--outline" data-quick="50" style="padding:6px 4px">50%</button>
          <button type="button" class="btn btn--sm btn--outline" data-quick="75" style="padding:6px 4px">75%</button>
          <button type="button" class="btn btn--sm btn--outline" data-quick="100" style="padding:6px 4px">كامل</button>
        </div>
      </div>
      ${UI.field({ label: 'تاريخ السداد', name: 'payDate', type: 'date', value: Utils.todayISO() })}

      <div class="form-group">
        <label class="form-label">من/إلى محفظة (اختياري)</label>
        <select class="form-select" id="pay-wallet">
          <option value="">بدون محفظة</option>
        </select>
      </div>

      ${UI.field({ label: 'ملاحظات', name: 'payNote', type: 'textarea' })}
    `;

    // تحميل المحافظ
    DB.getAll('wallets').then(wallets => {
      const sel = body.querySelector('#pay-wallet');
      wallets.filter(w => !w.archived).forEach(w => {
        sel.innerHTML += `<option value="${w.id}">${Utils.escapeHTML(w.name)} (${Utils.formatMoney(w.balance, w.currency)})</option>`;
      });
    });

    // أزرار الدفع السريع (تحديث قيمة حقل المبلغ)
    const payAmountInput = body.querySelector('#pay-amount-input');
    body.querySelectorAll('[data-quick]').forEach(btn => {
      btn.addEventListener('click', () => {
        const pct = parseInt(btn.dataset.quick, 10) / 100;
        const val = (remaining * pct).toFixed(2);
        payAmountInput.value = val;
        // إبراز الزر المختار
        body.querySelectorAll('[data-quick]').forEach(b => {
          b.classList.remove('btn--primary');
          b.classList.add('btn--outline');
        });
        btn.classList.remove('btn--outline');
        btn.classList.add('btn--primary');
      });
    });

    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', { class: 'btn btn--outline', onclick: () => close() }, 'إلغاء'),
      Utils.el('button', {
        class: 'btn btn--success',
        style: { flex: 1 },
        onclick: async () => {
          const amount = parseFloat(body.querySelector('[name="payAmount"]').value);
          if (!amount || amount <= 0) { UI.toastError('أدخل مبلغاً صحيحاً'); return; }

          const newRemaining = remaining - amount;
          const openAccount = debt.openAccount;

          if (newRemaining < 0 && !openAccount) {
            UI.toastError('المبلغ أكبر من المتبقي. فعّل "حساب مفتوح" للسماح بذلك');
            return;
          }

          debt.remainingAmount = Math.max(0, newRemaining);
          debt.payments = debt.payments || [];
          debt.payments.push({
            id: Utils.uid('pay'),
            amount,
            date: body.querySelector('[name="payDate"]').value,
            note: body.querySelector('[name="payNote"]').value,
            walletId: body.querySelector('#pay-wallet').value
          });

          // تبديل النوع إن تجاوز السداد (للحساب المفتوح)
          if (newRemaining < 0 && openAccount) {
            debt.type = debt.type === 'owed_to_me' ? 'owed_to_them' : 'owed_to_me';
            debt.remainingAmount = Math.abs(newRemaining);
            UI.toastWarning('تم تبديل نوع الدين بسبب تجاوز السداد');
          }

          await DB.put('debts', debt);

          // إنشاء عملية في المحفظة
          const walletId = body.querySelector('#pay-wallet').value;
          if (walletId) {
            const wallet = await DB.get('wallets', walletId);
            if (wallet) {
              // دين لك + سدد = دخل للمحفظة
              // دين عليك + سدد = مصروف من المحفظة
              if (debt.type === 'owed_to_me' || (openAccount && newRemaining < 0)) {
                wallet.balance = Number(wallet.balance) + amount;
                await DB.put('wallets', wallet);
                await DB.add('transactions', {
                  type: 'income', amount, walletId, category: 'other',
                  note: `سداد دين من ${debt.personName}`,
                  currency: wallet.currency,
                  date: body.querySelector('[name="payDate"]').value + 'T' + new Date().toTimeString().slice(0, 8)
                });
              } else {
                wallet.balance = Number(wallet.balance) - amount;
                await DB.put('wallets', wallet);
                await DB.add('transactions', {
                  type: 'expense', amount, walletId, category: 'other',
                  note: `سداد دين لـ ${debt.personName}`,
                  currency: wallet.currency,
                  date: body.querySelector('[name="payDate"]').value + 'T' + new Date().toTimeString().slice(0, 8)
                });
              }
            }
          }

          UI.toastSuccess('تم تسجيل السداد');
          close();
          await loadContent();
        }
      }, 'تأكيد السداد')
    ]);

    const close = UI.modal({ title: 'تسجيل سداد', body, footer });
  }

  async function showDebtDetails(debtId) {
    const debt = await DB.get('debts', debtId);
    if (!debt) return;

    const isOwedToMe = debt.type === 'owed_to_me';
    const remaining = Number(debt.remainingAmount || debt.amount);

    const body = Utils.el('div');
    body.innerHTML = `
      <div class="beneficiary-card" style="background:var(--color-bg-alt)">
        <div class="beneficiary-card__avatar" style="background:${isOwedToMe ? '#16a34a' : '#dc2626'}">
          ${Utils.escapeHTML(Utils.initials(debt.personName))}
        </div>
        <div style="flex:1">
          <div style="font-weight:700">${Utils.escapeHTML(debt.personName)}</div>
          <div style="font-size:13px;color:var(--color-text-secondary)">
            ${isOwedToMe ? 'يدين لك' : 'تدين له'} • ${Utils.formatDate(debt.date)}
          </div>
        </div>
      </div>

      <div class="card" style="text-align:center">
        <div style="font-size:13px;color:var(--color-text-secondary)">المبلغ المتبقي</div>
        <div style="font-size:28px;font-weight:700;color:${isOwedToMe ? 'var(--color-success)' : 'var(--color-danger)'}">
          ${Utils.formatMoney(remaining, debt.currency)}
        </div>
        <div style="font-size:13px;color:var(--color-text-tertiary);margin-top:4px">
          من أصل ${Utils.formatMoney(debt.amount, debt.currency)}
        </div>
        ${debt.payments && debt.payments.length > 0 ? `
          <div class="progress" style="margin-top:12px">
            <div class="progress__bar" style="width:${Math.round((debt.amount - remaining) / debt.amount * 100)}%;background:${isOwedToMe ? '#16a34a' : '#dc2626'}"></div>
          </div>
        ` : ''}
      </div>

      <div class="card">
        <div class="card__header"><h3 class="card__title">التفاصيل</h3></div>
        ${debt.phone ? `<div class="summary-row"><span>الهاتف</span><span>${Utils.escapeHTML(debt.phone)}</span></div>` : ''}
        ${debt.email ? `<div class="summary-row"><span>البريد</span><span>${Utils.escapeHTML(debt.email)}</span></div>` : ''}
        ${debt.address ? `<div class="summary-row"><span>العنوان</span><span>${Utils.escapeHTML(debt.address)}</span></div>` : ''}
        ${debt.description ? `<div class="summary-row"><span>الوصف</span><span>${Utils.escapeHTML(debt.description)}</span></div>` : ''}
        ${debt.dueDate ? `<div class="summary-row"><span>الاستحقاق</span><span>${Utils.formatDate(debt.dueDate)}</span></div>` : ''}
        ${debt.notes ? `<div class="summary-row"><span>ملاحظات</span><span>${Utils.escapeHTML(debt.notes)}</span></div>` : ''}
      </div>

      ${debt.payments && debt.payments.length > 0 ? `
        <div class="card">
          <div class="card__header"><h3 class="card__title">سجل السدادات (${debt.payments.length})</h3></div>
          ${debt.payments.map(p => `
            <div class="list-item">
              <div class="list-item__icon" style="background:#dcfce7;color:#16a34a">${UI.ICONS.check}</div>
              <div class="list-item__body">
                <div class="list-item__title">${Utils.formatMoney(p.amount, debt.currency)}</div>
                <div class="list-item__subtitle">${Utils.formatDate(p.date)}${p.note ? ' • ' + Utils.escapeHTML(p.note) : ''}</div>
              </div>
            </div>
          `).join('')}
        </div>
      ` : ''}
    `;

    const footer = Utils.el('div', { style: { width: '100%', display: 'flex', gap: '8px' } }, [
      Utils.el('button', {
        class: 'btn btn--danger',
        onclick: async () => {
          if (await UI.confirm({ title: 'حذف الدين', message: 'هل تريد حذف هذا الدين نهائياً؟', danger: true })) {
            await DB.remove('debts', debtId);
            UI.toastSuccess('تم الحذف');
            close();
            await loadContent();
          }
        }
      }, UI.ICONS.trash),
      Utils.el('button', {
        class: 'btn btn--outline',
        onclick: () => { close(); showDebtForm(debtId); }
      }, UI.ICONS.edit),
      remaining > 0 ? Utils.el('button', {
        class: 'btn btn--success',
        style: { flex: 1 },
        onclick: () => { close(); recordPayment(debtId); }
      }, 'تسجيل سداد') : Utils.el('button', { class: 'btn', style: { flex: 1 }, onclick: () => close() }, 'إغلاق')
    ]);

    const close = UI.modal({ title: 'تفاصيل الدين', body, footer });
  }

  return { render };
})();
